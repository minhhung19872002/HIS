<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Khảo sát hài lòng — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uSatMod_s } = React;
const SatMod = () => {
  const kpis = [{"lbl":"Phản hồi T10","val":"1,842"},{"lbl":"Điểm TB","val":"4.32","sub":"/5","tone":"ok","delta":"+0.08","dir":"up"},{"lbl":"Tỷ lệ gửi/nhận","val":"68%"},{"lbl":"NPS","val":"62","tone":"ok"},{"lbl":"Phản hồi xấu chờ xử","val":"6","tone":"warn"}];
  const tabs = [{"id":"all","label":"Tất cả"},{"id":"ex","label":"Xuất viện","n":482},{"id":"opd","label":"OPD","n":1284},{"id":"bad","label":"Điểm < 3","n":76},{"id":"nps","label":"Từ NPS hỏi","n":894}];
  const cols = [{"k":"date","label":"Ngày","cls":"id"},{"k":"pt","label":"BN (ẩn danh)","cls":"nm"},{"k":"dept","label":"Khoa/phòng"},{"k":"score","label":"Điểm","cls":"num"},{"k":"topic","label":"Chủ đề","kind":"badge"},{"k":"st","label":"Trạng thái","kind":"stat"}];
  const rows = [{"_tab":"ex","date":"24/10","pt":"BN #18420","dept":"Sản","score":"5/5","topic":"Tổng thể","topicTone":"ok","st":"KHEN NGỢI","stTone":"ok"},{"_tab":"ex","date":"24/10","pt":"BN #18418","dept":"Nội TQ","score":"4/5","topic":"Chờ lâu","topicTone":"warn","st":"BÌNH THƯỜNG","stTone":"info"},{"_tab":"opd","date":"24/10","pt":"BN #18412","dept":"Tim mạch","score":"5/5","topic":"BS tận tâm","topicTone":"ok","st":"KHEN NGỢI","stTone":"ok"},{"_tab":"bad","date":"24/10","pt":"BN #18398","dept":"OPD Nội","score":"2/5","topic":"Chờ > 2h","topicTone":"crit","st":"CHỜ XỬ LÝ","stTone":"warn"},{"_tab":"bad","date":"23/10","pt":"BN #18361","dept":"Viện phí","score":"2/5","topic":"BHYT sai","topicTone":"crit","st":"ĐANG XỬ LÝ","stTone":"warn"},{"_tab":"bad","date":"23/10","pt":"BN #18354","dept":"Cấp cứu","score":"1/5","topic":"Thái độ ĐD","topicTone":"crit","st":"ĐÃ XỬ LÝ","stTone":"ok"},{"_tab":"nps","date":"22/10","pt":"BN #18298","dept":"Sản","score":"10 NPS","topic":"Promoter","topicTone":"ok","st":"RẤT HÀI LÒNG","stTone":"ok"},{"_tab":"nps","date":"22/10","pt":"BN #18291","dept":"Nội","score":"6 NPS","topic":"Passive","topicTone":"info","st":"TB","stTone":"info"}];
  const act  = [{"label":"📊 Dashboard NPS","cls":"p","toast":"Mở dashboard NPS"},{"label":"📤 Gửi khảo sát","toast":"Gửi 412 phiếu khảo sát hôm nay"},{"label":"📧 Phản hồi BN","toast":"Phản hồi BN đánh giá thấp"}];
  const side = {"titleKey":"pt","subKey":"dept","kvs":[{"lbl":"Ngày","k":"date","mono":true},{"lbl":"Khoa","k":"dept"},{"lbl":"Điểm","k":"score"},{"lbl":"Chủ đề","k":"topic"},{"lbl":"Trạng thái","k":"st"}],"cards":[{"title":"Câu trả lời","items":[{"l":"Chất lượng khám","v":"5/5"},{"l":"Thái độ NV y tế","v":"5/5"},{"l":"Thời gian chờ","v":"3/5"},{"l":"Sạch sẽ, tiện nghi","v":"4/5"},{"l":"Quay lại lần sau","v":"Có"}]},{"title":"Góp ý","items":[{"l":"Trích BN","v":"\"Khoa Sản rất tốt...\""}]}],"actions":[{"label":"📞 Gọi BN","cls":"p","toast":"Gọi lại $NM"},{"label":"📄 Chi tiết","toast":"Mở chi tiết $NM"},{"label":"↗ Chuyển khoa","toast":"Chuyển khoa xử lý $NM"},{"label":"✓ Đóng","cls":"ok","toast":"Đóng $NM","tone":"ok"}]};
  const [tab, setTab] = uSatMod_s("all");
  const [sel, setSel] = uSatMod_s(0);
  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>Khảo sát hài lòng bệnh nhân · gửi sau xuất viện/khám</h3>
            {tabs.length > 0 && (
              <div className="mod-seg">
                {tabs.map(t => (
                  <button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>
                    {t.label}{t.n != null && <span className="n">{t.n}</span>}
                  </button>
                ))}
              </div>
            )}
            <div className="spacer"/>
            {act.map((a,i) => (
              <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>
            ))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (
                        <td key={j} className={c.cls || c.kind || ""}>
                          {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                          {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                          {c.kind === "bar" && (
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/>
                              </div>
                              <span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span>
                            </div>
                          )}
                          {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h">
              <div className="t">{cur[side.titleKey] || "Chọn dòng"}</div>
              <div className="s">{cur[side.subKey] || ""}</div>
            </div>
            <div className="mod-side-b">
              {side.kvs && (
                <div className="mod-card">
                  <div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div>
                  <div className="mod-card-b">
                    {side.kvs.map((k,i) => (
                      <div key={i} className="mod-kv">
                        <div className="k">{k.lbl}</div>
                        <div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {side.cards && side.cards.map((card, i) => (
                <div key={i} className="mod-card">
                  <div className="mod-card-h">{card.title}{card.count && <span className="n">{card.count}</span>}</div>
                  <div className={"mod-card-b"}>
                    {card.items && card.items.map((it, j) => (
                      <div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}>
                        <span style={{color:"var(--t-1)"}}>{it.l}</span>
                        <span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {side.actions && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>
                  {side.actions.map((a,i) => (
                    <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.SatMod = SatMod;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="satisfaction" crumb={["Quản trị","Khảo sát hài lòng"]}>
    <SatMod/>
  </HisShell>
);
</script>
</body>
</html>
