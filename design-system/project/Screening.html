<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"/><title>Sàng lọc sơ sinh — HIS Terminal</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="his-shell.css"/><link rel="stylesheet" href="his-module.css"/></head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">
const { useState: uScreeningMod_s } = React;
const ScreeningMod = () => {
  const kpis=[{"lbl":"Lấy mẫu T10","val":"148"},{"lbl":"Chờ KQ","val":"22"},{"lbl":"Nghi ngờ","val":"3","tone":"warn"},{"lbl":"Dương tính","val":"1","tone":"crit"}],tabs=[{"id":"new","label":"Mới lấy"},{"id":"wait","label":"Chờ KQ"},{"id":"pos","label":"Dương tính"},{"id":"neg","label":"Âm tính"}],cols=[{"k":"code","label":"Mã","cls":"id"},{"k":"nm","label":"Trẻ sơ sinh","cls":"nm"},{"k":"mom","label":"Mẹ"},{"k":"age","label":"Tuổi","cls":"id"},{"k":"panel","label":"Gói","kind":"badge"},{"k":"st","label":"KQ","kind":"stat"}],rows=[{"_tab":"new","code":"SS-241024-08","nm":"B. Nguyễn G. Bảo","mom":"Nguyễn T. Mai","age":"48h","panel":"5 chỉ tiêu","panelTone":"info","st":"ĐÃ LẤY","stTone":"info"},{"_tab":"wait","code":"SS-241022-14","nm":"B. Trần T. Hạ","mom":"Trần T. Lan","age":"4 ngày","panel":"G6PD+TSH","panelTone":"info","st":"CHỜ KQ","stTone":"warn"},{"_tab":"pos","code":"SS-241018-02","nm":"B. Lê V. Nam","mom":"Lê T. Anh","age":"10 ngày","panel":"G6PD","panelTone":"info","st":"DƯƠNG TÍNH G6PD","stTone":"crit"}],act=[{"label":"+ Lấy mẫu","cls":"p","toast":"Mở form lấy mẫu"},{"label":"📞 Gọi tái khám","toast":"Gọi gia đình tái khám"}];
  const side=null;
  const [tab,setTab]=uScreeningMod_s("new");
  const [sel,setSel]=uScreeningMod_s(0);
  const filtered = tab==="all"?rows:rows.filter(r=>r._tab===tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (<div className="mod-wrap">
    {kpis.length>0 && (<div className="mod-strip">{kpis.map((k,i)=>(<div key={i} className={"mod-strip-cell "+(k.tone||"")}><div className="lbl">{k.lbl}</div><div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div></div>))}</div>)}
    <div className={"mod-body "+(side?"cols-2":"")}><div className="mod-pane">
      <div className="mod-toolbar"><h3>Sàng lọc sơ sinh — lấy máu gót chân, G6PD, CAH, TSH, Galactose</h3>{tabs.length>0 && (<div className="mod-seg">{tabs.map(t=>(<button key={t.id} className={"mod-seg-i "+(tab===t.id?"on":"")} onClick={()=>{setTab(t.id);setSel(0);}}>{t.label}</button>))}</div>)}<div className="spacer"/>{act.map((a,i)=>(<button key={i} className={"mod-btn "+(a.cls||"")} onClick={()=>HUI.toast(a.toast,{tone:a.tone||"info"})}>{a.label}</button>))}</div>
      <div className="mod-tbl-wrap"><table className="mod-tbl"><thead><tr>{cols.map((c,i)=><th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead><tbody>
        {filtered.map((r,i)=>(<tr key={i} className={sel===i?"sel":""} onClick={()=>setSel(i)}>{cols.map((c,j)=>{const v=r[c.k];return(<td key={j} className={c.cls||c.kind||""}>{c.kind==="stat"&&<span className={"mod-stat "+(r[c.k+"Tone"]||"ghost")}>{v}</span>}{c.kind==="badge"&&<span className={"mod-badge "+(r[c.k+"Tone"]||"")}>{v}</span>}{!c.kind&&(v!=null?v:<span style={{color:"var(--t-3)"}}>—</span>)}</td>);})}</tr>))}
      </tbody></table></div>
    </div></div>
  </div>);
};
window.ScreeningMod=ScreeningMod;</script>
<script type="text/babel" data-presets="react">ReactDOM.createRoot(document.getElementById("root")).render(<HisShell route="screening" crumb={["Cận lâm sàng","Sàng lọc sơ sinh"]}><ScreeningMod/></HisShell>);</script>
</body></html>
