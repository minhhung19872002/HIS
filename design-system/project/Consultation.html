<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Hội chẩn — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uConsultMod_s } = React;
const ConsultMod = () => {
  const kpis = [{"lbl":"Hôm nay","val":"12"},{"lbl":"Đang diễn ra","val":"2","tone":"info"},{"lbl":"Liên viện","val":"4","tone":"mag"},{"lbl":"Ký số chờ","val":"3","tone":"warn"}];
  const tabs = [{"id":"all","label":"Tất cả"},{"id":"live","label":"Đang diễn ra","n":2},{"id":"sch","label":"Sắp diễn ra","n":6},{"id":"done","label":"Đã kết thúc","n":28}];
  const cols = [{"k":"code","label":"Mã HC","cls":"id"},{"k":"when","label":"Thời gian","cls":"id"},{"k":"pt","label":"BN","cls":"nm"},{"k":"dx","label":"Vấn đề"},{"k":"kind","label":"Loại","kind":"badge"},{"k":"host","label":"Chủ trì"},{"k":"st","label":"Trạng thái","kind":"stat"}];
  const rows = [{"_tab":"live","code":"HC-24102-08","when":"15:00 (đang)","pt":"Nguyễn T. Mai · 58t","dx":"Đau ngực không điển hình, cTnI tăng nhẹ","kind":"Liên khoa","kindTone":"info","host":"BS. Phạm Hải","st":"ĐANG DIỄN RA","stTone":"info"},{"_tab":"live","code":"HC-24102-07","when":"15:08 (đang)","pt":"BN TTYT Văn Giang · 34t","dx":"Viêm tụy cấp độ 3","kind":"Liên viện","kindTone":"mag","host":"TS. Bình","st":"ĐANG DIỄN RA","stTone":"info"},{"_tab":"sch","code":"HC-24102-12","when":"16:30 hôm nay","pt":"Lê V. Hòa · 42t","dx":"U tuyến giáp T4 nghi ác tính","kind":"Liên khoa","kindTone":"info","host":"BS. Hòa","st":"CHUẨN BỊ","stTone":"warn"},{"_tab":"sch","code":"HC-24102-13","when":"17:00","pt":"Phạm T. Lan · 34t · thai 28w","dx":"Tiền sản giật + ĐTĐ thai","kind":"Liên khoa","kindTone":"info","host":"BS. Trần Lan","st":"CHUẨN BỊ","stTone":"warn"},{"_tab":"done","code":"HC-24102-01","when":"08:30","pt":"Trần V. Kế · 67","dx":"Suy tim nặng · đặt máy tạo nhịp?","kind":"Liên khoa","kindTone":"info","host":"BS. Phạm Hải","st":"ĐÃ KÝ SỐ","stTone":"ok"},{"_tab":"done","code":"HC-24102-02","when":"09:45","pt":"Vũ M. Tuấn · 28","dx":"Hen cơn nặng, thất bại khí dung","kind":"Liên khoa","kindTone":"info","host":"BS. Bảo","st":"CHỜ KÝ","stTone":"warn"}];
  const act  = [{"label":"+ Yêu cầu hội chẩn","cls":"p","toast":"Mở form yêu cầu hội chẩn"},{"label":"📹 Phòng họp ảo","toast":"Tạo phòng họp ảo mới"},{"label":"🖊 Ký số biên bản","toast":"Mở danh sách BB chờ ký"}];
  const side = {"titleKey":"pt","subKey":"dx","kvs":[{"lbl":"Mã HC","k":"code","mono":true},{"lbl":"Thời gian","k":"when","mono":true},{"lbl":"Loại","k":"kind"},{"lbl":"Chủ trì","k":"host"},{"lbl":"Trạng thái","k":"st"}],"cards":[{"title":"Thành phần","items":[{"l":"Chủ trì","v":"BS. Phạm Hải"},{"l":"Khoa Tim mạch","v":"3 BS"},{"l":"Khoa Ngoại TM","v":"1 BS"},{"l":"Khoa Gây mê","v":"1 BS"},{"l":"Thư ký","v":"ĐD. Nguyễn Hoa"}]},{"title":"Tài liệu đính kèm","items":[{"l":"ECG · 21/10","v":"PDF"},{"l":"ECHO tim · 22/10","v":"DICOM"},{"l":"Xét nghiệm máu","v":"PDF"},{"l":"Tóm tắt BA","v":"PDF · đã ký"}]}],"actions":[{"label":"👁 Vào phòng","cls":"p","toast":"Vào phòng hội chẩn $NM"},{"label":"📄 Biên bản","toast":"Mở BB $NM"},{"label":"🖊 Ký số","cls":"ok","toast":"Ký BB $NM","tone":"ok"},{"label":"↗ Mời thêm","toast":"Mời thành viên · $NM"}]};
  const [tab, setTab] = uConsultMod_s("all");
  const [sel, setSel] = uConsultMod_s(0);
  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>Hội chẩn liên khoa / liên viện · có ký số</h3>
            {tabs.length > 0 && (
              <div className="mod-seg">
                {tabs.map(t => (
                  <button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>
                    {t.label}{t.n != null && <span className="n">{t.n}</span>}
                  </button>
                ))}
              </div>
            )}
            <div className="spacer"/>
            {act.map((a,i) => (
              <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>
            ))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (
                        <td key={j} className={c.cls || c.kind || ""}>
                          {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                          {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                          {c.kind === "bar" && (
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/>
                              </div>
                              <span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span>
                            </div>
                          )}
                          {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h">
              <div className="t">{cur[side.titleKey] || side.emptyTitle || "Chọn một dòng"}</div>
              <div className="s">{cur[side.subKey] || ""}</div>
            </div>
            <div className="mod-side-b">
              {side.kvs && (
                <div className="mod-card">
                  <div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div>
                  <div className="mod-card-b">
                    {side.kvs.map((k,i) => (
                      <div key={i} className="mod-kv">
                        <div className="k">{k.lbl}</div>
                        <div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {side.cards && side.cards.map((card, i) => (
                <div key={i} className="mod-card">
                  <div className="mod-card-h">{card.title}{card.count && <span className="n">{card.count}</span>}</div>
                  <div className={"mod-card-b"}>
                    {card.items && card.items.map((it, j) => (
                      <div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}>
                        <span style={{color:"var(--t-1)"}}>{it.l}</span>
                        <span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {side.actions && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>
                  {side.actions.map((a,i) => (
                    <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.ConsultMod = ConsultMod;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="consultation" crumb={["Lâm sàng","Hội chẩn"]}>
    <ConsultMod/>
  </HisShell>
);
</script>
</body>
</html>
