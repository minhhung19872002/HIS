<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Khám từ xa — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uTelemedModule_s } = React;
const TelemedModule = () => {
  const kpis = [{"lbl":"Đang diễn ra","val":"3","sub":"phiên","tone":"info"},{"lbl":"Hôm nay","val":"18","delta":"+4 vs hôm qua","dir":"up"},{"lbl":"Chờ kết nối","val":"2","tone":"warn"},{"lbl":"Tỷ lệ kết nối thành công","val":"97.2%","delta":"+1.1%","dir":"up","tone":"ok"},{"lbl":"Thời gian TB / phiên","val":"14′","sub":"phút"}];
  const tabs = [{"id":"all","label":"Tất cả","n":24},{"id":"live","label":"Đang khám","n":3},{"id":"wait","label":"Chờ kết nối","n":2},{"id":"done","label":"Đã kết thúc","n":19}];
  const cols = [{"k":"time","label":"Giờ","cls":"id"},{"k":"pt","label":"Bệnh nhân","cls":"nm"},{"k":"dr","label":"Bác sĩ"},{"k":"dept","label":"Chuyên khoa"},{"k":"type","label":"Loại","kind":"badge"},{"k":"status","label":"Trạng thái","kind":"stat"}];
  const rows = [{"_tab":"live","time":"15:20","pt":"Nguyễn Thị Mai · 58t · BN-0812","dr":"BS. Phạm Hải","dept":"Tim mạch","type":"Tái khám","typeTone":"info","status":"ĐANG KẾT NỐI","statusTone":"info","dur":"6′ 42″","tech":"Jitsi · bit 1.2M"},{"_tab":"live","time":"15:15","pt":"Lê Văn Hòa · 42t · BN-0945","dr":"BS. Trần Lan","dept":"Da liễu","type":"Khám mới","typeTone":"ok","status":"ĐANG KẾT NỐI","statusTone":"info","dur":"11′ 12″","tech":"Jitsi · bit 980K"},{"_tab":"live","time":"15:08","pt":"BS. TTYT Văn Giang · Hội chẩn","dr":"TS. Nguyễn Văn Bình","dept":"Chỉ đạo tuyến","type":"Hội chẩn","typeTone":"mag","status":"ĐANG KẾT NỐI","statusTone":"info","dur":"18′ 04″","tech":"4K · bit 3.2M"},{"_tab":"wait","time":"15:30","pt":"Đỗ Minh Anh · 35t · BN-1024","dr":"BS. Hoàng Phúc","dept":"Nội tổng quát","type":"Khám mới","typeTone":"ok","status":"CHỜ BN","statusTone":"warn"},{"_tab":"wait","time":"15:45","pt":"Trần Văn Kế · 67t · BN-0666","dr":"BS. Phạm Hải","dept":"Tim mạch","type":"Tái khám","typeTone":"info","status":"CHỜ BS","statusTone":"warn"},{"_tab":"done","time":"14:30","pt":"Vũ Thị Hồng · 29t · BN-1188","dr":"BS. Trần Lan","dept":"Sản phụ khoa","type":"Tư vấn","typeTone":"mag","status":"KẾT THÚC","statusTone":"ok"},{"_tab":"done","time":"13:45","pt":"Hoàng Văn Nam · 48t · BN-0533","dr":"BS. Lê Tuấn","dept":"Nội tiêu hoá","type":"Tái khám","typeTone":"info","status":"KẾT THÚC","statusTone":"ok"},{"_tab":"done","time":"11:20","pt":"Nguyễn Ngọc Bích · 52t · BN-0702","dr":"BS. Phạm Hải","dept":"Tim mạch","type":"Khám mới","typeTone":"ok","status":"KẾT THÚC","statusTone":"ok"}];
  const act  = [{"label":"+ Lên lịch phiên","cls":"p","toast":"Mở form tạo phiên mới","tone":"info"},{"label":"🔗 Gửi link BN","toast":"Đã copy link · gửi Zalo/SMS"}];
  const side = {"titleKey":"pt","subKey":"dept","emptyTitle":"Chọn phiên khám","kvsTitle":"Thông tin phiên","kvs":[{"lbl":"Bác sĩ phụ trách","k":"dr"},{"lbl":"Loại phiên","k":"type"},{"lbl":"Giờ bắt đầu","k":"time","mono":true},{"lbl":"Thời lượng","k":"dur","mono":true},{"lbl":"Chất lượng kết nối","k":"tech","mono":true}],"cards":[{"title":"Thiết bị kết nối","items":[{"l":"Camera","v":"OK · 720p"},{"l":"Microphone","v":"OK"},{"l":"Băng thông","v":"Đủ · 1.2 Mbps","mono":true},{"l":"Mã hoá E2E","v":"✓ AES-256"}]},{"title":"Nhật ký phiên","items":[{"l":"Kết nối thành công","v":"15:20:14","mono":true},{"l":"Chia sẻ EMR","v":"15:22:40","mono":true},{"l":"Ghi âm bắt đầu","v":"15:23:02","mono":true}]}],"actions":[{"label":"👁 Vào phiên","cls":"p","toast":"Kết nối vào phiên · $NM"},{"label":"📝 Xem EMR","toast":"Mở EMR · $NM"},{"label":"📄 Ghi chú","toast":"Mở ghi chú phiên"},{"label":"⏹ Kết thúc","cls":"crit","toast":"Yêu cầu kết thúc phiên · $NM","tone":"warn"}]};
  const extra = null;
  const [tab, setTab] = uTelemedModule_s("all");
  const [sel, setSel] = uTelemedModule_s(0);

  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};

  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>Phiên khám từ xa</h3>
            {tabs.length > 0 && (
              <div className="mod-seg">
                {tabs.map(t => (
                  <button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>
                    {t.label}{t.n != null && <span className="n">{t.n}</span>}
                  </button>
                ))}
              </div>
            )}
            <div className="spacer"/>
            {act.map((a,i) => (
              <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>
            ))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (
                        <td key={j} className={c.cls || c.kind || ""}>
                          {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                          {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                          {c.kind === "bar" && (
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/>
                              </div>
                              <span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span>
                            </div>
                          )}
                          {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu trong tab này.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h">
              <div className="t">{cur[side.titleKey] || side.emptyTitle || "Chọn một dòng"}</div>
              <div className="s">{cur[side.subKey] || side.emptySub || ""}</div>
            </div>
            <div className="mod-side-b">
              {side.kvs && (
                <div className="mod-card">
                  <div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div>
                  <div className="mod-card-b">
                    {side.kvs.map((k,i) => (
                      <div key={i} className="mod-kv">
                        <div className="k">{k.lbl}</div>
                        <div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {side.cards && side.cards.map((card, i) => (
                <div key={i} className="mod-card">
                  <div className="mod-card-h">{card.title}{card.count && <span className="n">{card.count}</span>}</div>
                  <div className={"mod-card-b"}>
                    {card.items && card.items.map((it, j) => (
                      <div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}>
                        <span style={{color:"var(--t-1)"}}>{it.l}</span>
                        <span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {side.actions && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>
                  {side.actions.map((a,i) => (
                    <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.TelemedModule = TelemedModule;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="telemedicine" crumb={["Lâm sàng","Khám từ xa"]}>
    <TelemedModule/>
  </HisShell>
);
</script>
</body>
</html>
