<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Kê đơn — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uPrescModule_s } = React;
const PrescModule = () => {
  const kpis = [{"lbl":"Đơn hôm nay","val":"284","delta":"+18 vs TB tuần","dir":"up"},{"lbl":"Đơn có tương tác","val":"6","tone":"warn","delta":"AI phát hiện","dir":"flat"},{"lbl":"Đơn cần duyệt","val":"3","tone":"crit"},{"lbl":"Đã gửi DS QG","val":"281","sub":"/ 284","tone":"ok"},{"lbl":"Thời gian kê TB","val":"4.2′","sub":"phút/đơn"}];
  const tabs = [{"id":"all","label":"Tất cả","n":284},{"id":"draft","label":"Nháp","n":12},{"id":"review","label":"Chờ duyệt","n":3},{"id":"issued","label":"Đã kê","n":269},{"id":"interact","label":"Có cảnh báo","n":6}];
  const cols = [{"k":"code","label":"Mã đơn","cls":"id"},{"k":"pt","label":"Bệnh nhân","cls":"nm"},{"k":"dx","label":"Chẩn đoán"},{"k":"meds","label":"Số thuốc","cls":"num"},{"k":"cost","label":"Giá trị","cls":"num"},{"k":"bhyt","label":"BHYT","kind":"badge"},{"k":"st","label":"Trạng thái","kind":"stat"}];
  const rows = [{"_tab":"interact","code":"RX-24102-3841","pt":"Nguyễn T. Mai · 58t","dx":"I10 · Tăng HA","meds":4,"cost":"186k","bhyt":"BHYT 80%","bhytTone":"info","st":"CẢNH BÁO","stTone":"warn","warn":"Amlodipine × Simvastatin · tương tác mức 3"},{"_tab":"interact","code":"RX-24102-3840","pt":"Lê Văn Hòa · 42t","dx":"J06 · Viêm họng","meds":3,"cost":"98k","bhyt":"Dịch vụ","bhytTone":"","st":"CẢNH BÁO","stTone":"warn","warn":"Amoxicillin · tiền sử dị ứng Penicillin"},{"_tab":"review","code":"RX-24102-3839","pt":"Trần Văn Kế · 67t","dx":"E11 · ĐTĐ 2 + I25","meds":6,"cost":"542k","bhyt":"BHYT 95%","bhytTone":"info","st":"CHỜ DUYỆT","stTone":"info"},{"_tab":"issued","code":"RX-24102-3838","pt":"Phạm T. Lan · 34t","dx":"K29 · Viêm dạ dày","meds":3,"cost":"124k","bhyt":"BHYT 80%","bhytTone":"info","st":"ĐÃ KÊ","stTone":"ok"},{"_tab":"issued","code":"RX-24102-3837","pt":"Vũ Minh Tuấn · 28t","dx":"J45 · Hen phế quản","meds":2,"cost":"208k","bhyt":"BHYT 80%","bhytTone":"info","st":"ĐÃ KÊ","stTone":"ok"},{"_tab":"draft","code":"RX-24102-3836","pt":"Hoàng Văn Nam · 48t","dx":"K80 · Sỏi túi mật","meds":0,"cost":"—","bhyt":"BHYT 80%","bhytTone":"info","st":"NHÁP","stTone":"ghost"},{"_tab":"issued","code":"RX-24102-3835","pt":"Đỗ T. Hồng · 29t · thai","dx":"O21 · Nghén nặng","meds":2,"cost":"188k","bhyt":"BHYT 100%","bhytTone":"ok","st":"ĐÃ KÊ","stTone":"ok"}];
  const act  = [{"label":"+ Tạo đơn","cls":"p","toast":"Mở form kê đơn mới"},{"label":"🔍 AI kiểm tra","toast":"Quét tương tác thuốc · 284 đơn"},{"label":"📤 Gửi DS QG","toast":"Đồng bộ Đơn thuốc Quốc gia"}];
  const side = {"titleKey":"code","subKey":"pt","emptyTitle":"Chọn đơn thuốc","kvs":[{"lbl":"Chẩn đoán","k":"dx"},{"lbl":"Số thuốc","k":"meds"},{"lbl":"Tổng","k":"cost","mono":true},{"lbl":"BHYT","k":"bhyt"}],"cards":[{"title":"Thuốc trong đơn","items":[{"l":"Amlodipine 5mg","v":"30v · 1v/s"},{"l":"Simvastatin 20mg","v":"30v · 1v/t"},{"l":"Aspirin 81mg","v":"30v · 1v/s"},{"l":"Vit D3 1000 IU","v":"30v · 1v/s"}]},{"title":"Tương tác / cảnh báo","items":[{"l":"Amlodipine × Simvastatin","v":"⚠ Mức 3"},{"l":"Liều tối đa Aspirin","v":"OK"},{"l":"Dị ứng BN","v":"Không"}]}],"actions":[{"label":"✎ Sửa","toast":"Mở đơn $NM để sửa"},{"label":"✓ Duyệt","cls":"ok","toast":"Đã duyệt đơn $NM","tone":"ok"},{"label":"⊘ Huỷ","cls":"crit","toast":"Đã huỷ đơn $NM","tone":"warn"},{"label":"🖨 In","toast":"In đơn $NM"}]};
  const extra = null;
  const [tab, setTab] = uPrescModule_s("all");
  const [sel, setSel] = uPrescModule_s(0);

  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};

  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            
            {tabs.length > 0 && (
              <div className="mod-seg">
                {tabs.map(t => (
                  <button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>
                    {t.label}{t.n != null && <span className="n">{t.n}</span>}
                  </button>
                ))}
              </div>
            )}
            <div className="spacer"/>
            {act.map((a,i) => (
              <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>
            ))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (
                        <td key={j} className={c.cls || c.kind || ""}>
                          {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                          {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                          {c.kind === "bar" && (
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/>
                              </div>
                              <span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span>
                            </div>
                          )}
                          {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu trong tab này.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h">
              <div className="t">{cur[side.titleKey] || side.emptyTitle || "Chọn một dòng"}</div>
              <div className="s">{cur[side.subKey] || side.emptySub || ""}</div>
            </div>
            <div className="mod-side-b">
              {side.kvs && (
                <div className="mod-card">
                  <div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div>
                  <div className="mod-card-b">
                    {side.kvs.map((k,i) => (
                      <div key={i} className="mod-kv">
                        <div className="k">{k.lbl}</div>
                        <div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {side.cards && side.cards.map((card, i) => (
                <div key={i} className="mod-card">
                  <div className="mod-card-h">{card.title}{card.count && <span className="n">{card.count}</span>}</div>
                  <div className={"mod-card-b"}>
                    {card.items && card.items.map((it, j) => (
                      <div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}>
                        <span style={{color:"var(--t-1)"}}>{it.l}</span>
                        <span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {side.actions && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>
                  {side.actions.map((a,i) => (
                    <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.PrescModule = PrescModule;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="prescription" crumb={["Lâm sàng","Kê đơn"]}>
    <PrescModule/>
  </HisShell>
);
</script>
</body>
</html>
