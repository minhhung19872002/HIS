<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"/><title>ATTT — HIS Terminal</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="his-shell.css"/><link rel="stylesheet" href="his-module.css"/></head><body><div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState: uEndpointSecurityMod_s } = React;
const EndpointSecurityMod = () => {
  const kpis=[{"lbl":"Endpoint","val":"482"},{"lbl":"Cảnh báo 24h","val":"28"},{"lbl":"Nghi ngờ","val":"4","tone":"warn"},{"lbl":"Block","val":"2","tone":"crit"}],tabs=[],cols=[{"k":"ts","label":"Thời điểm","cls":"id"},{"k":"host","label":"Máy","cls":"id"},{"k":"evt","label":"Sự kiện","cls":"nm"},{"k":"sev","label":"Mức","kind":"badge"},{"k":"act","label":"Hành động","kind":"stat"}],rows=[{"ts":"14:42:18","host":"WS-OPD-14","evt":"Phát hiện ransomware qua email","sev":"CRITICAL","sevTone":"crit","act":"ĐÃ CÁCH LY","actTone":"ok"},{"ts":"13:28:02","host":"WS-BIL-08","evt":"Login từ IP nước ngoài","sev":"HIGH","sevTone":"warn","act":"ĐANG ĐIỀU TRA","actTone":"warn"},{"ts":"11:12:04","host":"DB-HIS-01","evt":"Quét port bất thường","sev":"MEDIUM","sevTone":"warn","act":"BLOCK","actTone":"ok"}],act=[];

    {kpis.length>0 && (<div className="mod-strip">{kpis.map((k,i)=>(<div key={i} className={"mod-strip-cell "+(k.tone||"")}><div className="lbl">{k.lbl}</div><div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div></div>))}</div>)}
