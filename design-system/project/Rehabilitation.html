<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"/><title>VLTL / PHCN — HIS Terminal</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="his-shell.css"/><link rel="stylesheet" href="his-module.css"/></head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">
const { useState: uRehabilitationMod_s } = React;
const RehabilitationMod = () => {
  const kpis=[{"lbl":"BN đang PHCN","val":"82"},{"lbl":"Lịch T10","val":"484"},{"lbl":"Hoàn thành PT","val":"42"},{"lbl":"Vắng hôm nay","val":"4","tone":"warn"}],tabs=[],cols=[{"k":"code","label":"Mã","cls":"id"},{"k":"pt","label":"BN","cls":"nm"},{"k":"dx","label":"Chẩn đoán"},{"k":"prog","label":"CT PHCN","kind":"badge"},{"k":"ses","label":"Buổi","cls":"id"},{"k":"st","label":"TT","kind":"stat"}],rows=[{"code":"PH-00042","pt":"Phạm V. Hải · BN-0888","dx":"Đột quỵ não giai đoạn 2","prog":"Phục hồi vận động","progTone":"info","ses":"12/24","st":"ĐANG","stTone":"ok"},{"code":"PH-00041","pt":"Vũ M. Tuấn · BN-0533","dx":"Sau mổ thay khớp gối","prog":"Đi lại + gối","progTone":"mag","ses":"6/14","st":"ĐANG","stTone":"ok"},{"code":"PH-00038","pt":"Hoàng V. Nam · BN-0222","dx":"Liệt dây 7 TW","prog":"Mặt","progTone":"ok","ses":"18/18","st":"HOÀN THÀNH","stTone":"ok"}],act=[];
  const side=null;
  const [tab,setTab]=uRehabilitationMod_s("all");
  const [sel,setSel]=uRehabilitationMod_s(0);
  const filtered = tab==="all"?rows:rows.filter(r=>r._tab===tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (<div className="mod-wrap">
    {kpis.length>0 && (<div className="mod-strip">{kpis.map((k,i)=>(<div key={i} className={"mod-strip-cell "+(k.tone||"")}><div className="lbl">{k.lbl}</div><div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div></div>))}</div>)}
    <div className={"mod-body "+(side?"cols-2":"")}><div className="mod-pane">
      <div className="mod-toolbar"><h3>Vật lý trị liệu & Phục hồi chức năng</h3>{tabs.length>0 && (<div className="mod-seg">{tabs.map(t=>(<button key={t.id} className={"mod-seg-i "+(tab===t.id?"on":"")} onClick={()=>{setTab(t.id);setSel(0);}}>{t.label}</button>))}</div>)}<div className="spacer"/>{act.map((a,i)=>(<button key={i} className={"mod-btn "+(a.cls||"")} onClick={()=>HUI.toast(a.toast,{tone:a.tone||"info"})}>{a.label}</button>))}</div>
      <div className="mod-tbl-wrap"><table className="mod-tbl"><thead><tr>{cols.map((c,i)=><th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead><tbody>
        {filtered.map((r,i)=>(<tr key={i} className={sel===i?"sel":""} onClick={()=>setSel(i)}>{cols.map((c,j)=>{const v=r[c.k];return(<td key={j} className={c.cls||c.kind||""}>{c.kind==="stat"&&<span className={"mod-stat "+(r[c.k+"Tone"]||"ghost")}>{v}</span>}{c.kind==="badge"&&<span className={"mod-badge "+(r[c.k+"Tone"]||"")}>{v}</span>}{!c.kind&&(v!=null?v:<span style={{color:"var(--t-3)"}}>—</span>)}</td>);})}</tr>))}
      </tbody></table></div>
    </div></div>
  </div>);
};
window.RehabilitationMod=RehabilitationMod;</script>
<script type="text/babel" data-presets="react">ReactDOM.createRoot(document.getElementById("root")).render(<HisShell route="rehabilitation" crumb={["Hỗ trợ","VLTL / PHCN"]}><RehabilitationMod/></HisShell>);</script>
</body></html>
