<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Cổng bác sĩ — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uDrPortalMod_s } = React;
const DrPortalMod = () => {
  const kpis = [{"lbl":"BN chờ khám","val":"6"},{"lbl":"BN giường","val":"12","sub":"phụ trách"},{"lbl":"Đơn chờ duyệt","val":"3","tone":"warn"},{"lbl":"HSBA chờ ký","val":"4","tone":"crit"},{"lbl":"Thời gian khám TB","val":"9.8′"}];
  const tabs = [{"id":"q","label":"Hàng chờ OPD","n":6},{"id":"ip","label":"BN giường","n":12},{"id":"task","label":"Việc cần làm","n":8},{"id":"sign","label":"Chờ ký số","n":4}];
  const cols = [{"k":"t","label":"Giờ","cls":"id"},{"k":"who","label":"Bệnh nhân / Chủ đề","cls":"nm"},{"k":"kind","label":"Loại","kind":"badge"},{"k":"det","label":"Chi tiết"},{"k":"st","label":"Trạng thái","kind":"stat"}];
  const rows = [{"_tab":"q","t":"15:20","who":"Nguyễn T. Mai · BN-0812","kind":"Tái khám","kindTone":"info","det":"THA · HbA1c 8.2%","st":"ĐANG KHÁM","stTone":"info"},{"_tab":"q","t":"15:35","who":"Trần V. Kế · BN-0666","kind":"Tái khám","kindTone":"info","det":"Suy tim NYHA III","st":"TIẾP THEO","stTone":"warn"},{"_tab":"q","t":"15:50","who":"Hoàng V. Nam · BN-0533","kind":"Khám mới","kindTone":"ok","det":"Đau ngực 3 ngày","st":"CHỜ","stTone":"ghost"},{"_tab":"q","t":"16:05","who":"Đào T. Hà · BN-0189","kind":"Tái khám","kindTone":"info","det":"ĐTĐ 2 + suy tim","st":"CHỜ","stTone":"ghost"},{"_tab":"ip","t":"Giường 203-A","who":"Lê V. Hòa · BN-0945 · ngày 3","kind":"Nội trú","kindTone":"mag","det":"NMCT sau ST không chênh","st":"ỔN ĐỊNH","stTone":"ok"},{"_tab":"ip","t":"Giường 205-B","who":"Vũ T. Hồng · BN-0702 · ngày 1","kind":"Nội trú","kindTone":"mag","det":"Cơn đau thắt ngực","st":"THEO DÕI","stTone":"warn"},{"_tab":"task","t":"—","who":"Duyệt đơn RX-24102-3839","kind":"Việc","kindTone":"warn","det":"ĐTĐ 2 + I25 · 6 thuốc","st":"CHỜ DUYỆT","stTone":"warn"},{"_tab":"task","t":"—","who":"Phản hồi y lệnh CLS 11:42","kind":"Việc","kindTone":"warn","det":"LIS nguy cấp · K=6.2","st":"KHẨN","stTone":"crit"},{"_tab":"sign","t":"—","who":"HSBA BN-0945 · tóm tắt ra viện","kind":"Ký số","kindTone":"info","det":"3 trang · đã soạn","st":"CHỜ KÝ","stTone":"warn"}];
  const act  = [{"label":"▶ Gọi BN tiếp","cls":"p","toast":"Gọi BN tiếp theo trong hàng chờ"},{"label":"📝 Ghi BA nhanh","toast":"Mở ghi BA nhanh"},{"label":"🖊 Ký tất cả","toast":"Ký số 4 HSBA","tone":"ok"}];
  const side = {"titleKey":"who","subKey":"det","kvs":[{"lbl":"Loại","k":"kind"},{"lbl":"Giờ/Vị trí","k":"t","mono":true},{"lbl":"Trạng thái","k":"st"}],"cards":[{"title":"Tóm tắt BN","items":[{"l":"Tuổi / Giới","v":"58 · Nữ"},{"l":"BHYT","v":"HT2 · Hết hạn 06/2027"},{"l":"Dị ứng","v":"Penicillin"},{"l":"Tiền sử","v":"THA 3 năm · RLLM"},{"l":"Khám gần nhất","v":"15/10/2026"}]},{"title":"Thuốc đang dùng","items":[{"l":"Amlodipine 5mg","v":"1v/s"},{"l":"Atorvastatin 10mg","v":"1v/t"},{"l":"Aspirin 81mg","v":"1v/s"}]}],"actions":[{"label":"✎ Vào BA","cls":"p","toast":"Mở BA $NM"},{"label":"💊 Kê đơn","toast":"Kê đơn cho $NM"},{"label":"🧪 Chỉ định CLS","toast":"Chỉ định CLS cho $NM"},{"label":"📤 Chuyển tuyến","toast":"Chuyển tuyến $NM"}]};
  const [tab, setTab] = uDrPortalMod_s("q");
  const [sel, setSel] = uDrPortalMod_s(0);
  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>Trang chính của Bác sĩ · BS. Phạm Hải · Tim mạch</h3>
            {tabs.length > 0 && (
              <div className="mod-seg">
                {tabs.map(t => (
                  <button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>
                    {t.label}{t.n != null && <span className="n">{t.n}</span>}
                  </button>
                ))}
              </div>
            )}
            <div className="spacer"/>
            {act.map((a,i) => (
              <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>
            ))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (
                        <td key={j} className={c.cls || c.kind || ""}>
                          {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                          {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                          {c.kind === "bar" && (
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/>
                              </div>
                              <span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span>
                            </div>
                          )}
                          {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h">
              <div className="t">{cur[side.titleKey] || side.emptyTitle || "Chọn một dòng"}</div>
              <div className="s">{cur[side.subKey] || ""}</div>
            </div>
            <div className="mod-side-b">
              {side.kvs && (
                <div className="mod-card">
                  <div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div>
                  <div className="mod-card-b">
                    {side.kvs.map((k,i) => (
                      <div key={i} className="mod-kv">
                        <div className="k">{k.lbl}</div>
                        <div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {side.cards && side.cards.map((card, i) => (
                <div key={i} className="mod-card">
                  <div className="mod-card-h">{card.title}{card.count && <span className="n">{card.count}</span>}</div>
                  <div className={"mod-card-b"}>
                    {card.items && card.items.map((it, j) => (
                      <div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}>
                        <span style={{color:"var(--t-1)"}}>{it.l}</span>
                        <span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {side.actions && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>
                  {side.actions.map((a,i) => (
                    <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.DrPortalMod = DrPortalMod;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="doctor-portal" crumb={["Lâm sàng","Cổng bác sĩ"]}>
    <DrPortalMod/>
  </HisShell>
);
</script>
</body>
</html>
