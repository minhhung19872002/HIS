<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>BA chuyên khoa — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uSpecEMR_s } = React;
const SpecEMR = () => {
  const kpis = [{"lbl":"Mẫu đang dùng","val":"24","sub":"mẫu khoa"},{"lbl":"BA lập hôm nay","val":"42"},{"lbl":"Đang soạn","val":"8","tone":"warn"},{"lbl":"Ký số hoàn tất","val":"89%","delta":"+2% tháng","dir":"up"}];
  const tabs = [{"id":"all","label":"Tất cả khoa","n":24},{"id":"tim","label":"Tim mạch","n":4},{"id":"san","label":"Sản","n":5},{"id":"nhi","label":"Nhi","n":4},{"id":"ngoai","label":"Ngoại","n":6},{"id":"tmh","label":"TMH","n":2},{"id":"mat","label":"Mắt","n":3}];
  const cols = [{"k":"code","label":"Mã mẫu","cls":"id"},{"k":"nm","label":"Tên mẫu","cls":"nm"},{"k":"dept","label":"Khoa"},{"k":"ver","label":"Phiên bản","cls":"id"},{"k":"used","label":"Lượt dùng","cls":"num"},{"k":"upd","label":"Cập nhật","cls":"id"},{"k":"st","label":"Trạng thái","kind":"stat"}];
  const rows = [{"_tab":"tim","code":"TIM-ECG","nm":"BA Điện tim / Holter ECG","dept":"Tim mạch","ver":"v2.3","used":482,"upd":"12/09/2026","st":"ĐANG DÙNG","stTone":"ok"},{"_tab":"tim","code":"TIM-ECHO","nm":"BA Siêu âm tim","dept":"Tim mạch","ver":"v1.8","used":318,"upd":"02/10/2026","st":"ĐANG DÙNG","stTone":"ok"},{"_tab":"tim","code":"TIM-TPT","nm":"BA Thông tim can thiệp","dept":"Tim mạch","ver":"v1.2","used":62,"upd":"18/10/2026","st":"CẬP NHẬT MỚI","stTone":"info"},{"_tab":"san","code":"SAN-KBT","nm":"BA Khám thai định kỳ","dept":"Sản","ver":"v3.1","used":824,"upd":"05/09/2026","st":"ĐANG DÙNG","stTone":"ok"},{"_tab":"san","code":"SAN-SINH","nm":"BA Theo dõi chuyển dạ","dept":"Sản","ver":"v2.0","used":186,"upd":"28/08/2026","st":"ĐANG DÙNG","stTone":"ok"},{"_tab":"nhi","code":"NHI-SS","nm":"BA Sơ sinh đủ tháng","dept":"Nhi","ver":"v2.4","used":142,"upd":"22/09/2026","st":"ĐANG DÙNG","stTone":"ok"},{"_tab":"nhi","code":"NHI-TIEM","nm":"BA Tiêm chủng nhi","dept":"Nhi","ver":"v1.5","used":298,"upd":"14/10/2026","st":"ĐANG DÙNG","stTone":"ok"},{"_tab":"ngoai","code":"NGT-MO","nm":"BA Phẫu thuật tổng quát","dept":"Ngoại TQ","ver":"v2.1","used":88,"upd":"10/10/2026","st":"ĐANG DÙNG","stTone":"ok"},{"_tab":"ngoai","code":"NGT-CT","nm":"BA Chấn thương chi","dept":"Ngoại CT","ver":"v1.7","used":64,"upd":"30/09/2026","st":"ĐANG DÙNG","stTone":"ok"},{"_tab":"tmh","code":"TMH-VTH","nm":"BA Viêm tai giữa","dept":"TMH","ver":"v1.4","used":124,"upd":"15/09/2026","st":"ĐANG DÙNG","stTone":"ok"},{"_tab":"mat","code":"MAT-DT","nm":"BA Đo thị lực / khúc xạ","dept":"Mắt","ver":"v1.9","used":212,"upd":"08/10/2026","st":"ĐANG DÙNG","stTone":"ok"},{"_tab":"tim","code":"TIM-SC","nm":"BA Suy tim mạn","dept":"Tim mạch","ver":"v0.9","used":0,"upd":"24/10/2026","st":"SOẠN THẢO","stTone":"warn"}];
  const act  = [{"label":"+ Mẫu mới","cls":"p","toast":"Mở form tạo mẫu BA chuyên khoa"},{"label":"📋 Thư viện mẫu","toast":"Mở thư viện mẫu toàn quốc"}];
  const side = {"titleKey":"nm","subKey":"dept","kvs":[{"lbl":"Mã mẫu","k":"code","mono":true},{"lbl":"Phiên bản","k":"ver","mono":true},{"lbl":"Lượt dùng","k":"used"},{"lbl":"Cập nhật","k":"upd","mono":true}],"cards":[{"title":"Cấu trúc mẫu","items":[{"l":"Phần hành chính","v":"8 trường"},{"l":"Tiền sử","v":"6 trường"},{"l":"Khám lâm sàng","v":"24 trường"},{"l":"Cận lâm sàng","v":"12 trường"},{"l":"Chẩn đoán / Xử trí","v":"10 trường"},{"l":"Ghi chú ký số","v":"BS + QL khoa"}]},{"title":"Quyền sử dụng","items":[{"l":"Khoa Tim mạch","v":"14 BS"},{"l":"Khoa HSTC","v":"6 BS"},{"l":"Cấp cứu (chỉ đọc)","v":"Bật"}]}],"actions":[{"label":"✎ Sửa mẫu","toast":"Mở trình soạn mẫu · $NM"},{"label":"📋 Nhân bản","toast":"Nhân bản mẫu $NM"},{"label":"👁 Xem trước","toast":"Preview $NM"},{"label":"⊘ Lưu trữ","cls":"crit","toast":"Lưu trữ $NM","tone":"warn"}]};
  const extra = null;
  const [tab, setTab] = uSpecEMR_s("all");
  const [sel, setSel] = uSpecEMR_s(0);

  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};

  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>Bệnh án chuyên khoa · mẫu theo khoa</h3>
            {tabs.length > 0 && (
              <div className="mod-seg">
                {tabs.map(t => (
                  <button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>
                    {t.label}{t.n != null && <span className="n">{t.n}</span>}
                  </button>
                ))}
              </div>
            )}
            <div className="spacer"/>
            {act.map((a,i) => (
              <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>
            ))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (
                        <td key={j} className={c.cls || c.kind || ""}>
                          {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                          {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                          {c.kind === "bar" && (
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/>
                              </div>
                              <span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span>
                            </div>
                          )}
                          {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu trong tab này.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h">
              <div className="t">{cur[side.titleKey] || side.emptyTitle || "Chọn một dòng"}</div>
              <div className="s">{cur[side.subKey] || side.emptySub || ""}</div>
            </div>
            <div className="mod-side-b">
              {side.kvs && (
                <div className="mod-card">
                  <div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div>
                  <div className="mod-card-b">
                    {side.kvs.map((k,i) => (
                      <div key={i} className="mod-kv">
                        <div className="k">{k.lbl}</div>
                        <div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {side.cards && side.cards.map((card, i) => (
                <div key={i} className="mod-card">
                  <div className="mod-card-h">{card.title}{card.count && <span className="n">{card.count}</span>}</div>
                  <div className={"mod-card-b"}>
                    {card.items && card.items.map((it, j) => (
                      <div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}>
                        <span style={{color:"var(--t-1)"}}>{it.l}</span>
                        <span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {side.actions && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>
                  {side.actions.map((a,i) => (
                    <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.SpecEMR = SpecEMR;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="specialty-emr" crumb={["Lâm sàng","BA chuyên khoa"]}>
    <SpecEMR/>
  </HisShell>
);
</script>
</body>
</html>
