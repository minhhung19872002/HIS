<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Nhân sự — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uHRMod_s } = React;
const HRMod = () => {
  const kpis = [{"lbl":"Tổng CBNV","val":"482"},{"lbl":"Bác sĩ","val":"128","sub":"26.6%"},{"lbl":"Điều dưỡng","val":"214","sub":"44.4%"},{"lbl":"Nghỉ phép hôm nay","val":"14","tone":"warn"},{"lbl":"Hợp đồng hết hạn 30d","val":"6","tone":"warn"}];
  const tabs = [{"id":"all","label":"Tất cả","n":482},{"id":"bs","label":"Bác sĩ","n":128},{"id":"dd","label":"Điều dưỡng","n":214},{"id":"kt","label":"Kỹ thuật viên","n":62},{"id":"ht","label":"Hành chính","n":78},{"id":"of","label":"Đang nghỉ","n":14}];
  const cols = [{"k":"code","label":"Mã NV","cls":"id"},{"k":"nm","label":"Họ tên","cls":"nm"},{"k":"pos","label":"Chức danh"},{"k":"dept","label":"Khoa/phòng"},{"k":"lic","label":"CCHN","cls":"id"},{"k":"ct","label":"HĐ","kind":"badge"},{"k":"st","label":"Trạng thái","kind":"stat"}];
  const rows = [{"_tab":"bs","code":"NV-00284","nm":"BS. Phạm Văn Hải","pos":"BS CK1 Tim mạch","dept":"Tim mạch","lic":"014820-2018","ct":"Biên chế","ctTone":"ok","st":"ĐANG LÀM","stTone":"ok"},{"_tab":"bs","code":"NV-00318","nm":"BS. Trần Thị Lan","pos":"BS CK2 Sản","dept":"Sản","lic":"018241-2015","ct":"Biên chế","ctTone":"ok","st":"ĐANG LÀM","stTone":"ok"},{"_tab":"bs","code":"NV-00442","nm":"BS. Hoàng Thị Mai","pos":"BS Nội TQ","dept":"Nội TQ","lic":"024182-2020","ct":"HĐLĐ","ctTone":"info","st":"ĐANG LÀM","stTone":"ok"},{"_tab":"bs","code":"NV-00482","nm":"BS. Nguyễn Văn Bảo","pos":"BS Hô hấp","dept":"Nội hô hấp","lic":"028184-2022","ct":"Tập sự","ctTone":"warn","st":"ĐANG LÀM","stTone":"ok"},{"_tab":"dd","code":"NV-00612","nm":"ĐD. Nguyễn Thị Hoa","pos":"ĐD trưởng","dept":"HSTC","lic":"031820-2016","ct":"Biên chế","ctTone":"ok","st":"ĐANG LÀM","stTone":"ok"},{"_tab":"dd","code":"NV-00724","nm":"ĐD. Vũ Thị Thu","pos":"Điều dưỡng","dept":"Nội","lic":"042820-2019","ct":"HĐLĐ","ctTone":"info","st":"NGHỈ PHÉP","stTone":"warn"},{"_tab":"kt","code":"NV-00812","nm":"KTV. Trần Văn Đạt","pos":"KTV XN sinh hoá","dept":"Xét nghiệm","lic":"CCVL-0124","ct":"Biên chế","ctTone":"ok","st":"ĐANG LÀM","stTone":"ok"},{"_tab":"ht","code":"NV-00028","nm":"Lê Văn Minh","pos":"Trưởng P.KHTH","dept":"KHTH","lic":"—","ct":"Biên chế","ctTone":"ok","st":"ĐANG LÀM","stTone":"ok"},{"_tab":"of","code":"NV-00724","nm":"ĐD. Vũ Thị Thu","pos":"Điều dưỡng","dept":"Nội","lic":"042820-2019","ct":"HĐLĐ","ctTone":"info","st":"NGHỈ PHÉP","stTone":"warn"}];
  const act  = [{"label":"+ Thêm NV","cls":"p","toast":"Mở form thêm nhân viên"},{"label":"📋 Xuất DS CCHN","toast":"Xuất danh sách CCHN"},{"label":"⚠ HĐ hết hạn","toast":"Xem 6 HĐ hết hạn"}];
  const side = {"titleKey":"nm","subKey":"dept","kvs":[{"lbl":"Mã NV","k":"code","mono":true},{"lbl":"Chức danh","k":"pos"},{"lbl":"CCHN","k":"lic","mono":true},{"lbl":"Loại HĐ","k":"ct"},{"lbl":"Trạng thái","k":"st"}],"cards":[{"title":"Thông tin HĐ","items":[{"l":"Ngày vào làm","v":"15/08/2018"},{"l":"HĐ hiện tại","v":"BC · từ 01/01/2022"},{"l":"Lương cơ bản","v":"Bậc 5 · hệ số 4.98"},{"l":"PC đặc thù","v":"40%"}]},{"title":"Đào tạo - CCHN","items":[{"l":"CCHN chính","v":"Nội khoa · 2018"},{"l":"CCHN bổ sung","v":"Tim mạch · 2022"},{"l":"GD liên tục CME","v":"44/48 giờ 2026"},{"l":"Ngoại ngữ","v":"B1 tiếng Anh"}]}],"actions":[{"label":"📄 Hồ sơ","cls":"p","toast":"Mở hồ sơ $NM"},{"label":"📅 Chấm công","toast":"Chấm công $NM"},{"label":"🎓 Đào tạo","toast":"Đào tạo $NM"},{"label":"⊘ Tạm dừng","cls":"crit","toast":"Tạm dừng $NM","tone":"warn"}]};
  const [tab, setTab] = uHRMod_s("all");
  const [sel, setSel] = uHRMod_s(0);
  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>Quản lý nhân sự · 482 CBNV</h3>
            {tabs.length > 0 && (
              <div className="mod-seg">
                {tabs.map(t => (
                  <button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>
                    {t.label}{t.n != null && <span className="n">{t.n}</span>}
                  </button>
                ))}
              </div>
            )}
            <div className="spacer"/>
            {act.map((a,i) => (
              <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>
            ))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (
                        <td key={j} className={c.cls || c.kind || ""}>
                          {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                          {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                          {c.kind === "bar" && (
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/>
                              </div>
                              <span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span>
                            </div>
                          )}
                          {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h">
              <div className="t">{cur[side.titleKey] || "Chọn dòng"}</div>
              <div className="s">{cur[side.subKey] || ""}</div>
            </div>
            <div className="mod-side-b">
              {side.kvs && (
                <div className="mod-card">
                  <div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div>
                  <div className="mod-card-b">
                    {side.kvs.map((k,i) => (
                      <div key={i} className="mod-kv">
                        <div className="k">{k.lbl}</div>
                        <div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {side.cards && side.cards.map((card, i) => (
                <div key={i} className="mod-card">
                  <div className="mod-card-h">{card.title}{card.count && <span className="n">{card.count}</span>}</div>
                  <div className={"mod-card-b"}>
                    {card.items && card.items.map((it, j) => (
                      <div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}>
                        <span style={{color:"var(--t-1)"}}>{it.l}</span>
                        <span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {side.actions && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>
                  {side.actions.map((a,i) => (
                    <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.HRMod = HRMod;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="hr" crumb={["Quản trị","Nhân sự"]}>
    <HRMod/>
  </HisShell>
);
</script>
</body>
</html>
