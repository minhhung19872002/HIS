<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>API Gateway — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uApiGwMod_s } = React;
const ApiGwMod = () => {
  const kpis = [{"lbl":"Request/phút","val":"8,420"},{"lbl":"4xx","val":"42","tone":"warn"},{"lbl":"5xx","val":"2","tone":"crit"},{"lbl":"P99 latency","val":"182ms"},{"lbl":"Đã khoá (rate-limit)","val":"4","tone":"info"}];
  const tabs = [{"id":"all","label":"Tất cả"},{"id":"pub","label":"Public","n":18},{"id":"int","label":"Nội bộ","n":42},{"id":"part","label":"Đối tác","n":8}];
  const cols = [{"k":"path","label":"Endpoint","cls":"mono"},{"k":"mthd","label":"Method","kind":"badge"},{"k":"rate","label":"Rate limit","cls":"id"},{"k":"rpm","label":"RPM","cls":"num"},{"k":"p99","label":"P99","cls":"mono"},{"k":"err","label":"Lỗi %","cls":"num"},{"k":"st","label":"Trạng thái","kind":"stat"}];
  const rows = [{"_tab":"pub","path":"/v1/patients/search","mthd":"GET","mthdTone":"ok","rate":"100/s","rpm":1284,"p99":"42ms","err":"0.02%","st":"OK","stTone":"ok"},{"_tab":"pub","path":"/v1/appointments","mthd":"POST","mthdTone":"info","rate":"50/s","rpm":418,"p99":"128ms","err":"0.8%","st":"OK","stTone":"ok"},{"_tab":"int","path":"/internal/lis/results","mthd":"POST","mthdTone":"info","rate":"200/s","rpm":3428,"p99":"28ms","err":"0.01%","st":"OK","stTone":"ok"},{"_tab":"int","path":"/internal/pacs/worklist","mthd":"GET","mthdTone":"ok","rate":"100/s","rpm":218,"p99":"184ms","err":"0.4%","st":"OK","stTone":"ok"},{"_tab":"part","path":"/partner/bhxh/eligibility","mthd":"POST","mthdTone":"info","rate":"20/s","rpm":142,"p99":"824ms","err":"1.2%","st":"CHẬM","stTone":"warn"},{"_tab":"part","path":"/partner/zalo/notify","mthd":"POST","mthdTone":"info","rate":"50/s","rpm":482,"p99":"218ms","err":"0.8%","st":"OK","stTone":"ok"}];
  const act  = [{"label":"🔑 Quản lý API key","cls":"p","toast":"Mở quản lý API key"},{"label":"📊 Log","toast":"Mở log"}];
  const side = {"titleKey":"path","subKey":"mthd","kvs":[{"lbl":"Method","k":"mthd"},{"lbl":"Rate limit","k":"rate","mono":true},{"lbl":"RPM hiện tại","k":"rpm"},{"lbl":"P99","k":"p99","mono":true},{"lbl":"Lỗi %","k":"err"}],"cards":[{"title":"Top consumers 24h","items":[{"l":"App BN (Zalo)","v":"2.4M req"},{"l":"Trang Y bạ điện tử","v":"1.8M"},{"l":"Hotline","v":"428k"},{"l":"Partner BHXH","v":"284k"}]}],"actions":[{"label":"📊 Chi tiết","cls":"p","toast":"Chi tiết $NM"},{"label":"⛔ Khoá","cls":"crit","toast":"Khoá $NM","tone":"warn"}]};
  const [tab, setTab] = uApiGwMod_s("all");
  const [sel, setSel] = uApiGwMod_s(0);
  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>API Gateway · 68 endpoints · 14 API key</h3>
            {tabs.length > 0 && (<div className="mod-seg">{tabs.map(t => (<button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>{t.label}{t.n != null && <span className="n">{t.n}</span>}</button>))}</div>)}
            <div className="spacer"/>
            {act.map((a,i) => (<button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (<td key={j} className={c.cls || c.kind || ""}>
                        {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                        {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                        {c.kind === "bar" && (<div style={{display:"flex",alignItems:"center",gap:8}}><div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/></div><span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span></div>)}
                        {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                      </td>);
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h"><div className="t">{cur[side.titleKey] || "Chọn dòng"}</div><div className="s">{cur[side.subKey] || ""}</div></div>
            <div className="mod-side-b">
              {side.kvs && (<div className="mod-card"><div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div><div className="mod-card-b">{side.kvs.map((k,i) => (<div key={i} className="mod-kv"><div className="k">{k.lbl}</div><div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div></div>))}</div></div>)}
              {side.cards && side.cards.map((card, i) => (<div key={i} className="mod-card"><div className="mod-card-h">{card.title}</div><div className="mod-card-b">{card.items.map((it, j) => (<div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}><span style={{color:"var(--t-1)"}}>{it.l}</span><span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span></div>))}</div></div>))}
              {side.actions && (<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>{side.actions.map((a,i) => (<button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>))}</div>)}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.ApiGwMod = ApiGwMod;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="api-gw" crumb={["Tích hợp","API Gateway"]}>
    <ApiGwMod/>
  </HisShell>
);
</script>
</body>
</html>
