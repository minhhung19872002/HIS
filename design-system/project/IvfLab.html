<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"/><title>Lab IVF — HIS Terminal</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="his-shell.css"/><link rel="stylesheet" href="his-module.css"/></head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">
const { useState: uIvfLabMod_s } = React;
const IvfLabMod = () => {
  const kpis=[{"lbl":"Cặp đang điều trị","val":"42"},{"lbl":"Chọc hút tuần","val":"8"},{"lbl":"Phôi tạo tuần","val":"184"},{"lbl":"Phôi trữ đông","val":"284"}],tabs=[],cols=[{"k":"code","label":"Mã cặp","cls":"id"},{"k":"nm","label":"Cặp vợ chồng","cls":"nm"},{"k":"cycle","label":"Chu kỳ","cls":"id"},{"k":"stg","label":"Giai đoạn","kind":"badge"},{"k":"oo","label":"Noãn","cls":"num"},{"k":"emb","label":"Phôi","cls":"num"},{"k":"st","label":"TT","kind":"stat"}],rows=[{"code":"IVF-0042","nm":"Nguyễn V. A & Trần T. B","cycle":"#2","stg":"Kích trứng","stgTone":"info","oo":"—","emb":"—","st":"ĐANG KÍCH","stTone":"info"},{"code":"IVF-0038","nm":"Lê V. M & Vũ T. H","cycle":"#1","stg":"Chuyển phôi","stgTone":"mag","oo":"12","emb":"4 blast","st":"CHUYỂN 24/10","stTone":"warn"},{"code":"IVF-0028","nm":"Phạm V. T & Đỗ T. L","cycle":"#3","stg":"Trữ phôi","stgTone":"ok","oo":"8","emb":"2 trữ","st":"ĐÔNG","stTone":"ok"}],act=[];
  const side=null;
  const [tab,setTab]=uIvfLabMod_s("all");
  const [sel,setSel]=uIvfLabMod_s(0);
  const filtered = tab==="all"?rows:rows.filter(r=>r._tab===tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (<div className="mod-wrap">
    {kpis.length>0 && (<div className="mod-strip">{kpis.map((k,i)=>(<div key={i} className={"mod-strip-cell "+(k.tone||"")}><div className="lbl">{k.lbl}</div><div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div></div>))}</div>)}
    <div className={"mod-body "+(side?"cols-2":"")}><div className="mod-pane">
      <div className="mod-toolbar"><h3>Phòng Lab IVF — chọc hút, thụ tinh, cấy phôi, đông phôi</h3>{tabs.length>0 && (<div className="mod-seg">{tabs.map(t=>(<button key={t.id} className={"mod-seg-i "+(tab===t.id?"on":"")} onClick={()=>{setTab(t.id);setSel(0);}}>{t.label}</button>))}</div>)}<div className="spacer"/>{act.map((a,i)=>(<button key={i} className={"mod-btn "+(a.cls||"")} onClick={()=>HUI.toast(a.toast,{tone:a.tone||"info"})}>{a.label}</button>))}</div>
      <div className="mod-tbl-wrap"><table className="mod-tbl"><thead><tr>{cols.map((c,i)=><th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead><tbody>
        {filtered.map((r,i)=>(<tr key={i} className={sel===i?"sel":""} onClick={()=>setSel(i)}>{cols.map((c,j)=>{const v=r[c.k];return(<td key={j} className={c.cls||c.kind||""}>{c.kind==="stat"&&<span className={"mod-stat "+(r[c.k+"Tone"]||"ghost")}>{v}</span>}{c.kind==="badge"&&<span className={"mod-badge "+(r[c.k+"Tone"]||"")}>{v}</span>}{!c.kind&&(v!=null?v:<span style={{color:"var(--t-3)"}}>—</span>)}</td>);})}</tr>))}
      </tbody></table></div>
    </div></div>
  </div>);
};
window.IvfLabMod=IvfLabMod;</script>
<script type="text/babel" data-presets="react">ReactDOM.createRoot(document.getElementById("root")).render(<HisShell route="ivf-lab" crumb={["Cận lâm sàng","Phòng Lab IVF"]}><IvfLabMod/></HisShell>);</script>
</body></html>
