<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"/><title>Tiêm chủng — HIS Terminal</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="his-shell.css"/><link rel="stylesheet" href="his-module.css"/></head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">
const { useState: uImmunizationMod_s } = React;
const ImmunizationMod = () => {
  const kpis=[{"lbl":"Mũi tiêm T10","val":"2,842"},{"lbl":"Trẻ đủ mũi <1 tuổi","val":"98.4%","tone":"ok"},{"lbl":"Hết vắc xin","val":"0 loại","tone":"ok"},{"lbl":"Phản ứng sau tiêm","val":"2","tone":"warn"}],tabs=[{"id":"child","label":"Trẻ em"},{"id":"adult","label":"Người lớn"},{"id":"cov","label":"COVID-19"},{"id":"vac","label":"Kho vắc xin"}],cols=[{"k":"code","label":"Mã BN","cls":"id"},{"k":"nm","label":"Họ tên","cls":"nm"},{"k":"age","label":"Tuổi"},{"k":"vac","label":"Vắc xin","kind":"badge"},{"k":"dose","label":"Mũi"},{"k":"date","label":"Ngày tiêm"},{"k":"st","label":"TT","kind":"stat"}],rows=[{"_tab":"child","code":"TC-00284","nm":"B. Nguyễn G. Bảo","age":"2 tháng","vac":"5in1","vacTone":"info","dose":"1","date":"24/10 09:20","st":"ĐÃ TIÊM","stTone":"ok"},{"_tab":"child","code":"TC-00283","nm":"B. Trần M. Anh","age":"6 tháng","vac":"Sởi","vacTone":"warn","dose":"1","date":"24/10 10:12","st":"THEO DÕI","stTone":"warn"},{"_tab":"adult","code":"TC-00282","nm":"Lê T. Hương","age":"28","vac":"HPV","vacTone":"mag","dose":"2","date":"24/10 14:20","st":"ĐÃ TIÊM","stTone":"ok"}],act=[];
  const [tab,setTab]=uImmunizationMod_s("child");
  const [sel,setSel]=uImmunizationMod_s(0);
  const filtered = tab==="all"?rows:rows.filter(r=>r._tab===tab);
  return (<div className="mod-wrap">
    {kpis.length>0 && (<div className="mod-strip">{kpis.map((k,i)=>(<div key={i} className={"mod-strip-cell "+(k.tone||"")}><div className="lbl">{k.lbl}</div><div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div></div>))}</div>)}
    <div className="mod-body"><div className="mod-pane">
      <div className="mod-toolbar"><h3>Chương trình tiêm chủng mở rộng (TCMR) + dịch vụ</h3>{tabs.length>0 && (<div className="mod-seg">{tabs.map(t=>(<button key={t.id} className={"mod-seg-i "+(tab===t.id?"on":"")} onClick={()=>{setTab(t.id);setSel(0);}}>{t.label}</button>))}</div>)}<div className="spacer"/>{act.map((a,i)=>(<button key={i} className={"mod-btn "+(a.cls||"")} onClick={()=>HUI.toast(a.toast,{tone:a.tone||"info"})}>{a.label}</button>))}</div>
      <div className="mod-tbl-wrap"><table className="mod-tbl"><thead><tr>{cols.map((c,i)=><th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead><tbody>
        {filtered.map((r,i)=>(<tr key={i} className={sel===i?"sel":""} onClick={()=>setSel(i)}>{cols.map((c,j)=>{const v=r[c.k];return(<td key={j} className={c.cls||c.kind||""}>{c.kind==="stat"&&<span className={"mod-stat "+(r[c.k+"Tone"]||"ghost")}>{v}</span>}{c.kind==="badge"&&<span className={"mod-badge "+(r[c.k+"Tone"]||"")}>{v}</span>}{!c.kind&&(v!=null?v:<span style={{color:"var(--t-3)"}}>—</span>)}</td>);})}</tr>))}
      </tbody></table></div>
    </div></div>
  </div>);
};
window.ImmunizationMod = ImmunizationMod;</script>
<script type="text/babel" data-presets="react">ReactDOM.createRoot(document.getElementById("root")).render(<HisShell route="immunization" crumb={["YTCC","Tiêm chủng"]}><ImmunizationMod/></HisShell>);</script>
</body></html>
