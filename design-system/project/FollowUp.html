<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Tái khám — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uFollowUpMod_s } = React;
const FollowUpMod = () => {
  const kpis = [{"lbl":"Tái khám hôm nay","val":"38"},{"lbl":"Đã đến","val":"21","tone":"ok"},{"lbl":"Chưa đến","val":"11","tone":"warn"},{"lbl":"Không đến (no-show)","val":"6","tone":"crit","delta":"15.7%","dir":"down"},{"lbl":"SMS/Zalo đã gửi","val":"142","sub":"đêm qua","delta":"97% giao","dir":"up"}];
  const tabs = [{"id":"all","label":"Tất cả"},{"id":"tod","label":"Hôm nay","n":38},{"id":"over","label":"Quá hạn","n":14},{"id":"next","label":"Tuần tới","n":186},{"id":"miss","label":"Đã bỏ hẹn","n":42}];
  const cols = [{"k":"code","label":"Mã","cls":"id"},{"k":"pt","label":"Bệnh nhân","cls":"nm"},{"k":"dx","label":"Chẩn đoán"},{"k":"dr","label":"BS. chỉ định"},{"k":"sch","label":"Lịch hẹn","cls":"id"},{"k":"ch","label":"Kênh","kind":"badge"},{"k":"st","label":"Trạng thái","kind":"stat"}];
  const rows = [{"_tab":"tod","code":"FU-2411-012","pt":"Nguyễn T. Mai · 58t","dx":"I10 · THA","dr":"BS. Phạm Hải","sch":"24/10 14:00","ch":"Zalo","chTone":"info","st":"ĐÃ ĐẾN","stTone":"ok"},{"_tab":"tod","code":"FU-2411-011","pt":"Trần V. Hùng · 42t","dx":"E11 · ĐTĐ 2","dr":"BS. Hoàng Mai","sch":"24/10 15:30","ch":"SMS","chTone":"","st":"CHƯA ĐẾN","stTone":"warn"},{"_tab":"tod","code":"FU-2411-010","pt":"Lê V. Hòa · 38t","dx":"K29 · Viêm dạ dày","dr":"BS. Lê Tuấn","sch":"24/10 10:00","ch":"Gọi","chTone":"mag","st":"KHÔNG ĐẾN","stTone":"crit"},{"_tab":"over","code":"FU-2410-284","pt":"Phạm T. Lan · 34t","dx":"O21 · Thai nghén","dr":"BS. Trần Lan","sch":"20/10 08:00","ch":"Zalo","chTone":"info","st":"QUÁ HẠN 4 NGÀY","stTone":"crit"},{"_tab":"over","code":"FU-2410-281","pt":"Vũ M. Tuấn · 28t","dx":"J45 · Hen","dr":"BS. Bảo","sch":"18/10 09:30","ch":"SMS","chTone":"","st":"QUÁ HẠN 6 NGÀY","stTone":"crit"},{"_tab":"next","code":"FU-2411-128","pt":"Hoàng V. Nam · 48t","dx":"I25 · BMV","dr":"BS. Phạm Hải","sch":"28/10 10:00","ch":"Zalo","chTone":"info","st":"ĐÃ NHẮC","stTone":"info"},{"_tab":"next","code":"FU-2411-129","pt":"Đỗ T. Hồng · 29t","dx":"O21","dr":"BS. Trần Lan","sch":"29/10 08:30","ch":"Zalo","chTone":"info","st":"CHỜ NHẮC","stTone":"ghost"},{"_tab":"miss","code":"FU-2410-198","pt":"Nguyễn N. Bích · 52t","dx":"I10","dr":"BS. Phạm Hải","sch":"15/10 09:00","ch":"SMS","chTone":"","st":"NO-SHOW 2 LẦN","stTone":"warn"}];
  const act  = [{"label":"+ Đặt lịch tái khám","cls":"p","toast":"Mở form đặt lịch tái khám"},{"label":"📱 Gửi nhắc","toast":"Gửi nhắc SMS/Zalo · 11 BN chưa đến"},{"label":"📊 BC No-show","toast":"Xuất báo cáo no-show"}];
  const side = {"titleKey":"pt","subKey":"dx","kvs":[{"lbl":"Mã tái khám","k":"code","mono":true},{"lbl":"Lịch hẹn","k":"sch","mono":true},{"lbl":"BS. chỉ định","k":"dr"},{"lbl":"Kênh nhắc","k":"ch"}],"cards":[{"title":"Lịch sử nhắc","items":[{"l":"Zalo · 7 ngày trước","v":"✓ Đã đọc","mono":true},{"l":"Zalo · 24h trước","v":"✓ Đã đọc","mono":true},{"l":"SMS · 2h trước","v":"✓ Giao","mono":true}]},{"title":"Điều trị hiện tại","items":[{"l":"Chỉ định gần nhất","v":"20/09/2026"},{"l":"Đơn thuốc cuối","v":"RX-24092-1840"},{"l":"CLS chờ kết quả","v":"Sinh hoá máu"}]}],"actions":[{"label":"📞 Gọi BN","cls":"p","toast":"Gọi $NM"},{"label":"📱 Gửi Zalo","toast":"Gửi Zalo · $NM"},{"label":"✓ Đánh dấu đến","cls":"ok","toast":"$NM đã đến","tone":"ok"},{"label":"✗ Bỏ hẹn","cls":"crit","toast":"$NM bỏ hẹn","tone":"warn"}]};
  const [tab, setTab] = uFollowUpMod_s("all");
  const [sel, setSel] = uFollowUpMod_s(0);
  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>Quản lý tái khám & nhắc lịch tự động</h3>
            {tabs.length > 0 && (
              <div className="mod-seg">
                {tabs.map(t => (
                  <button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>
                    {t.label}{t.n != null && <span className="n">{t.n}</span>}
                  </button>
                ))}
              </div>
            )}
            <div className="spacer"/>
            {act.map((a,i) => (
              <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>
            ))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (
                        <td key={j} className={c.cls || c.kind || ""}>
                          {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                          {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                          {c.kind === "bar" && (
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/>
                              </div>
                              <span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span>
                            </div>
                          )}
                          {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu trong tab này.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h">
              <div className="t">{cur[side.titleKey] || side.emptyTitle || "Chọn một dòng"}</div>
              <div className="s">{cur[side.subKey] || side.emptySub || ""}</div>
            </div>
            <div className="mod-side-b">
              {side.kvs && (
                <div className="mod-card">
                  <div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div>
                  <div className="mod-card-b">
                    {side.kvs.map((k,i) => (
                      <div key={i} className="mod-kv">
                        <div className="k">{k.lbl}</div>
                        <div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {side.cards && side.cards.map((card, i) => (
                <div key={i} className="mod-card">
                  <div className="mod-card-h">{card.title}{card.count && <span className="n">{card.count}</span>}</div>
                  <div className={"mod-card-b"}>
                    {card.items && card.items.map((it, j) => (
                      <div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}>
                        <span style={{color:"var(--t-1)"}}>{it.l}</span>
                        <span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {side.actions && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>
                  {side.actions.map((a,i) => (
                    <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.FollowUpMod = FollowUpMod;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="follow-up" crumb={["Lâm sàng","Tái khám"]}>
    <FollowUpMod/>
  </HisShell>
);
</script>
</body>
</html>
