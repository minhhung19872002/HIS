<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"/><title>BHXH kiểm tra — HIS Terminal</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="his-shell.css"/><link rel="stylesheet" href="his-module.css"/></head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">
const { useState: uBhxhAuditMod_s } = React;
const BhxhAuditMod = () => {
  const kpis=[{"lbl":"Đợt KT đang diễn ra","val":"1"},{"lbl":"HS bị yêu cầu giải trình","val":"42","tone":"warn"},{"lbl":"Đã bảo vệ","val":"28","tone":"ok"},{"lbl":"Truy thu tạm","val":"142","sub":"triệu"}],tabs=[],cols=[{"k":"code","label":"Mã HS","cls":"id"},{"k":"pt","label":"BN","cls":"nm"},{"k":"reason","label":"Lý do BHXH"},{"k":"amt","label":"Số tiền","cls":"num"},{"k":"due","label":"Hạn giải trình","cls":"id"},{"k":"st","label":"TT","kind":"stat"}],rows=[{"code":"KT-0042","pt":"Phạm V. Hải","reason":"CT ngực không đúng CĐ","amt":"1.2tr","due":"28/10","st":"CHỜ GIẢI TRÌNH","stTone":"warn"},{"code":"KT-0041","pt":"Lê V. Hoà","reason":"Kê thuốc BHYT ngoài CĐ","amt":"480K","due":"28/10","st":"ĐANG SOẠN","stTone":"warn"},{"code":"KT-0038","pt":"Trần V. Kế","reason":"Trùng đơn thuốc","amt":"284K","due":"—","st":"ĐÃ BẢO VỆ","stTone":"ok"}],act=[{"label":"📄 Soạn giải trình","cls":"p","toast":"Mở giải trình"}];
  const side=null;
  const [tab,setTab]=uBhxhAuditMod_s("all");
  const [sel,setSel]=uBhxhAuditMod_s(0);
  const filtered = tab==="all"?rows:rows.filter(r=>r._tab===tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (<div className="mod-wrap">
    {kpis.length>0 && (<div className="mod-strip">{kpis.map((k,i)=>(<div key={i} className={"mod-strip-cell "+(k.tone||"")}><div className="lbl">{k.lbl}</div><div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div></div>))}</div>)}
    <div className={"mod-body "+(side?"cols-2":"")}><div className="mod-pane">
      <div className="mod-toolbar"><h3>Kiểm tra BHXH — đợt kiểm tra, bảo vệ hồ sơ</h3>{tabs.length>0 && (<div className="mod-seg">{tabs.map(t=>(<button key={t.id} className={"mod-seg-i "+(tab===t.id?"on":"")} onClick={()=>{setTab(t.id);setSel(0);}}>{t.label}</button>))}</div>)}<div className="spacer"/>{act.map((a,i)=>(<button key={i} className={"mod-btn "+(a.cls||"")} onClick={()=>HUI.toast(a.toast,{tone:a.tone||"info"})}>{a.label}</button>))}</div>
      <div className="mod-tbl-wrap"><table className="mod-tbl"><thead><tr>{cols.map((c,i)=><th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead><tbody>
        {filtered.map((r,i)=>(<tr key={i} className={sel===i?"sel":""} onClick={()=>setSel(i)}>{cols.map((c,j)=>{const v=r[c.k];return(<td key={j} className={c.cls||c.kind||""}>{c.kind==="stat"&&<span className={"mod-stat "+(r[c.k+"Tone"]||"ghost")}>{v}</span>}{c.kind==="badge"&&<span className={"mod-badge "+(r[c.k+"Tone"]||"")}>{v}</span>}{!c.kind&&(v!=null?v:<span style={{color:"var(--t-3)"}}>—</span>)}</td>);})}</tr>))}
      </tbody></table></div>
    </div></div>
  </div>);
};
window.BhxhAuditMod=BhxhAuditMod;</script>
<script type="text/babel" data-presets="react">ReactDOM.createRoot(document.getElementById("root")).render(<HisShell route="bhxh-audit" crumb={["Tài chính","BHXH kiểm tra"]}><BhxhAuditMod/></HisShell>);</script>
</body></html>
