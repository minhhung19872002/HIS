<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Phác đồ điều trị — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uProtocolMod_s } = React;
const ProtocolMod = () => {
  const kpis = [{"lbl":"Phác đồ BYT","val":"428"},{"lbl":"Nội viện","val":"92"},{"lbl":"Đang cập nhật","val":"14","tone":"warn"},{"lbl":"Áp dụng hôm nay","val":"218","sub":"lượt"},{"lbl":"Đề xuất AI phù hợp","val":"4","tone":"info"}];
  const tabs = [{"id":"all","label":"Tất cả"},{"id":"tim","label":"Tim mạch","n":42},{"id":"noi","label":"Nội TQ","n":82},{"id":"ngo","label":"Ngoại","n":64},{"id":"san","label":"Sản khoa","n":38},{"id":"nhi","label":"Nhi","n":52},{"id":"cc","label":"Cấp cứu","n":24}];
  const cols = [{"k":"code","label":"Mã","cls":"id"},{"k":"title","label":"Tên phác đồ","cls":"nm"},{"k":"icd","label":"ICD-10","cls":"id"},{"k":"dept","label":"Khoa áp dụng"},{"k":"src","label":"Nguồn","kind":"badge"},{"k":"used","label":"Lượt dùng","cls":"num"},{"k":"ver","label":"Phiên bản","cls":"id"}];
  const rows = [{"_tab":"tim","code":"PD-TM-01","title":"Điều trị Tăng huyết áp người lớn","icd":"I10","dept":"Tim mạch, Nội TQ","src":"BYT-QĐ-3192","srcTone":"mag","used":4820,"ver":"v2.3 · 2023"},{"_tab":"tim","code":"PD-TM-02","title":"Nhồi máu cơ tim cấp ST chênh lên","icd":"I21.0","dept":"Tim mạch, CC","src":"BYT-QĐ-2187","srcTone":"mag","used":142,"ver":"v3.0 · 2024"},{"_tab":"tim","code":"PD-TM-15","title":"Suy tim mạn NYHA III-IV","icd":"I50","dept":"Tim mạch","src":"Nội viện","srcTone":"info","used":228,"ver":"v1.4 · 2024"},{"_tab":"noi","code":"PD-NI-08","title":"ĐTĐ type 2 · khởi trị insulin","icd":"E11","dept":"Nội tiết","src":"BYT-QĐ-5481","srcTone":"mag","used":682,"ver":"v2.1 · 2023"},{"_tab":"noi","code":"PD-NI-12","title":"Viêm dạ dày · H. pylori (+)","icd":"K29.5","dept":"Nội TH","src":"BYT","srcTone":"mag","used":384,"ver":"v1.8"},{"_tab":"ngo","code":"PD-NG-05","title":"Viêm ruột thừa cấp · phẫu thuật","icd":"K35.8","dept":"Ngoại TH","src":"BYT","srcTone":"mag","used":88,"ver":"v2.0"},{"_tab":"san","code":"PD-SA-11","title":"Khám thai định kỳ 9 lần","icd":"Z34","dept":"Sản","src":"BYT-QĐ-4128","srcTone":"mag","used":1420,"ver":"v2.2"},{"_tab":"san","code":"PD-SA-14","title":"Tiền sản giật","icd":"O14","dept":"Sản","src":"BYT","srcTone":"mag","used":62,"ver":"v1.9"},{"_tab":"nhi","code":"PD-NH-03","title":"Viêm phổi trẻ em","icd":"J18","dept":"Nhi","src":"BYT-QĐ-2919","srcTone":"mag","used":284,"ver":"v2.1"},{"_tab":"cc","code":"PD-CC-01","title":"Sốc phản vệ người lớn","icd":"T78.2","dept":"Cấp cứu","src":"BYT-TT-51","srcTone":"mag","used":28,"ver":"v3.0 · 2024"},{"_tab":"cc","code":"PD-CC-04","title":"Ngừng tuần hoàn · ACLS","icd":"I46","dept":"Cấp cứu, HSTC","src":"BYT","srcTone":"mag","used":18,"ver":"v2.4"}];
  const act  = [{"label":"+ Phác đồ mới","cls":"p","toast":"Tạo phác đồ nội viện"},{"label":"⬇ Đồng bộ BYT","toast":"Đồng bộ thư viện BYT mới nhất"},{"label":"🔍 Tìm theo ICD","toast":"Tìm phác đồ theo mã ICD-10"}];
  const side = {"titleKey":"title","subKey":"dept","kvs":[{"lbl":"Mã","k":"code","mono":true},{"lbl":"ICD-10","k":"icd","mono":true},{"lbl":"Phiên bản","k":"ver","mono":true},{"lbl":"Nguồn","k":"src"}],"cards":[{"title":"Các bước điều trị","items":[{"l":"1. Đánh giá ban đầu","v":"3 tiêu chí"},{"l":"2. Chẩn đoán xác định","v":"5 CLS"},{"l":"3. Điều trị nền","v":"Thuốc A, B, C"},{"l":"4. Theo dõi","v":"2-4 tuần"},{"l":"5. Tái khám / đánh giá","v":"Ghi rõ"}]},{"title":"Thuốc khuyến cáo","items":[{"l":"Hàng 1","v":"ACEi/ARB"},{"l":"Hàng 2","v":"CCB"},{"l":"Phối hợp","v":"Thiazide"}]}],"actions":[{"label":"📄 Xem chi tiết","cls":"p","toast":"Mở $NM"},{"label":"📋 Áp dụng cho BN","toast":"Áp dụng $NM cho BN đang chọn"},{"label":"✎ Sửa phác đồ","toast":"Mở sửa $NM"},{"label":"📤 Chia sẻ","toast":"Chia sẻ $NM"}]};
  const [tab, setTab] = uProtocolMod_s("all");
  const [sel, setSel] = uProtocolMod_s(0);
  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>Phác đồ điều trị · thư viện BYT + nội viện</h3>
            {tabs.length > 0 && (
              <div className="mod-seg">
                {tabs.map(t => (
                  <button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>
                    {t.label}{t.n != null && <span className="n">{t.n}</span>}
                  </button>
                ))}
              </div>
            )}
            <div className="spacer"/>
            {act.map((a,i) => (
              <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>
            ))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (
                        <td key={j} className={c.cls || c.kind || ""}>
                          {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                          {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                          {c.kind === "bar" && (
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/>
                              </div>
                              <span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span>
                            </div>
                          )}
                          {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu trong tab này.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h">
              <div className="t">{cur[side.titleKey] || side.emptyTitle || "Chọn một dòng"}</div>
              <div className="s">{cur[side.subKey] || side.emptySub || ""}</div>
            </div>
            <div className="mod-side-b">
              {side.kvs && (
                <div className="mod-card">
                  <div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div>
                  <div className="mod-card-b">
                    {side.kvs.map((k,i) => (
                      <div key={i} className="mod-kv">
                        <div className="k">{k.lbl}</div>
                        <div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {side.cards && side.cards.map((card, i) => (
                <div key={i} className="mod-card">
                  <div className="mod-card-h">{card.title}{card.count && <span className="n">{card.count}</span>}</div>
                  <div className={"mod-card-b"}>
                    {card.items && card.items.map((it, j) => (
                      <div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}>
                        <span style={{color:"var(--t-1)"}}>{it.l}</span>
                        <span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {side.actions && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>
                  {side.actions.map((a,i) => (
                    <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.ProtocolMod = ProtocolMod;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="treatment-protocol" crumb={["Lâm sàng","Phác đồ điều trị"]}>
    <ProtocolMod/>
  </HisShell>
);
</script>
</body>
</html>
