<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Lao / HIV — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uTbHivMod_s } = React;
const TbHivMod = () => {
  const kpis = [{"lbl":"BN Lao đang điều trị","val":"184"},{"lbl":"BN HIV theo dõi ART","val":"312"},{"lbl":"Bỏ điều trị","val":"8","tone":"crit"},{"lbl":"Ca mới tháng 10","val":"18","delta":"+2 tháng","dir":"flat"},{"lbl":"Đồng bộ CDC","val":"OK","tone":"ok"}];
  const tabs = [{"id":"all","label":"Tất cả"},{"id":"lao","label":"Lao đang ĐT","n":184},{"id":"hiv","label":"HIV / ART","n":312},{"id":"mix","label":"Đồng nhiễm","n":12},{"id":"drop","label":"Bỏ điều trị","n":8},{"id":"new","label":"Ca mới","n":18}];
  const cols = [{"k":"mrn","label":"Mã CT","cls":"id"},{"k":"pt","label":"BN · Tuổi","cls":"nm"},{"k":"dx","label":"Chẩn đoán"},{"k":"phase","label":"Giai đoạn","kind":"badge"},{"k":"dot","label":"DOT / ART","cls":"id"},{"k":"cd","label":"Kết quả gần nhất","cls":"mono"},{"k":"st","label":"Trạng thái","kind":"stat"}];
  const rows = [{"_tab":"lao","mrn":"TB-2025-001","pt":"Trần V. Hùng · 42","dx":"Lao phổi AFB(+)","phase":"Tấn công","phaseTone":"info","dot":"2HRZE · tháng 2/2","cd":"AFB âm","st":"TUÂN THỦ","stTone":"ok"},{"_tab":"lao","mrn":"TB-2025-002","pt":"Lê V. Hòa · 38","dx":"Lao phổi MDR","phase":"Duy trì","phaseTone":"mag","dot":"4HR · tháng 3/4","cd":"AFB âm","st":"TUÂN THỦ","stTone":"ok"},{"_tab":"lao","mrn":"TB-2025-004","pt":"Nguyễn V. T · 56","dx":"Lao hạch","phase":"Tấn công","phaseTone":"info","dot":"2HRZE · tháng 1/2","cd":"—","st":"MỚI","stTone":"info"},{"_tab":"hiv","mrn":"HV-2024-812","pt":"X · 29","dx":"HIV giai đoạn 2","phase":"ART","phaseTone":"info","dot":"TDF+3TC+DTG","cd":"CD4 482 · VL <20","st":"ỔN ĐỊNH","stTone":"ok"},{"_tab":"hiv","mrn":"HV-2024-824","pt":"Y · 34","dx":"HIV giai đoạn 3","phase":"ART","phaseTone":"info","dot":"TDF+3TC+DTG","cd":"CD4 286 · VL 140","st":"THEO DÕI","stTone":"warn"},{"_tab":"mix","mrn":"TB-2025-018","pt":"Z · 41","dx":"Lao phổi + HIV","phase":"ĐT kép","phaseTone":"crit","dot":"2HRZE + ART","cd":"CD4 98 · AFB(+)","st":"NGUY CƠ CAO","stTone":"crit"},{"_tab":"drop","mrn":"TB-2024-088","pt":"Đỗ V. K · 36","dx":"Lao phổi AFB(+)","phase":"Bỏ","phaseTone":"crit","dot":"Bỏ 15 ngày","cd":"—","st":"BỎ ĐT","stTone":"crit"},{"_tab":"new","mrn":"TB-2025-028","pt":"Phạm V. S · 62","dx":"Lao phổi nghi","phase":"Mới","phaseTone":"info","dot":"Chờ XN","cd":"—","st":"MỚI","stTone":"info"}];
  const act  = [{"label":"+ Đăng ký ca mới","cls":"p","toast":"Mở form đăng ký CT lao/HIV"},{"label":"📤 Báo cáo TB/HIV","toast":"Xuất báo cáo theo mẫu CT QG"},{"label":"🔄 Đồng bộ CDC","toast":"Đồng bộ dữ liệu lên CDC"}];
  const side = {"titleKey":"pt","subKey":"dx","kvs":[{"lbl":"Mã CT","k":"mrn","mono":true},{"lbl":"Giai đoạn","k":"phase"},{"lbl":"Phác đồ","k":"dot","mono":true},{"lbl":"Kết quả mới","k":"cd","mono":true},{"lbl":"Trạng thái","k":"st"}],"cards":[{"title":"Lịch DOT / ART 14 ngày","items":[{"l":"T2 · 21/10","v":"✓ tại nhà · y tá Hoa"},{"l":"T3 · 22/10","v":"✓ tại TYT"},{"l":"T4 · 23/10","v":"✓ video"},{"l":"T5 · 24/10 (hôm nay)","v":"Chờ"}]},{"title":"Mẫu XN định kỳ","items":[{"l":"AFB đờm","v":"Âm · 15/10"},{"l":"CD4","v":"482 · 01/10"},{"l":"Viral load","v":"<20 cp · 01/10"}]}],"actions":[{"label":"📋 Sổ điều trị","cls":"p","toast":"Mở sổ ĐT $NM"},{"label":"📞 Gọi DOT","toast":"Gọi cộng đồng giám sát $NM"},{"label":"🧪 Chỉ định XN","toast":"Chỉ định XN định kỳ $NM"},{"label":"⚠ Báo bỏ","cls":"crit","toast":"Báo bỏ điều trị $NM","tone":"warn"}]};
  const [tab, setTab] = uTbHivMod_s("all");
  const [sel, setSel] = uTbHivMod_s(0);
  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>Chương trình Quốc gia · Lao (A15-A19) & HIV (B20-B24)</h3>
            {tabs.length > 0 && (
              <div className="mod-seg">
                {tabs.map(t => (
                  <button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>
                    {t.label}{t.n != null && <span className="n">{t.n}</span>}
                  </button>
                ))}
              </div>
            )}
            <div className="spacer"/>
            {act.map((a,i) => (
              <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>
            ))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (
                        <td key={j} className={c.cls || c.kind || ""}>
                          {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                          {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                          {c.kind === "bar" && (
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/>
                              </div>
                              <span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span>
                            </div>
                          )}
                          {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h">
              <div className="t">{cur[side.titleKey] || side.emptyTitle || "Chọn một dòng"}</div>
              <div className="s">{cur[side.subKey] || ""}</div>
            </div>
            <div className="mod-side-b">
              {side.kvs && (
                <div className="mod-card">
                  <div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div>
                  <div className="mod-card-b">
                    {side.kvs.map((k,i) => (
                      <div key={i} className="mod-kv">
                        <div className="k">{k.lbl}</div>
                        <div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {side.cards && side.cards.map((card, i) => (
                <div key={i} className="mod-card">
                  <div className="mod-card-h">{card.title}{card.count && <span className="n">{card.count}</span>}</div>
                  <div className={"mod-card-b"}>
                    {card.items && card.items.map((it, j) => (
                      <div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}>
                        <span style={{color:"var(--t-1)"}}>{it.l}</span>
                        <span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {side.actions && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>
                  {side.actions.map((a,i) => (
                    <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.TbHivMod = TbHivMod;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="tb-hiv" crumb={["Lâm sàng","Quản lý Lao / HIV"]}>
    <TbHivMod/>
  </HisShell>
);
</script>
</body>
</html>
