<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"/><title>Lưu trữ mẫu — HIS Terminal</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="his-shell.css"/><link rel="stylesheet" href="his-module.css"/></head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">
const { useState: uSampleStorageMod_s } = React;
const SampleStorageMod = () => {
  const kpis=[{"lbl":"Mẫu đang lưu","val":"28,482"},{"lbl":"Sắp hết HSD 7d","val":"184","tone":"warn"},{"lbl":"Cần tiêu huỷ","val":"42"},{"lbl":"Tủ quá tải","val":"1/8","tone":"warn"}],tabs=[],cols=[{"k":"code","label":"Mã lưu","cls":"id"},{"k":"spec","label":"Loại mẫu"},{"k":"src","label":"Nguồn BN","cls":"id"},{"k":"loc","label":"Vị trí"},{"k":"temp","label":"Nhiệt độ","cls":"mono"},{"k":"exp","label":"HSD","cls":"id"},{"k":"st","label":"TT","kind":"stat"}],rows=[{"code":"SM-28482","spec":"Huyết thanh","src":"BN-0812","loc":"Tủ -20 · R8C4","temp":"-20°C","exp":"31/12/2026","st":"LƯU","stTone":"ok"},{"code":"SM-28481","spec":"Máu toàn phần","src":"BN-0888","loc":"Tủ 4°C · R2C1","temp":"4°C","exp":"26/10/2024","st":"SẮP HẾT","stTone":"warn"},{"code":"SM-28478","spec":"Mô sinh thiết","src":"BN-0945","loc":"Tủ -80 · R1C8","temp":"-80°C","exp":"12/2030","st":"LƯU","stTone":"ok"}],act=[{"label":"+ Lưu mẫu","cls":"p","toast":"Form lưu mẫu"},{"label":"🗑 Tiêu huỷ","cls":"crit","toast":"Biên bản tiêu huỷ","tone":"warn"}];
  const side=null;
  const [tab,setTab]=uSampleStorageMod_s("all");
  const [sel,setSel]=uSampleStorageMod_s(0);
  const filtered = tab==="all"?rows:rows.filter(r=>r._tab===tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (<div className="mod-wrap">
    {kpis.length>0 && (<div className="mod-strip">{kpis.map((k,i)=>(<div key={i} className={"mod-strip-cell "+(k.tone||"")}><div className="lbl">{k.lbl}</div><div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div></div>))}</div>)}
    <div className={"mod-body "+(side?"cols-2":"")}><div className="mod-pane">
      <div className="mod-toolbar"><h3>Lưu trữ mẫu bệnh phẩm — tủ sinh học, sinh hoá, vi sinh</h3>{tabs.length>0 && (<div className="mod-seg">{tabs.map(t=>(<button key={t.id} className={"mod-seg-i "+(tab===t.id?"on":"")} onClick={()=>{setTab(t.id);setSel(0);}}>{t.label}</button>))}</div>)}<div className="spacer"/>{act.map((a,i)=>(<button key={i} className={"mod-btn "+(a.cls||"")} onClick={()=>HUI.toast(a.toast,{tone:a.tone||"info"})}>{a.label}</button>))}</div>
      <div className="mod-tbl-wrap"><table className="mod-tbl"><thead><tr>{cols.map((c,i)=><th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead><tbody>
        {filtered.map((r,i)=>(<tr key={i} className={sel===i?"sel":""} onClick={()=>setSel(i)}>{cols.map((c,j)=>{const v=r[c.k];return(<td key={j} className={c.cls||c.kind||""}>{c.kind==="stat"&&<span className={"mod-stat "+(r[c.k+"Tone"]||"ghost")}>{v}</span>}{c.kind==="badge"&&<span className={"mod-badge "+(r[c.k+"Tone"]||"")}>{v}</span>}{!c.kind&&(v!=null?v:<span style={{color:"var(--t-3)"}}>—</span>)}</td>);})}</tr>))}
      </tbody></table></div>
    </div></div>
  </div>);
};
window.SampleStorageMod=SampleStorageMod;</script>
<script type="text/babel" data-presets="react">ReactDOM.createRoot(document.getElementById("root")).render(<HisShell route="sample-storage" crumb={["Cận lâm sàng","Lưu trữ mẫu"]}><SampleStorageMod/></HisShell>);</script>
</body></html>
