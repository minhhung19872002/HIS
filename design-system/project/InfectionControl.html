<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Kiểm soát nhiễm khuẩn — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uICDash_s } = React;
const ICDash = () => {
  const kpis = [{"lbl":"Ca NK bệnh viện (HAI)","val":"18","sub":"tháng 10","delta":"+2 vs tháng 9","dir":"flat"},{"lbl":"Mật độ NK/1000 ngày GB","val":"3.8","tone":"warn"},{"lbl":"Tuân thủ rửa tay","val":"82%","delta":"+4% quý","dir":"up","tone":"ok"},{"lbl":"Sự cố NK chờ xử lý","val":"4","tone":"crit"},{"lbl":"Kháng sinh DDD/1000","val":"684"}];
  const tabs = [{"id":"all","label":"Tất cả"},{"id":"hai","label":"Ca HAI","n":18},{"id":"out","label":"Ổ dịch","n":1},{"id":"comp","label":"Tuân thủ","n":12},{"id":"in","label":"Sự cố","n":4}];
  const cols = [{"k":"code","label":"Mã","cls":"id"},{"k":"loc","label":"Khoa/khu","cls":"nm"},{"k":"issue","label":"Nội dung"},{"k":"kind","label":"Loại","kind":"badge"},{"k":"when","label":"Thời điểm","cls":"id"},{"k":"st","label":"Trạng thái","kind":"stat"}];
  const rows = [{"_tab":"hai","code":"HAI-2024-018","loc":"Khoa HSTC","issue":"Nhiễm khuẩn huyết do Catheter · Klebsiella","kind":"HAI","kindTone":"crit","when":"22/10","st":"ĐANG ĐT","stTone":"warn"},{"_tab":"hai","code":"HAI-2024-017","loc":"Khoa Ngoại","issue":"Nhiễm khuẩn vết mổ · E.coli","kind":"HAI","kindTone":"crit","when":"20/10","st":"ĐANG ĐT","stTone":"warn"},{"_tab":"hai","code":"HAI-2024-016","loc":"Khoa Nhi","issue":"Viêm phổi BV · RSV","kind":"HAI","kindTone":"crit","when":"18/10","st":"KHỎI","stTone":"ok"},{"_tab":"out","code":"OB-2024-003","loc":"Khoa Tim mạch","issue":"Chùm 3 ca NK vết mổ trong 7 ngày","kind":"Ổ dịch","kindTone":"crit","when":"15-22/10","st":"ĐIỀU TRA","stTone":"crit"},{"_tab":"comp","code":"COMP-T10-01","loc":"Khoa HSTC","issue":"Tuân thủ 5 thời điểm rửa tay","kind":"Tuân thủ","kindTone":"info","when":"T10/2026","st":"94%","stTone":"ok"},{"_tab":"comp","code":"COMP-T10-02","loc":"Khoa Nhi","issue":"Tuân thủ 5 thời điểm rửa tay","kind":"Tuân thủ","kindTone":"info","when":"T10/2026","st":"71%","stTone":"warn"},{"_tab":"in","code":"IN-2024-128","loc":"Khoa Nội","issue":"Chấn thương kim đâm · ĐD Hoa","kind":"Sự cố","kindTone":"warn","when":"24/10 10:30","st":"BÁO KHẨN","stTone":"crit"},{"_tab":"in","code":"IN-2024-127","loc":"Khoa Sản","issue":"Dịch tràn · máu","kind":"Sự cố","kindTone":"warn","when":"23/10","st":"ĐÃ XỬ LÝ","stTone":"ok"}];
  const act  = [{"label":"+ Báo ca HAI","cls":"p","toast":"Mở form khai báo HAI"},{"label":"⚠ Báo sự cố","toast":"Mở form sự cố phơi nhiễm"},{"label":"📊 Báo cáo tháng","toast":"Xuất báo cáo KSNK T10"}];
  const side = {"titleKey":"loc","subKey":"issue","kvs":[{"lbl":"Mã","k":"code","mono":true},{"lbl":"Loại","k":"kind"},{"lbl":"Thời điểm","k":"when","mono":true},{"lbl":"Trạng thái","k":"st"}],"cards":[{"title":"Xét nghiệm VSV","items":[{"l":"Cấy máu","v":"Klebsiella (+)"},{"l":"KS đồ","v":"Đa kháng"},{"l":"Nhạy","v":"Meropenem, Colistin"}]},{"title":"Can thiệp","items":[{"l":"Cách ly tiếp xúc","v":"Bật · 22/10"},{"l":"Xử lý nguồn","v":"Rút catheter"},{"l":"Truy vết","v":"3 BN cùng phòng"}]}],"actions":[{"label":"👁 Chi tiết","cls":"p","toast":"Mở hồ sơ NK $NM"},{"label":"🧪 Kết quả VSV","toast":"Mở VSV $NM"},{"label":"📤 Báo BYT","toast":"Báo cáo $NM lên BYT"},{"label":"🔒 Đóng hồ sơ","cls":"ok","toast":"Đóng $NM","tone":"ok"}]};
  const [tab, setTab] = uICDash_s("all");
  const [sel, setSel] = uICDash_s(0);
  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>Kiểm soát nhiễm khuẩn · 12 khu/khoa</h3>
            {tabs.length > 0 && (
              <div className="mod-seg">
                {tabs.map(t => (
                  <button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>
                    {t.label}{t.n != null && <span className="n">{t.n}</span>}
                  </button>
                ))}
              </div>
            )}
            <div className="spacer"/>
            {act.map((a,i) => (
              <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>
            ))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (
                        <td key={j} className={c.cls || c.kind || ""}>
                          {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                          {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                          {c.kind === "bar" && (
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/>
                              </div>
                              <span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span>
                            </div>
                          )}
                          {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h">
              <div className="t">{cur[side.titleKey] || side.emptyTitle || "Chọn một dòng"}</div>
              <div className="s">{cur[side.subKey] || ""}</div>
            </div>
            <div className="mod-side-b">
              {side.kvs && (
                <div className="mod-card">
                  <div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div>
                  <div className="mod-card-b">
                    {side.kvs.map((k,i) => (
                      <div key={i} className="mod-kv">
                        <div className="k">{k.lbl}</div>
                        <div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {side.cards && side.cards.map((card, i) => (
                <div key={i} className="mod-card">
                  <div className="mod-card-h">{card.title}{card.count && <span className="n">{card.count}</span>}</div>
                  <div className={"mod-card-b"}>
                    {card.items && card.items.map((it, j) => (
                      <div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}>
                        <span style={{color:"var(--t-1)"}}>{it.l}</span>
                        <span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {side.actions && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>
                  {side.actions.map((a,i) => (
                    <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.ICDash = ICDash;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="infection-control" crumb={["Kiểm soát NK","Tổng quan"]}>
    <ICDash/>
  </HisShell>
);
</script>
</body>
</html>
