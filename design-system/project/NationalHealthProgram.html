<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>CT Y tế Quốc gia — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uNHPMod_s } = React;
const NHPMod = () => {
  const kpis = [{"lbl":"CT đang thực hiện","val":"14"},{"lbl":"Chỉ tiêu đạt","val":"11/14","tone":"ok"},{"lbl":"Chờ đồng bộ","val":"3","tone":"warn"},{"lbl":"BC chờ nộp","val":"2","tone":"warn"}];
  const tabs = [{"id":"all","label":"Tất cả"},{"id":"vac","label":"Tiêm chủng"},{"id":"msh","label":"Sức khoẻ bà mẹ"},{"id":"ncds","label":"BKLN"},{"id":"cd","label":"Truyền nhiễm"}];
  const cols = [{"k":"code","label":"Mã CT","cls":"id"},{"k":"nm","label":"Chương trình","cls":"nm"},{"k":"target","label":"Chỉ tiêu năm","cls":"num"},{"k":"actual","label":"Thực hiện","cls":"num"},{"k":"pct","label":"% đạt","kind":"bar"},{"k":"sync","label":"Đồng bộ","kind":"stat"}];
  const rows = [{"_tab":"vac","code":"EPI-NQ","nm":"Tiêm chủng mở rộng (EPI)","target":"4,200 trẻ","actual":"3,948","pct":94,"sync":"ĐỒNG BỘ","syncTone":"ok"},{"_tab":"vac","code":"HPV","nm":"Tiêm HPV nữ 11-14","target":"1,800","actual":"1,142","pct":63,"sync":"ĐỒNG BỘ","syncTone":"ok"},{"_tab":"msh","code":"MCH","nm":"Khám thai ≥ 4 lần","target":"2,400 thai phụ","actual":"2,284","pct":95,"sync":"ĐỒNG BỘ","syncTone":"ok"},{"_tab":"msh","code":"SKSS","nm":"Sàng lọc sơ sinh","target":"1,200 trẻ","actual":"984","pct":82,"sync":"CHỜ","syncTone":"warn"},{"_tab":"ncds","code":"HTN-2024","nm":"Quản lý THA cộng đồng","target":"1,800 BN","actual":"1,842","pct":100,"sync":"ĐỒNG BỘ","syncTone":"ok"},{"_tab":"ncds","code":"DM-2024","nm":"Quản lý ĐTĐ cộng đồng","target":"1,200 BN","actual":"1,128","pct":94,"sync":"ĐỒNG BỘ","syncTone":"ok"},{"_tab":"cd","code":"TB","nm":"Chương trình Lao QG","target":"220 BN mới","actual":"184","pct":84,"sync":"ĐỒNG BỘ","syncTone":"ok"},{"_tab":"cd","code":"HIV","nm":"Chương trình HIV QG","target":"320 BN","actual":"312","pct":98,"sync":"ĐỒNG BỘ","syncTone":"ok"},{"_tab":"cd","code":"DENGUE","nm":"Giám sát SXH","target":"Báo tuần","actual":"T42/2026","pct":100,"sync":"CHỜ","syncTone":"warn"}];
  const act  = [{"label":"🔄 Đồng bộ CDC","cls":"p","toast":"Đồng bộ dữ liệu CT QG"},{"label":"📤 Báo cáo","toast":"Xuất báo cáo CT QG"}];
  const side = null;
  const [tab, setTab] = uNHPMod_s("all");
  const [sel, setSel] = uNHPMod_s(0);
  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>Chương trình Y tế Quốc gia · đối chiếu với CDC/Bộ Y tế</h3>
            {tabs.length > 0 && (<div className="mod-seg">{tabs.map(t => (<button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>{t.label}{t.n != null && <span className="n">{t.n}</span>}</button>))}</div>)}
            <div className="spacer"/>
            {act.map((a,i) => (<button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (<td key={j} className={c.cls || c.kind || ""}>
                        {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                        {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                        {c.kind === "bar" && (<div style={{display:"flex",alignItems:"center",gap:8}}><div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/></div><span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span></div>)}
                        {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                      </td>);
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h"><div className="t">{cur[side.titleKey] || "Chọn dòng"}</div><div className="s">{cur[side.subKey] || ""}</div></div>
            <div className="mod-side-b">
              {side.kvs && (<div className="mod-card"><div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div><div className="mod-card-b">{side.kvs.map((k,i) => (<div key={i} className="mod-kv"><div className="k">{k.lbl}</div><div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div></div>))}</div></div>)}
              {side.cards && side.cards.map((card, i) => (<div key={i} className="mod-card"><div className="mod-card-h">{card.title}</div><div className="mod-card-b">{card.items.map((it, j) => (<div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}><span style={{color:"var(--t-1)"}}>{it.l}</span><span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span></div>))}</div></div>))}
              {side.actions && (<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>{side.actions.map((a,i) => (<button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>))}</div>)}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.NHPMod = NHPMod;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="nhp" crumb={["Tích hợp","CT Y tế Quốc gia"]}>
    <NHPMod/>
  </HisShell>
);
</script>
</body>
</html>
