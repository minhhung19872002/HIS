<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Trung tâm tiệt khuẩn — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uSterilMod_s } = React;
const SterilMod = () => {
  const kpis = [{"lbl":"Lô đang hấp","val":"6"},{"lbl":"Chờ xử lý","val":"28","sub":"khay/bộ"},{"lbl":"Đã giao hôm nay","val":"142"},{"lbl":"Fail test","val":"1","tone":"crit"},{"lbl":"Buồng bảo dưỡng","val":"1","sub":"EO-2","tone":"warn"}];
  const tabs = [{"id":"all","label":"Tất cả"},{"id":"run","label":"Đang chạy","n":6},{"id":"wait","label":"Chờ xử lý","n":28},{"id":"qc","label":"QC","n":12},{"id":"dl","label":"Giao lại khoa","n":8}];
  const cols = [{"k":"lot","label":"Mã lô","cls":"id"},{"k":"ch","label":"Buồng","cls":"id"},{"k":"content","label":"Nội dung","cls":"nm"},{"k":"cycle","label":"Chu trình","kind":"badge"},{"k":"prog","label":"Tiến độ","kind":"bar"},{"k":"bi","label":"BI/CI","kind":"stat"}];
  const rows = [{"_tab":"run","lot":"LOT-24102-08","ch":"H1 · Autoclave 134°","content":"Bộ mổ tổng quát × 4","cycle":"134°C · 18′","cycleTone":"info","prog":62,"bi":"ĐANG HẤP","biTone":"info"},{"_tab":"run","lot":"LOT-24102-07","ch":"H2 · Autoclave 121°","content":"Dụng cụ sản × 3 bộ","cycle":"121°C · 30′","cycleTone":"info","prog":84,"bi":"ĐANG HẤP","biTone":"info"},{"_tab":"run","lot":"LOT-24102-06","ch":"EO-1","content":"Dụng cụ nội soi × 2","cycle":"EO 16h","cycleTone":"mag","prog":32,"bi":"ĐANG HẤP","biTone":"info"},{"_tab":"wait","lot":"—","ch":"—","content":"Bộ khâu vết thương × 8","cycle":"Chờ làm sạch","cycleTone":"","prog":0,"bi":"CHỜ","biTone":"ghost"},{"_tab":"wait","lot":"—","ch":"—","content":"Dụng cụ đỡ đẻ × 5","cycle":"Chờ làm sạch","cycleTone":"","prog":0,"bi":"CHỜ","biTone":"ghost"},{"_tab":"qc","lot":"LOT-24102-05","ch":"H1","content":"Bộ mổ · lô trước","cycle":"Hoàn tất","cycleTone":"info","prog":100,"bi":"BI ÂM · OK","biTone":"ok"},{"_tab":"qc","lot":"LOT-24102-04","ch":"H2","content":"Dụng cụ ngoại CT","cycle":"Hoàn tất","cycleTone":"info","prog":100,"bi":"BI DƯƠNG · HỦY LÔ","biTone":"crit"},{"_tab":"dl","lot":"LOT-24102-03","ch":"—","content":"Giao khoa Sản","cycle":"Đã QC OK","cycleTone":"ok","prog":100,"bi":"SẴN","biTone":"ok"}];
  const act  = [{"label":"+ Nhập dụng cụ","cls":"p","toast":"Mở form nhập dụng cụ bẩn"},{"label":"🧪 BI mới","toast":"Đọc kết quả BI"},{"label":"📊 QC tháng","toast":"Xem báo cáo QC tháng"}];
  const side = {"titleKey":"content","subKey":"ch","kvs":[{"lbl":"Mã lô","k":"lot","mono":true},{"lbl":"Buồng","k":"ch","mono":true},{"lbl":"Chu trình","k":"cycle","mono":true},{"lbl":"Kết quả BI","k":"bi"}],"cards":[{"title":"Thông số chu trình","items":[{"l":"Nhiệt độ max","v":"134.2 °C"},{"l":"Áp suất","v":"2.1 bar"},{"l":"Thời gian giữ","v":"4 phút"},{"l":"Khô","v":"12 phút"}]},{"title":"Chỉ thị hóa học / sinh học","items":[{"l":"CI loại 5","v":"Đạt"},{"l":"BI G. stearothermophilus","v":"Âm tính"},{"l":"Bowie-Dick","v":"Đạt"}]}],"actions":[{"label":"▶ Khởi động","cls":"p","toast":"Khởi động lô $NM"},{"label":"⏹ Dừng","cls":"crit","toast":"Dừng lô $NM","tone":"warn"},{"label":"📄 Phiếu QC","toast":"In phiếu QC $NM"},{"label":"📤 Giao khoa","toast":"Giao lô $NM cho khoa"}]};
  const [tab, setTab] = uSterilMod_s("all");
  const [sel, setSel] = uSterilMod_s(0);
  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>Trung tâm tiệt khuẩn (CSSD) · 4 buồng hấp + 2 EO</h3>
            {tabs.length > 0 && (
              <div className="mod-seg">
                {tabs.map(t => (
                  <button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>
                    {t.label}{t.n != null && <span className="n">{t.n}</span>}
                  </button>
                ))}
              </div>
            )}
            <div className="spacer"/>
            {act.map((a,i) => (
              <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>
            ))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (
                        <td key={j} className={c.cls || c.kind || ""}>
                          {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                          {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                          {c.kind === "bar" && (
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/>
                              </div>
                              <span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span>
                            </div>
                          )}
                          {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h">
              <div className="t">{cur[side.titleKey] || side.emptyTitle || "Chọn một dòng"}</div>
              <div className="s">{cur[side.subKey] || ""}</div>
            </div>
            <div className="mod-side-b">
              {side.kvs && (
                <div className="mod-card">
                  <div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div>
                  <div className="mod-card-b">
                    {side.kvs.map((k,i) => (
                      <div key={i} className="mod-kv">
                        <div className="k">{k.lbl}</div>
                        <div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {side.cards && side.cards.map((card, i) => (
                <div key={i} className="mod-card">
                  <div className="mod-card-h">{card.title}{card.count && <span className="n">{card.count}</span>}</div>
                  <div className={"mod-card-b"}>
                    {card.items && card.items.map((it, j) => (
                      <div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}>
                        <span style={{color:"var(--t-1)"}}>{it.l}</span>
                        <span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {side.actions && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>
                  {side.actions.map((a,i) => (
                    <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.SterilMod = SterilMod;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="sterilization" crumb={["Kiểm soát NK","TT Tiệt khuẩn"]}>
    <SterilMod/>
  </HisShell>
);
</script>
</body>
</html>
