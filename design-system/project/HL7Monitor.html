<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>HL7/FHIR Monitor — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uHL7Mod_s } = React;
const HL7Mod = () => {
  const kpis = [{"lbl":"Msg 24h","val":"284,842"},{"lbl":"ADT","val":"18,420"},{"lbl":"ORM/ORU","val":"142,280"},{"lbl":"Lỗi 4xx","val":"184","tone":"warn"},{"lbl":"Msg DLQ","val":"12","tone":"crit"}];
  const tabs = [{"id":"all","label":"Tất cả"},{"id":"adt","label":"ADT","n":18420},{"id":"orm","label":"ORM","n":82400},{"id":"oru","label":"ORU","n":59880},{"id":"mdm","label":"MDM","n":8240},{"id":"err","label":"Lỗi","n":184}];
  const cols = [{"k":"ts","label":"Thời điểm","cls":"id"},{"k":"dir","label":"Chiều","kind":"badge"},{"k":"type","label":"Type","cls":"id"},{"k":"ctrl","label":"Control ID","cls":"id"},{"k":"src","label":"Nguồn"},{"k":"dst","label":"Đích"},{"k":"st","label":"Trạng thái","kind":"stat"}];
  const rows = [{"_tab":"adt","ts":"15:27:18.412","dir":"IN","dirTone":"info","type":"ADT^A04","ctrl":"HIS240100284","src":"HIS","dst":"LIS","st":"ACK","stTone":"ok"},{"_tab":"adt","ts":"15:27:18.284","dir":"IN","dirTone":"info","type":"ADT^A08","ctrl":"HIS240100283","src":"HIS","dst":"RIS","st":"ACK","stTone":"ok"},{"_tab":"orm","ts":"15:27:17.982","dir":"IN","dirTone":"info","type":"ORM^O01","ctrl":"HIS240100282","src":"HIS","dst":"LIS","st":"ACK","stTone":"ok"},{"_tab":"oru","ts":"15:27:17.420","dir":"OUT","dirTone":"mag","type":"ORU^R01","ctrl":"LIS882414","src":"LIS","dst":"HIS","st":"ACK","stTone":"ok"},{"_tab":"oru","ts":"15:27:16.882","dir":"OUT","dirTone":"mag","type":"ORU^R01","ctrl":"LIS882413","src":"LIS","dst":"HIS","st":"ACK","stTone":"ok"},{"_tab":"err","ts":"15:26:42.128","dir":"IN","dirTone":"info","type":"ADT^A04","ctrl":"HIS240100281","src":"HIS","dst":"LIS","st":"AE - MSH-3 trống","stTone":"warn"},{"_tab":"err","ts":"15:25:18.420","dir":"IN","dirTone":"info","type":"ORM^O01","ctrl":"HIS240100278","src":"HIS","dst":"RIS","st":"AR - duplicate","stTone":"crit"},{"_tab":"mdm","ts":"15:24:00.184","dir":"OUT","dirTone":"mag","type":"MDM^T02","ctrl":"RIS418242","src":"RIS","dst":"HIS","st":"ACK","stTone":"ok"}];
  const act  = [{"label":"🔍 Tìm Control ID","cls":"p","toast":"Mở tìm kiếm msg"},{"label":"🔁 Replay DLQ","toast":"Replay 12 msg DLQ"}];
  const side = {"titleKey":"ctrl","subKey":"type","kvs":[{"lbl":"Time","k":"ts","mono":true},{"lbl":"Chiều","k":"dir"},{"lbl":"Type","k":"type","mono":true},{"lbl":"Nguồn","k":"src"},{"lbl":"Đích","k":"dst"},{"lbl":"Trạng thái","k":"st"}],"cards":[{"title":"Phân tích message","items":[{"l":"MSH-9","v":"ADT^A04","mono":true},{"l":"MSH-10","v":"HIS240100284","mono":true},{"l":"PID-3","v":"BN-0812","mono":true},{"l":"PV1-2","v":"O","mono":true},{"l":"PV1-3","v":"OPD-NOI-203","mono":true}]}],"actions":[{"label":"📄 Xem raw","cls":"p","toast":"Mở raw HL7 $NM"},{"label":"🔁 Replay","toast":"Replay $NM"}]};
  const [tab, setTab] = uHL7Mod_s("all");
  const [sel, setSel] = uHL7Mod_s(0);
  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>Theo dõi message HL7 v2 & FHIR · 24 giờ qua</h3>
            {tabs.length > 0 && (<div className="mod-seg">{tabs.map(t => (<button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>{t.label}{t.n != null && <span className="n">{t.n}</span>}</button>))}</div>)}
            <div className="spacer"/>
            {act.map((a,i) => (<button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (<td key={j} className={c.cls || c.kind || ""}>
                        {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                        {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                        {c.kind === "bar" && (<div style={{display:"flex",alignItems:"center",gap:8}}><div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/></div><span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span></div>)}
                        {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                      </td>);
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h"><div className="t">{cur[side.titleKey] || "Chọn dòng"}</div><div className="s">{cur[side.subKey] || ""}</div></div>
            <div className="mod-side-b">
              {side.kvs && (<div className="mod-card"><div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div><div className="mod-card-b">{side.kvs.map((k,i) => (<div key={i} className="mod-kv"><div className="k">{k.lbl}</div><div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div></div>))}</div></div>)}
              {side.cards && side.cards.map((card, i) => (<div key={i} className="mod-card"><div className="mod-card-h">{card.title}</div><div className="mod-card-b">{card.items.map((it, j) => (<div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}><span style={{color:"var(--t-1)"}}>{it.l}</span><span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span></div>))}</div></div>))}
              {side.actions && (<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>{side.actions.map((a,i) => (<button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>))}</div>)}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.HL7Mod = HL7Mod;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="hl7-monitor" crumb={["Tích hợp","HL7 / FHIR Monitor"]}>
    <HL7Mod/>
  </HisShell>
);
</script>
</body>
</html>
