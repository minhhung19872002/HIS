<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"/><title>Ngân hàng máu — HIS Terminal</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="his-shell.css"/><link rel="stylesheet" href="his-module.css"/></head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">
const { useState: uBloodBankMod_s } = React;
const BloodBankMod = () => {
  const kpis=[{"lbl":"Đơn vị tồn","val":"142"},{"lbl":"Hết nhóm","val":"0 AB-","tone":"warn"},{"lbl":"Sắp hết HSD 7d","val":"8"},{"lbl":"Yêu cầu chờ","val":"4"}],tabs=[{"id":"stock","label":"Tồn kho"},{"id":"req","label":"Yêu cầu"},{"id":"xm","label":"Hoà hợp"},{"id":"don","label":"Hiến máu"}],cols=[{"k":"code","label":"Mã túi","cls":"id"},{"k":"grp","label":"Nhóm","kind":"badge"},{"k":"type","label":"Chế phẩm"},{"k":"vol","label":"Thể tích","cls":"id"},{"k":"date","label":"Lấy","cls":"id"},{"k":"exp","label":"HSD","cls":"id"},{"k":"st","label":"TT","kind":"stat"}],rows=[{"_tab":"stock","code":"M-00842","grp":"O+","grpTone":"ok","type":"Hồng cầu khối","vol":"250ml","date":"14/10","exp":"25/11","st":"SẴN","stTone":"ok"},{"_tab":"stock","code":"M-00841","grp":"A+","grpTone":"info","type":"Hồng cầu khối","vol":"250ml","date":"14/10","exp":"25/11","st":"SẴN","stTone":"ok"},{"_tab":"req","code":"YC-00042","grp":"B+","grpTone":"info","type":"2 đv HCK","vol":"—","date":"24/10 14:20","exp":"—","st":"CHUẨN BỊ","stTone":"warn"},{"_tab":"xm","code":"XM-00028","grp":"A+","grpTone":"info","type":"BN-0945 vs M-00812","vol":"—","date":"24/10 15:00","exp":"—","st":"HOÀ HỢP","stTone":"ok"}],act=[{"label":"+ Yêu cầu máu","cls":"p","toast":"Tạo yêu cầu máu"},{"label":"🩸 Hiến máu","toast":"Đăng ký hiến máu"}];
  const side=null;
  const [tab,setTab]=uBloodBankMod_s("stock");
  const [sel,setSel]=uBloodBankMod_s(0);
  const filtered = tab==="all"?rows:rows.filter(r=>r._tab===tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (<div className="mod-wrap">
    {kpis.length>0 && (<div className="mod-strip">{kpis.map((k,i)=>(<div key={i} className={"mod-strip-cell "+(k.tone||"")}><div className="lbl">{k.lbl}</div><div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div></div>))}</div>)}
    <div className={"mod-body "+(side?"cols-2":"")}><div className="mod-pane">
      <div className="mod-toolbar"><h3>Ngân hàng máu — dự trữ, xét nghiệm hoà hợp, phát máu</h3>{tabs.length>0 && (<div className="mod-seg">{tabs.map(t=>(<button key={t.id} className={"mod-seg-i "+(tab===t.id?"on":"")} onClick={()=>{setTab(t.id);setSel(0);}}>{t.label}</button>))}</div>)}<div className="spacer"/>{act.map((a,i)=>(<button key={i} className={"mod-btn "+(a.cls||"")} onClick={()=>HUI.toast(a.toast,{tone:a.tone||"info"})}>{a.label}</button>))}</div>
      <div className="mod-tbl-wrap"><table className="mod-tbl"><thead><tr>{cols.map((c,i)=><th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead><tbody>
        {filtered.map((r,i)=>(<tr key={i} className={sel===i?"sel":""} onClick={()=>setSel(i)}>{cols.map((c,j)=>{const v=r[c.k];return(<td key={j} className={c.cls||c.kind||""}>{c.kind==="stat"&&<span className={"mod-stat "+(r[c.k+"Tone"]||"ghost")}>{v}</span>}{c.kind==="badge"&&<span className={"mod-badge "+(r[c.k+"Tone"]||"")}>{v}</span>}{!c.kind&&(v!=null?v:<span style={{color:"var(--t-3)"}}>—</span>)}</td>);})}</tr>))}
      </tbody></table></div>
    </div></div>
  </div>);
};
window.BloodBankMod=BloodBankMod;</script>
<script type="text/babel" data-presets="react">ReactDOM.createRoot(document.getElementById("root")).render(<HisShell route="blood-bank" crumb={["Cận lâm sàng","Ngân hàng máu"]}><BloodBankMod/></HisShell>);</script>
</body></html>
