<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Khiếu nại — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uComplMod_s } = React;
const ComplMod = () => {
  const kpis = [{"lbl":"Đang xử lý","val":"12","tone":"warn"},{"lbl":"Quá hạn","val":"2","tone":"crit"},{"lbl":"T10 mới nhận","val":"42"},{"lbl":"Đã giải quyết","val":"38","tone":"ok"},{"lbl":"Hài lòng sau xử lý","val":"82%"}];
  const tabs = [{"id":"new","label":"Mới nhận","n":4},{"id":"proc","label":"Đang xử lý","n":12},{"id":"over","label":"Quá hạn","n":2},{"id":"done","label":"Đã giải quyết","n":38}];
  const cols = [{"k":"code","label":"Mã","cls":"id"},{"k":"date","label":"Nhận","cls":"id"},{"k":"src","label":"Nguồn","kind":"badge"},{"k":"content","label":"Nội dung","cls":"nm"},{"k":"dept","label":"Khoa liên quan"},{"k":"sla","label":"SLA","cls":"id"},{"k":"st","label":"Trạng thái","kind":"stat"}];
  const rows = [{"_tab":"new","code":"KN-2410-042","date":"24/10 10:20","src":"1900 1234","srcTone":"mag","content":"BN phàn nàn chờ OPD Nội > 2 giờ","dept":"OPD Nội","sla":"24h","st":"MỚI","stTone":"info"},{"_tab":"new","code":"KN-2410-041","date":"24/10 09:12","src":"Hộp thư BV","srcTone":"info","content":"Nhầm số phòng khám, gây mất thời gian","dept":"Lễ tân","sla":"24h","st":"MỚI","stTone":"info"},{"_tab":"proc","code":"KN-2410-038","date":"22/10","src":"Đường dây nóng BYT","srcTone":"crit","content":"Thái độ nhân viên viện phí","dept":"Viện phí","sla":"48h","st":"ĐANG XỬ","stTone":"warn"},{"_tab":"proc","code":"KN-2410-036","date":"21/10","src":"BN trực tiếp","srcTone":"info","content":"BHYT áp dụng sai % chi trả","dept":"Viện phí","sla":"48h","st":"ĐANG XỬ","stTone":"warn"},{"_tab":"over","code":"KN-2410-028","date":"18/10","src":"Email","srcTone":"info","content":"Kết quả XN lâu, BN phải quay lại 2 lần","dept":"Xét nghiệm","sla":"Quá 24h","st":"QUÁ HẠN","stTone":"crit"},{"_tab":"done","code":"KN-2410-014","date":"14/10","src":"Khảo sát","srcTone":"","content":"Thái độ ĐD khoa Nhi","dept":"Nhi","sla":"Đúng hạn","st":"ĐÃ GIẢI QUYẾT","stTone":"ok"},{"_tab":"done","code":"KN-2410-012","date":"12/10","src":"BN trực tiếp","srcTone":"info","content":"Không đủ ghế chờ OPD","dept":"OPD","sla":"Đúng hạn","st":"ĐÃ GIẢI QUYẾT","stTone":"ok"}];
  const act  = [{"label":"+ Ghi nhận","cls":"p","toast":"Mở form ghi nhận khiếu nại"},{"label":"📊 Báo cáo tháng","toast":"Xuất báo cáo khiếu nại T10"},{"label":"📤 Báo BYT","toast":"Báo cáo đường dây nóng"}];
  const side = {"titleKey":"content","subKey":"dept","kvs":[{"lbl":"Mã","k":"code","mono":true},{"lbl":"Ngày nhận","k":"date","mono":true},{"lbl":"Nguồn","k":"src"},{"lbl":"SLA","k":"sla","mono":true},{"lbl":"Trạng thái","k":"st"}],"cards":[{"title":"Nhật ký xử lý","items":[{"l":"Tiếp nhận","v":"24/10 10:20"},{"l":"Giao P.KHTH","v":"24/10 10:45"},{"l":"Liên hệ khoa","v":"24/10 11:30"},{"l":"Phản hồi BN","v":"Chờ"}]},{"title":"Kết quả xử lý","items":[{"l":"Người chịu trách nhiệm","v":"TP. OPD Nội"},{"l":"Biện pháp","v":"Chờ đề xuất"},{"l":"Thời hạn cam kết","v":"25/10"}]}],"actions":[{"label":"↗ Chuyển khoa","cls":"p","toast":"Chuyển xử lý $NM"},{"label":"📞 Liên hệ BN","toast":"Gọi BN khiếu nại"},{"label":"✓ Đóng KN","cls":"ok","toast":"Đóng $NM","tone":"ok"},{"label":"⚠ Escalate","cls":"crit","toast":"Chuyển lên GĐ $NM","tone":"warn"}]};
  const [tab, setTab] = uComplMod_s("new");
  const [sel, setSel] = uComplMod_s(0);
  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>Khiếu nại & phản ánh · đường dây nóng BYT + hộp thư nội viện</h3>
            {tabs.length > 0 && (
              <div className="mod-seg">
                {tabs.map(t => (
                  <button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>
                    {t.label}{t.n != null && <span className="n">{t.n}</span>}
                  </button>
                ))}
              </div>
            )}
            <div className="spacer"/>
            {act.map((a,i) => (
              <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>
            ))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (
                        <td key={j} className={c.cls || c.kind || ""}>
                          {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                          {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                          {c.kind === "bar" && (
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/>
                              </div>
                              <span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span>
                            </div>
                          )}
                          {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h">
              <div className="t">{cur[side.titleKey] || "Chọn dòng"}</div>
              <div className="s">{cur[side.subKey] || ""}</div>
            </div>
            <div className="mod-side-b">
              {side.kvs && (
                <div className="mod-card">
                  <div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div>
                  <div className="mod-card-b">
                    {side.kvs.map((k,i) => (
                      <div key={i} className="mod-kv">
                        <div className="k">{k.lbl}</div>
                        <div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {side.cards && side.cards.map((card, i) => (
                <div key={i} className="mod-card">
                  <div className="mod-card-h">{card.title}{card.count && <span className="n">{card.count}</span>}</div>
                  <div className={"mod-card-b"}>
                    {card.items && card.items.map((it, j) => (
                      <div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}>
                        <span style={{color:"var(--t-1)"}}>{it.l}</span>
                        <span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {side.actions && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>
                  {side.actions.map((a,i) => (
                    <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.ComplMod = ComplMod;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="complaints" crumb={["Quản trị","Khiếu nại & phản ánh"]}>
    <ComplMod/>
  </HisShell>
);
</script>
</body>
</html>
