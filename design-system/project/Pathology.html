<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"/><title>Giải phẫu bệnh — HIS Terminal</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="his-shell.css"/><link rel="stylesheet" href="his-module.css"/></head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">
const { useState: uPathologyMod_s } = React;
const PathologyMod = () => {
  const kpis=[{"lbl":"Ca T10","val":"284"},{"lbl":"Đang cắt mảnh","val":"18"},{"lbl":"Chờ đọc","val":"42","tone":"warn"},{"lbl":"Nghi ác tính","val":"8","tone":"crit"}],tabs=[{"id":"prep","label":"Đang XL"},{"id":"read","label":"Chờ đọc"},{"id":"out","label":"Đã trả"},{"id":"cance","label":"Nghi ác tính"}],cols=[{"k":"code","label":"Mã","cls":"id"},{"k":"pt","label":"BN","cls":"nm"},{"k":"src","label":"Mẫu"},{"k":"typ","label":"Loại","kind":"badge"},{"k":"dx","label":"Chẩn đoán sơ bộ"},{"k":"date","label":"Nhận","cls":"id"},{"k":"st","label":"TT","kind":"stat"}],rows=[{"_tab":"prep","code":"GPB-241024-08","pt":"Lê V. Hoà · BN-0945","src":"Sinh thiết vú","typ":"Sinh thiết","typTone":"info","dx":"U vú TD","date":"24/10","st":"CẮT MẢNH","stTone":"info"},{"_tab":"read","code":"GPB-241020-14","pt":"Nguyễn T. Mai · BN-0812","src":"Sinh thiết cổ tử cung","typ":"Sinh thiết","typTone":"info","dx":"LSIL?","date":"20/10","st":"CHỜ ĐỌC","stTone":"warn"},{"_tab":"cance","code":"GPB-241018-02","pt":"Trần V. Kế · BN-0666","src":"Polyp đại tràng","typ":"Sinh thiết","typTone":"info","dx":"Adenocarcinoma","date":"18/10","st":"DƯƠNG TÍNH AC","stTone":"crit"}],act=[{"label":"+ Nhận mẫu","cls":"p","toast":"Nhận mẫu GPB"},{"label":"✎ Kết luận","toast":"Soạn KL GPB"}];
  const side=null;
  const [tab,setTab]=uPathologyMod_s("prep");
  const [sel,setSel]=uPathologyMod_s(0);
  const filtered = tab==="all"?rows:rows.filter(r=>r._tab===tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (<div className="mod-wrap">
    {kpis.length>0 && (<div className="mod-strip">{kpis.map((k,i)=>(<div key={i} className={"mod-strip-cell "+(k.tone||"")}><div className="lbl">{k.lbl}</div><div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div></div>))}</div>)}
    <div className={"mod-body "+(side?"cols-2":"")}><div className="mod-pane">
      <div className="mod-toolbar"><h3>Khoa Giải phẫu bệnh — sinh thiết, tế bào học, HER2/ER/PR</h3>{tabs.length>0 && (<div className="mod-seg">{tabs.map(t=>(<button key={t.id} className={"mod-seg-i "+(tab===t.id?"on":"")} onClick={()=>{setTab(t.id);setSel(0);}}>{t.label}</button>))}</div>)}<div className="spacer"/>{act.map((a,i)=>(<button key={i} className={"mod-btn "+(a.cls||"")} onClick={()=>HUI.toast(a.toast,{tone:a.tone||"info"})}>{a.label}</button>))}</div>
      <div className="mod-tbl-wrap"><table className="mod-tbl"><thead><tr>{cols.map((c,i)=><th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead><tbody>
        {filtered.map((r,i)=>(<tr key={i} className={sel===i?"sel":""} onClick={()=>setSel(i)}>{cols.map((c,j)=>{const v=r[c.k];return(<td key={j} className={c.cls||c.kind||""}>{c.kind==="stat"&&<span className={"mod-stat "+(r[c.k+"Tone"]||"ghost")}>{v}</span>}{c.kind==="badge"&&<span className={"mod-badge "+(r[c.k+"Tone"]||"")}>{v}</span>}{!c.kind&&(v!=null?v:<span style={{color:"var(--t-3)"}}>—</span>)}</td>);})}</tr>))}
      </tbody></table></div>
    </div></div>
  </div>);
};
window.PathologyMod=PathologyMod;</script>
<script type="text/babel" data-presets="react">ReactDOM.createRoot(document.getElementById("root")).render(<HisShell route="pathology" crumb={["Cận lâm sàng","Giải phẫu bệnh"]}><PathologyMod/></HisShell>);</script>
</body></html>
