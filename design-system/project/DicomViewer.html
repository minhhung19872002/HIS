<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"/><title>DICOM Viewer — HIS Terminal</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="his-shell.css"/><link rel="stylesheet" href="his-module.css"/></head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">
const { useState: uDicomViewerMod_s } = React;
const DicomViewerMod = () => {
  const kpis=[{"lbl":"Study đang mở","val":"4"},{"lbl":"Prior studies","val":"128"},{"lbl":"Đo lường chưa lưu","val":"3","tone":"warn"},{"lbl":"Báo cáo nháp","val":"6"}],tabs=[],cols=[{"k":"sid","label":"Study UID","cls":"mono"},{"k":"pt","label":"BN","cls":"nm"},{"k":"mod","label":"Modality","kind":"badge"},{"k":"desc","label":"Mô tả"},{"k":"date","label":"Ngày","cls":"id"},{"k":"ser","label":"Series","cls":"num"},{"k":"img","label":"Ảnh","cls":"num"}],rows=[{"sid":"1.2.840...482","pt":"Lê V. Hoà · BN-0945","mod":"CT","modTone":"info","desc":"CT ngực không tiêm","date":"24/10 10:20","ser":4,"img":824},{"sid":"1.2.840...481","pt":"Nguyễn T. Mai · BN-0812","mod":"MRI","modTone":"mag","desc":"MRI não T1/T2/FLAIR","date":"24/10 09:12","ser":6,"img":382},{"sid":"1.2.840...478","pt":"Phạm V. Hải · BN-0888","mod":"CR","modTone":"ok","desc":"X-quang ngực thẳng","date":"24/10 08:42","ser":1,"img":1}],act=[{"label":"🖼 Mở viewer","cls":"p","toast":"Mở DICOM viewer"},{"label":"📏 Đo lường","toast":"Công cụ đo"},{"label":"📄 Báo cáo","toast":"Soạn báo cáo"}];
  const side=null;
  const [tab,setTab]=uDicomViewerMod_s("all");
  const [sel,setSel]=uDicomViewerMod_s(0);
  const filtered = tab==="all"?rows:rows.filter(r=>r._tab===tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (<div className="mod-wrap">
    {kpis.length>0 && (<div className="mod-strip">{kpis.map((k,i)=>(<div key={i} className={"mod-strip-cell "+(k.tone||"")}><div className="lbl">{k.lbl}</div><div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div></div>))}</div>)}
    <div className={"mod-body "+(side?"cols-2":"")}><div className="mod-pane">
      <div className="mod-toolbar"><h3>Trình xem DICOM (tích hợp PACS) — phim, đo lường, tái tạo MPR</h3>{tabs.length>0 && (<div className="mod-seg">{tabs.map(t=>(<button key={t.id} className={"mod-seg-i "+(tab===t.id?"on":"")} onClick={()=>{setTab(t.id);setSel(0);}}>{t.label}</button>))}</div>)}<div className="spacer"/>{act.map((a,i)=>(<button key={i} className={"mod-btn "+(a.cls||"")} onClick={()=>HUI.toast(a.toast,{tone:a.tone||"info"})}>{a.label}</button>))}</div>
      <div className="mod-tbl-wrap"><table className="mod-tbl"><thead><tr>{cols.map((c,i)=><th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead><tbody>
        {filtered.map((r,i)=>(<tr key={i} className={sel===i?"sel":""} onClick={()=>setSel(i)}>{cols.map((c,j)=>{const v=r[c.k];return(<td key={j} className={c.cls||c.kind||""}>{c.kind==="stat"&&<span className={"mod-stat "+(r[c.k+"Tone"]||"ghost")}>{v}</span>}{c.kind==="badge"&&<span className={"mod-badge "+(r[c.k+"Tone"]||"")}>{v}</span>}{!c.kind&&(v!=null?v:<span style={{color:"var(--t-3)"}}>—</span>)}</td>);})}</tr>))}
      </tbody></table></div>
    </div></div>
  </div>);
};
window.DicomViewerMod=DicomViewerMod;</script>
<script type="text/babel" data-presets="react">ReactDOM.createRoot(document.getElementById("root")).render(<HisShell route="dicom-viewer" crumb={["Cận lâm sàng","DICOM Viewer"]}><DicomViewerMod/></HisShell>);</script>
</body></html>
