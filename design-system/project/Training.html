<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Đào tạo — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uTrainMod_s } = React;
const TrainMod = () => {
  const kpis = [{"lbl":"Khoá đang mở","val":"8"},{"lbl":"Học viên đang học","val":"284"},{"lbl":"Đạt chuẩn CME năm","val":"342/482","tone":"warn","sub":"71%"},{"lbl":"Chờ xét cấp CCHN","val":"14"}];
  const tabs = [{"id":"run","label":"Đang mở","n":8},{"id":"plan","label":"Kế hoạch","n":14},{"id":"done","label":"Đã kết thúc","n":62},{"id":"cme","label":"CME CBNV","n":482}];
  const cols = [{"k":"code","label":"Mã","cls":"id"},{"k":"nm","label":"Tên khoá/Học viên","cls":"nm"},{"k":"topic","label":"Chủ đề"},{"k":"hrs","label":"Số giờ","cls":"num"},{"k":"date","label":"Thời gian","cls":"id"},{"k":"st","label":"Trạng thái","kind":"stat"}];
  const rows = [{"_tab":"run","code":"CME-2410-08","nm":"Siêu âm tim cơ bản","topic":"Tim mạch","hrs":24,"date":"18-30/10","st":"ĐANG MỞ","stTone":"info"},{"_tab":"run","code":"CME-2410-09","nm":"Hồi sức sơ sinh NRP","topic":"Nhi/Sản","hrs":16,"date":"20-25/10","st":"ĐANG MỞ","stTone":"info"},{"_tab":"run","code":"CME-2410-07","nm":"Kiểm soát nhiễm khuẩn","topic":"KSNK","hrs":8,"date":"24/10","st":"ĐANG MỞ","stTone":"info"},{"_tab":"run","code":"CME-2410-10","nm":"Sử dụng kháng sinh hợp lý","topic":"Dược lâm sàng","hrs":12,"date":"22-28/10","st":"ĐANG MỞ","stTone":"info"},{"_tab":"plan","code":"CME-2411-01","nm":"ACLS 2024 update","topic":"Cấp cứu","hrs":16,"date":"04-08/11","st":"KẾ HOẠCH","stTone":"ghost"},{"_tab":"plan","code":"CME-2411-02","nm":"Dinh dưỡng ICU","topic":"HSTC","hrs":12,"date":"12-14/11","st":"KẾ HOẠCH","stTone":"ghost"},{"_tab":"cme","code":"NV-00284","nm":"BS. Phạm Văn Hải","topic":"Tim mạch","hrs":44,"date":"2026","st":"ĐẠT","stTone":"ok"},{"_tab":"cme","code":"NV-00442","nm":"BS. Hoàng Thị Mai","topic":"Nội TQ","hrs":28,"date":"2026","st":"CHƯA ĐẠT","stTone":"warn"}];
  const act  = [{"label":"+ Khoá mới","cls":"p","toast":"Mở form tạo khoá CME"},{"label":"👥 Ghi danh","toast":"Mở ghi danh học viên"},{"label":"📤 Cấp chứng chỉ","toast":"In chứng chỉ hoàn thành"}];
  const side = {"titleKey":"nm","subKey":"topic","kvs":[{"lbl":"Mã","k":"code","mono":true},{"lbl":"Giờ","k":"hrs"},{"lbl":"Thời gian","k":"date","mono":true},{"lbl":"Trạng thái","k":"st"}],"cards":[{"title":"Học viên","items":[{"l":"Đăng ký","v":"42 người"},{"l":"Tham dự","v":"38 người"},{"l":"Đạt","v":"36 người"},{"l":"Đánh giá TB","v":"4.6/5"}]},{"title":"Giảng viên","items":[{"l":"Chính","v":"PGS. Nguyễn Văn Sơn"},{"l":"Phụ","v":"BS. Phạm Văn Hải"},{"l":"Cơ quan","v":"BV Bạch Mai"}]}],"actions":[{"label":"👁 Chi tiết","cls":"p","toast":"Mở $NM"},{"label":"📋 Điểm danh","toast":"Điểm danh $NM"},{"label":"📤 Cấp CC","toast":"Cấp CC $NM","tone":"ok"},{"label":"⊘ Đóng khoá","cls":"crit","toast":"Đóng $NM","tone":"warn"}]};
  const [tab, setTab] = uTrainMod_s("run");
  const [sel, setSel] = uTrainMod_s(0);
  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>Đào tạo liên tục (CME) · bắt buộc & tự nguyện</h3>
            {tabs.length > 0 && (
              <div className="mod-seg">
                {tabs.map(t => (
                  <button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>
                    {t.label}{t.n != null && <span className="n">{t.n}</span>}
                  </button>
                ))}
              </div>
            )}
            <div className="spacer"/>
            {act.map((a,i) => (
              <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>
            ))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (
                        <td key={j} className={c.cls || c.kind || ""}>
                          {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                          {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                          {c.kind === "bar" && (
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/>
                              </div>
                              <span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span>
                            </div>
                          )}
                          {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h">
              <div className="t">{cur[side.titleKey] || "Chọn dòng"}</div>
              <div className="s">{cur[side.subKey] || ""}</div>
            </div>
            <div className="mod-side-b">
              {side.kvs && (
                <div className="mod-card">
                  <div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div>
                  <div className="mod-card-b">
                    {side.kvs.map((k,i) => (
                      <div key={i} className="mod-kv">
                        <div className="k">{k.lbl}</div>
                        <div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {side.cards && side.cards.map((card, i) => (
                <div key={i} className="mod-card">
                  <div className="mod-card-h">{card.title}{card.count && <span className="n">{card.count}</span>}</div>
                  <div className={"mod-card-b"}>
                    {card.items && card.items.map((it, j) => (
                      <div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}>
                        <span style={{color:"var(--t-1)"}}>{it.l}</span>
                        <span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {side.actions && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>
                  {side.actions.map((a,i) => (
                    <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.TrainMod = TrainMod;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="training" crumb={["Quản trị","Đào tạo"]}>
    <TrainMod/>
  </HisShell>
);
</script>
</body>
</html>
