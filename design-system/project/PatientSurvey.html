<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Khảo sát BN — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uSurveyDesignMod_s } = React;
const SurveyDesignMod = () => {
  const kpis = [{"lbl":"Khảo sát hoạt động","val":"6"},{"lbl":"Phiếu gửi T10","val":"2,842"},{"lbl":"Tỷ lệ trả lời","val":"68%"},{"lbl":"Nháp","val":"2","tone":"warn"}];
  const tabs = [{"id":"live","label":"Đang chạy","n":6},{"id":"draft","label":"Nháp","n":2},{"id":"end","label":"Đã kết thúc","n":18}];
  const cols = [{"k":"code","label":"Mã","cls":"id"},{"k":"nm","label":"Tên khảo sát","cls":"nm"},{"k":"trig","label":"Kích hoạt","kind":"badge"},{"k":"ch","label":"Kênh","kind":"badge"},{"k":"sent","label":"Đã gửi","cls":"num"},{"k":"resp","label":"Phản hồi","cls":"num"},{"k":"st","label":"Trạng thái","kind":"stat"}];
  const rows = [{"_tab":"live","code":"SV-01","nm":"Hài lòng sau xuất viện","trig":"Sau xuất viện","trigTone":"info","ch":"Zalo + SMS","chTone":"info","sent":482,"resp":348,"st":"CHẠY","stTone":"ok"},{"_tab":"live","code":"SV-02","nm":"Hài lòng OPD","trig":"Sau khám OPD","trigTone":"info","ch":"Zalo","chTone":"info","sent":1284,"resp":824,"st":"CHẠY","stTone":"ok"},{"_tab":"live","code":"SV-03","nm":"NPS 90 ngày","trig":"90 ngày sau","trigTone":"info","ch":"Zalo + email","chTone":"info","sent":894,"resp":612,"st":"CHẠY","stTone":"ok"},{"_tab":"live","code":"SV-04","nm":"Khảo sát Sản · mẹ sau sinh","trig":"Sau sinh 7 ngày","trigTone":"info","ch":"Zalo","chTone":"info","sent":148,"resp":122,"st":"CHẠY","stTone":"ok"},{"_tab":"draft","code":"SV-07","nm":"Khảo sát tiêm chủng nhi","trig":"Sau tiêm","trigTone":"ghost","ch":"Zalo","chTone":"info","sent":0,"resp":0,"st":"NHÁP","stTone":"warn"}];
  const act  = [{"label":"+ Tạo khảo sát","cls":"p","toast":"Mở trình soạn khảo sát"},{"label":"📊 Phân tích","toast":"Mở phân tích khảo sát"}];
  const side = {"titleKey":"nm","subKey":"code","kvs":[{"lbl":"Kích hoạt","k":"trig"},{"lbl":"Kênh","k":"ch"},{"lbl":"Đã gửi","k":"sent"},{"lbl":"Phản hồi","k":"resp"},{"lbl":"Trạng thái","k":"st"}],"cards":[{"title":"Câu hỏi (5)","items":[{"l":"1. Điểm tổng thể","v":"1-5 sao"},{"l":"2. Chờ khám","v":"Likert"},{"l":"3. BS","v":"Likert"},{"l":"4. ĐD","v":"Likert"},{"l":"5. Góp ý","v":"Văn bản"}]}],"actions":[{"label":"✎ Sửa","cls":"p","toast":"Sửa $NM"},{"label":"📊 KQ","toast":"Xem KQ $NM"},{"label":"⏸ Tạm dừng","cls":"crit","toast":"Tạm dừng $NM","tone":"warn"}]};
  const [tab, setTab] = uSurveyDesignMod_s("live");
  const [sel, setSel] = uSurveyDesignMod_s(0);
  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>Thiết kế & phát hành khảo sát</h3>
            {tabs.length > 0 && (
              <div className="mod-seg">
                {tabs.map(t => (
                  <button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>
                    {t.label}{t.n != null && <span className="n">{t.n}</span>}
                  </button>
                ))}
              </div>
            )}
            <div className="spacer"/>
            {act.map((a,i) => (
              <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>
            ))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (
                        <td key={j} className={c.cls || c.kind || ""}>
                          {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                          {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                          {c.kind === "bar" && (
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/>
                              </div>
                              <span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span>
                            </div>
                          )}
                          {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h">
              <div className="t">{cur[side.titleKey] || "Chọn dòng"}</div>
              <div className="s">{cur[side.subKey] || ""}</div>
            </div>
            <div className="mod-side-b">
              {side.kvs && (
                <div className="mod-card">
                  <div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div>
                  <div className="mod-card-b">
                    {side.kvs.map((k,i) => (
                      <div key={i} className="mod-kv">
                        <div className="k">{k.lbl}</div>
                        <div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {side.cards && side.cards.map((card, i) => (
                <div key={i} className="mod-card">
                  <div className="mod-card-h">{card.title}{card.count && <span className="n">{card.count}</span>}</div>
                  <div className={"mod-card-b"}>
                    {card.items && card.items.map((it, j) => (
                      <div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}>
                        <span style={{color:"var(--t-1)"}}>{it.l}</span>
                        <span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {side.actions && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>
                  {side.actions.map((a,i) => (
                    <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.SurveyDesignMod = SurveyDesignMod;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="patient-survey" crumb={["Quản trị","Khảo sát BN (thiết kế)"]}>
    <SurveyDesignMod/>
  </HisShell>
);
</script>
</body>
</html>
