<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Đặt lịch khám — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uApptBookMod_s } = React;
const ApptBookMod = () => {
  const kpis = [{"lbl":"Lịch đặt hôm nay","val":"284"},{"lbl":"Kênh App","val":"142","sub":"50%","delta":"+4% tháng","dir":"up"},{"lbl":"Kênh hotline","val":"92","sub":"32%"},{"lbl":"Lễ tân","val":"50","sub":"18%"},{"lbl":"Slot còn tuần này","val":"384"}];
  const tabs = [{"id":"all","label":"Tất cả"},{"id":"new","label":"Mới","n":18},{"id":"cnf","label":"Chờ xác nhận","n":22},{"id":"ok","label":"Đã xác nhận","n":244}];
  const cols = [{"k":"code","label":"Mã","cls":"id"},{"k":"pt","label":"BN · SĐT","cls":"nm"},{"k":"when","label":"Thời điểm mong muốn","cls":"id"},{"k":"dept","label":"Khoa"},{"k":"dr","label":"BS. đề xuất"},{"k":"src","label":"Kênh","kind":"badge"},{"k":"st","label":"Trạng thái","kind":"stat"}];
  const rows = [{"_tab":"new","code":"APT-24102-0842","pt":"Nguyễn T. Mai · 0912345678","when":"25/10 08:00","dept":"Tim mạch","dr":"Chọn tự động","src":"App","srcTone":"info","st":"MỚI","stTone":"info"},{"_tab":"new","code":"APT-24102-0841","pt":"Trần V. Kế · 0982221112","when":"25/10 09:30","dept":"Nội TQ","dr":"BS. Hoàng Mai","src":"App","srcTone":"info","st":"MỚI","stTone":"info"},{"_tab":"cnf","code":"APT-24102-0839","pt":"Lê T. Hoa · 0911223344","when":"26/10 14:00","dept":"Sản","dr":"BS. Trần Lan","src":"Hotline","srcTone":"mag","st":"CHỜ XN","stTone":"warn"},{"_tab":"cnf","code":"APT-24102-0838","pt":"Phạm V. Hưng · 0977889900","when":"28/10 09:00","dept":"Tim mạch","dr":"BS. Phạm Hải","src":"Cổng DV","srcTone":"","st":"CHỜ XN","stTone":"warn"},{"_tab":"ok","code":"APT-24102-0835","pt":"Vũ T. Bích · 0903334455","when":"25/10 10:00","dept":"Nhi","dr":"BS. Hoa","src":"App","srcTone":"info","st":"ĐÃ XN","stTone":"ok"},{"_tab":"ok","code":"APT-24102-0834","pt":"Đỗ M. Tâm · 0988776655","when":"25/10 15:00","dept":"TMH","dr":"BS. Tùng","src":"Lễ tân","srcTone":"ghost","st":"ĐÃ XN","stTone":"ok"}];
  const act  = [{"label":"+ Đặt lịch mới","cls":"p","toast":"Mở form đặt lịch"},{"label":"✓ Duyệt hàng loạt","toast":"Đã duyệt 18 lịch mới","tone":"ok"}];
  const side = {"titleKey":"pt","subKey":"dept","kvs":[{"lbl":"Thời điểm","k":"when","mono":true},{"lbl":"Khoa","k":"dept"},{"lbl":"BS đề xuất","k":"dr"},{"lbl":"Kênh","k":"src"}],"cards":[{"title":"Slot khả dụng gần nhất","items":[{"l":"25/10 · 08:00 BS. Phạm Hải","v":"Còn"},{"l":"25/10 · 08:15 BS. Phạm Hải","v":"Còn"},{"l":"25/10 · 08:30 BS. Hoàng Mai","v":"Còn"},{"l":"25/10 · 09:00 BS. Phạm Hải","v":"Full"}]}],"actions":[{"label":"✓ Xác nhận","cls":"p","toast":"Xác nhận $NM","tone":"ok"},{"label":"↗ Đổi slot","toast":"Đổi slot $NM"},{"label":"⊘ Từ chối","cls":"crit","toast":"Từ chối $NM","tone":"warn"},{"label":"📞 Gọi","toast":"Gọi $NM"}]};
  const [tab, setTab] = uApptBookMod_s("all");
  const [sel, setSel] = uApptBookMod_s(0);
  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>Đặt lịch khám · giao diện lễ tân</h3>
            {tabs.length > 0 && (
              <div className="mod-seg">
                {tabs.map(t => (
                  <button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>
                    {t.label}{t.n != null && <span className="n">{t.n}</span>}
                  </button>
                ))}
              </div>
            )}
            <div className="spacer"/>
            {act.map((a,i) => (
              <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>
            ))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (
                        <td key={j} className={c.cls || c.kind || ""}>
                          {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                          {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                          {c.kind === "bar" && (
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/>
                              </div>
                              <span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span>
                            </div>
                          )}
                          {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu trong tab này.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h">
              <div className="t">{cur[side.titleKey] || side.emptyTitle || "Chọn một dòng"}</div>
              <div className="s">{cur[side.subKey] || side.emptySub || ""}</div>
            </div>
            <div className="mod-side-b">
              {side.kvs && (
                <div className="mod-card">
                  <div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div>
                  <div className="mod-card-b">
                    {side.kvs.map((k,i) => (
                      <div key={i} className="mod-kv">
                        <div className="k">{k.lbl}</div>
                        <div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {side.cards && side.cards.map((card, i) => (
                <div key={i} className="mod-card">
                  <div className="mod-card-h">{card.title}{card.count && <span className="n">{card.count}</span>}</div>
                  <div className={"mod-card-b"}>
                    {card.items && card.items.map((it, j) => (
                      <div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}>
                        <span style={{color:"var(--t-1)"}}>{it.l}</span>
                        <span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {side.actions && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>
                  {side.actions.map((a,i) => (
                    <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.ApptBookMod = ApptBookMod;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="appt-booking" crumb={["Lâm sàng","Đặt lịch khám"]}>
    <ApptBookMod/>
  </HisShell>
);
</script>
</body>
</html>
