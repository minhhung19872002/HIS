<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Tình trạng tích hợp — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uIntegMod_s } = React;
const IntegMod = () => {
  const kpis = [{"lbl":"Kết nối OK","val":"24","tone":"ok"},{"lbl":"Cảnh báo","val":"3","tone":"warn"},{"lbl":"Mất kết nối","val":"1","tone":"crit"},{"lbl":"Msg/phút","val":"4,280"},{"lbl":"Queue tồn","val":"128"}];
  const tabs = [{"id":"all","label":"Tất cả"},{"id":"hl7","label":"HL7 v2","n":8},{"id":"fhir","label":"FHIR","n":6},{"id":"dcm","label":"DICOM","n":4},{"id":"gov","label":"BHYT/BYT","n":5},{"id":"api","label":"API","n":5}];
  const cols = [{"k":"code","label":"Mã KN","cls":"id"},{"k":"nm","label":"Tên kênh","cls":"nm"},{"k":"kind","label":"Chuẩn","kind":"badge"},{"k":"endpoint","label":"Endpoint","cls":"mono"},{"k":"tps","label":"TPS","cls":"num"},{"k":"lat","label":"Độ trễ","cls":"mono"},{"k":"st","label":"Trạng thái","kind":"stat"}];
  const rows = [{"_tab":"hl7","code":"HL7-LIS","nm":"LIS · Sysmex","kind":"HL7 v2.5","kindTone":"info","endpoint":"tcp://lis.local:2575","tps":"24/s","lat":"42ms","st":"OK","stTone":"ok"},{"_tab":"hl7","code":"HL7-RIS","nm":"RIS · Radiology","kind":"HL7 v2.5","kindTone":"info","endpoint":"tcp://ris.local:2576","tps":"8/s","lat":"58ms","st":"OK","stTone":"ok"},{"_tab":"hl7","code":"HL7-ADT","nm":"ADT · HIS→LIS","kind":"HL7 v2.3","kindTone":"info","endpoint":"tcp://lis.local:2575","tps":"12/s","lat":"34ms","st":"OK","stTone":"ok"},{"_tab":"fhir","code":"FHIR-EHR","nm":"EHR quốc gia","kind":"FHIR R4","kindTone":"mag","endpoint":"https://ehr.moh.gov.vn/fhir","tps":"2/s","lat":"284ms","st":"OK","stTone":"ok"},{"_tab":"fhir","code":"FHIR-VN","nm":"Đơn thuốc QG","kind":"FHIR R4","kindTone":"mag","endpoint":"https://rx.moh.gov.vn/fhir","tps":"4/s","lat":"412ms","st":"CHẬM","stTone":"warn"},{"_tab":"dcm","code":"DCM-PACS","nm":"PACS · Synapse","kind":"DICOM","kindTone":"info","endpoint":"tcp://pacs.local:11112","tps":"6/s","lat":"18ms","st":"OK","stTone":"ok"},{"_tab":"dcm","code":"DCM-CT","nm":"CT-scan","kind":"DICOM","kindTone":"info","endpoint":"tcp://ct01.local:11112","tps":"0.2/s","lat":"42ms","st":"OK","stTone":"ok"},{"_tab":"gov","code":"BHXH-CXT","nm":"Cổng XT BHYT","kind":"SOAP","kindTone":"mag","endpoint":"https://gd.baohiemxahoi.gov.vn","tps":"8/s","lat":"184ms","st":"OK","stTone":"ok"},{"_tab":"gov","code":"BHXH-KCB","nm":"BHYT tra KCB","kind":"SOAP","kindTone":"mag","endpoint":"https://gd.bhyt","tps":"1/s","lat":"824ms","st":"MẤT KN","stTone":"crit"},{"_tab":"gov","code":"BYT-RPT","nm":"Báo cáo BYT","kind":"REST","kindTone":"mag","endpoint":"https://bc.moh.gov.vn","tps":"1/min","lat":"—","st":"OK","stTone":"ok"},{"_tab":"api","code":"API-APP","nm":"App BN · Zalo","kind":"REST","kindTone":"info","endpoint":"https://api.bvhy.vn/v1","tps":"42/s","lat":"18ms","st":"OK","stTone":"ok"}];
  const act  = [{"label":"🔄 Kiểm tra tất cả","cls":"p","toast":"Đang ping 28 kênh..."},{"label":"📊 Log","toast":"Mở log tích hợp"}];
  const side = {"titleKey":"nm","subKey":"endpoint","kvs":[{"lbl":"Chuẩn","k":"kind"},{"lbl":"Endpoint","k":"endpoint","mono":true},{"lbl":"TPS","k":"tps","mono":true},{"lbl":"Độ trễ","k":"lat","mono":true},{"lbl":"Trạng thái","k":"st"}],"cards":[{"title":"Thống kê 24h","items":[{"l":"Msg thành công","v":"2,048,284","mono":true},{"l":"Msg lỗi","v":"412","mono":true},{"l":"Tỷ lệ lỗi","v":"0.02%"},{"l":"P99 latency","v":"284ms","mono":true}]}],"actions":[{"label":"🔄 Ping","cls":"p","toast":"Ping $NM"},{"label":"📜 Log","toast":"Log $NM"},{"label":"▶ Khởi động","cls":"ok","toast":"Khởi động $NM","tone":"ok"},{"label":"⏸ Tạm dừng","cls":"crit","toast":"Tạm dừng $NM","tone":"warn"}]};
  const [tab, setTab] = uIntegMod_s("all");
  const [sel, setSel] = uIntegMod_s(0);
  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>HL7 v2 · FHIR · DICOM · BHYT · API nội bộ — 28 kết nối</h3>
            {tabs.length > 0 && (<div className="mod-seg">{tabs.map(t => (<button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>{t.label}{t.n != null && <span className="n">{t.n}</span>}</button>))}</div>)}
            <div className="spacer"/>
            {act.map((a,i) => (<button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (<td key={j} className={c.cls || c.kind || ""}>
                        {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                        {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                        {c.kind === "bar" && (<div style={{display:"flex",alignItems:"center",gap:8}}><div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/></div><span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span></div>)}
                        {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                      </td>);
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h"><div className="t">{cur[side.titleKey] || "Chọn dòng"}</div><div className="s">{cur[side.subKey] || ""}</div></div>
            <div className="mod-side-b">
              {side.kvs && (<div className="mod-card"><div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div><div className="mod-card-b">{side.kvs.map((k,i) => (<div key={i} className="mod-kv"><div className="k">{k.lbl}</div><div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div></div>))}</div></div>)}
              {side.cards && side.cards.map((card, i) => (<div key={i} className="mod-card"><div className="mod-card-h">{card.title}</div><div className="mod-card-b">{card.items.map((it, j) => (<div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}><span style={{color:"var(--t-1)"}}>{it.l}</span><span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span></div>))}</div></div>))}
              {side.actions && (<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>{side.actions.map((a,i) => (<button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>))}</div>)}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.IntegMod = IntegMod;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="integration-status" crumb={["Tích hợp","Tình trạng"]}>
    <IntegMod/>
  </HisShell>
);
</script>
</body>
</html>
