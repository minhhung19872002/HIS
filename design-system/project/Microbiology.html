<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">

const MicrobiologyMod = () => {
  const kpis=[{"lbl":"Mẫu đang ủ","val":"82"},{"lbl":"Kết quả hôm nay","val":"42"},{"lbl":"Dương tính","val":"18","tone":"warn"},{"lbl":"Đa kháng (MDR)","val":"4","tone":"crit"}],tabs=[{"id":"inc","label":"Đang ủ"},{"id":"rs","label":"Kết quả"},{"id":"mdr","label":"MDR"},{"id":"ast","label":"Kháng sinh đồ"}],cols=[{"k":"code","label":"Mã mẫu","cls":"id"},{"k":"pt","label":"Bệnh nhân","cls":"nm"},{"k":"spec","label":"Mẫu"},{"k":"org","label":"Vi khuẩn"},{"k":"age","label":"Tuổi mẫu","cls":"id"},{"k":"st","label":"Trạng thái","kind":"stat"}],rows=[{"_tab":"inc","code":"MB-00284","pt":"Lê V. Hoà · BN-0945","spec":"Máu × 2 chai","org":"Đang nuôi cấy","age":"18h","st":"ĐANG Ủ","stTone":"info"},{"_tab":"inc","code":"MB-00283","pt":"Nguyễn T. Mai · BN-0812","spec":"Nước tiểu","org":"Đang nuôi cấy","age":"24h","st":"ĐANG Ủ","stTone":"info"},{"_tab":"rs","code":"MB-00282","pt":"Phạm V. Hải · BN-0888","spec":"Đàm","org":"K. pneumoniae ESBL(+)","age":"48h","st":"DƯƠNG TÍNH","stTone":"warn"},{"_tab":"mdr","code":"MB-00278","pt":"Trần V. Kế · BN-0666","spec":"Máu","org":"A. baumannii XDR","age":"72h","st":"CẢNH BÁO XDR","stTone":"crit"},{"_tab":"ast","code":"MB-00278-AST","pt":"Trần V. Kế · BN-0666","spec":"A. baumannii","org":"Colistin S · khác R","age":"—","st":"XDR","stTone":"crit"}],act=[{"label":"+ Đăng ký mẫu","cls":"p","toast":"Đăng ký mẫu vi sinh"},{"label":"📤 Gửi CDC","toast":"Gửi cảnh báo MDR lên CDC"},{"label":"🦠 Báo KSNK","cls":"crit","toast":"Báo khoa KSNK","tone":"warn"}];
  const side=null;
  const [tab,setTab]=uMicrobiologyMod_s("inc");
  const [sel,setSel]=uMicrobiologyMod_s(0);
  const filtered = tab==="all"?rows:rows.filter(r=>r._tab===tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (<div className="mod-wrap">
    {kpis.length>0 && (<div className="mod-strip">{kpis.map((k,i)=>(<div key={i} className={"mod-strip-cell "+(k.tone||"")}><div className="lbl">{k.lbl}</div><div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div></div>))}</div>)}

<script type="text/babel" data-presets="react">ReactDOM.createRoot(document.getElementById("root")).render(<HisShell route="microbiology" crumb={["Cận lâm sàng","Vi sinh"]}><MicrobiologyMod/></HisShell>);</script>
