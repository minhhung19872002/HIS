<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Đánh giá hiệu suất — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uPerfMod_s } = React;
const PerfMod = () => {
  const kpis = [{"lbl":"KPI đạt chuẩn","val":"78%","tone":"ok"},{"lbl":"KPI trung bình","val":"84.2","sub":"/100"},{"lbl":"Khoa xuất sắc","val":"3"},{"lbl":"Cần hỗ trợ","val":"2","tone":"warn"}];
  const tabs = [{"id":"ind","label":"Cá nhân"},{"id":"dept","label":"Khoa"},{"id":"qua","label":"Chất lượng"}];
  const cols = [{"k":"code","label":"Mã","cls":"id"},{"k":"nm","label":"Tên","cls":"nm"},{"k":"kpi1","label":"Lượt khám/tháng","cls":"num"},{"k":"kpi2","label":"BA đúng hạn","cls":"num"},{"k":"kpi3","label":"Hài lòng BN","cls":"num"},{"k":"tot","label":"Tổng KPI","cls":"num"},{"k":"tier","label":"Xếp loại","kind":"stat"}];
  const rows = [{"_tab":"ind","code":"NV-00284","nm":"BS. Phạm Văn Hải","kpi1":418,"kpi2":"98%","kpi3":"4.8/5","tot":"94","tier":"A","tierTone":"ok"},{"_tab":"ind","code":"NV-00318","nm":"BS. Trần Thị Lan","kpi1":482,"kpi2":"96%","kpi3":"4.7/5","tot":"92","tier":"A","tierTone":"ok"},{"_tab":"ind","code":"NV-00442","nm":"BS. Hoàng Thị Mai","kpi1":384,"kpi2":"88%","kpi3":"4.4/5","tot":"82","tier":"B","tierTone":"info"},{"_tab":"ind","code":"NV-00482","nm":"BS. Nguyễn Văn Bảo","kpi1":256,"kpi2":"78%","kpi3":"4.2/5","tot":"72","tier":"C","tierTone":"warn"},{"_tab":"ind","code":"NV-00612","nm":"ĐD. Nguyễn Thị Hoa","kpi1":"—","kpi2":"98%","kpi3":"4.8/5","tot":"96","tier":"A+","tierTone":"ok"},{"_tab":"dept","code":"K-TIM","nm":"Khoa Tim mạch","kpi1":3842,"kpi2":"96%","kpi3":"4.7/5","tot":"91","tier":"A","tierTone":"ok"},{"_tab":"dept","code":"K-SAN","nm":"Khoa Sản","kpi1":4482,"kpi2":"94%","kpi3":"4.6/5","tot":"89","tier":"A","tierTone":"ok"},{"_tab":"dept","code":"K-NOI","nm":"Khoa Nội TQ","kpi1":5218,"kpi2":"84%","kpi3":"4.2/5","tot":"78","tier":"B","tierTone":"info"},{"_tab":"qua","code":"CLBA-T10","nm":"Chất lượng BA toàn viện","kpi1":"—","kpi2":"92%","kpi3":"—","tot":"92","tier":"ĐẠT","tierTone":"ok"}];
  const act  = [{"label":"📊 Tổng hợp KPI","cls":"p","toast":"Xuất tổng hợp KPI T10"},{"label":"📤 Gửi khoa","toast":"Gửi KPI xuống các khoa"}];
  const side = {"titleKey":"nm","subKey":"code","kvs":[{"lbl":"KPI lượt khám","k":"kpi1"},{"lbl":"BA đúng hạn","k":"kpi2","mono":true},{"lbl":"Hài lòng BN","k":"kpi3","mono":true},{"lbl":"Tổng điểm","k":"tot"},{"lbl":"Xếp loại","k":"tier"}],"cards":[{"title":"Chi tiết điểm theo tiêu chí","items":[{"l":"Số lượt khám","v":"22/25"},{"l":"Chất lượng BA","v":"24/25"},{"l":"Thời gian khám TB","v":"18/20"},{"l":"Hài lòng BN","v":"19/20"},{"l":"Đào tạo CME","v":"10/10"}]}],"actions":[{"label":"📄 Phiếu đánh giá","cls":"p","toast":"Xem phiếu $NM"},{"label":"✎ Ghi nhận xét","toast":"Ghi nhận $NM"}]};
  const [tab, setTab] = uPerfMod_s("ind");
  const [sel, setSel] = uPerfMod_s(0);
  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>KPI cá nhân & khoa · tháng 10/2026</h3>
            {tabs.length > 0 && (
              <div className="mod-seg">
                {tabs.map(t => (
                  <button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>
                    {t.label}{t.n != null && <span className="n">{t.n}</span>}
                  </button>
                ))}
              </div>
            )}
            <div className="spacer"/>
            {act.map((a,i) => (
              <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>
            ))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (
                        <td key={j} className={c.cls || c.kind || ""}>
                          {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                          {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                          {c.kind === "bar" && (
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/>
                              </div>
                              <span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span>
                            </div>
                          )}
                          {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h">
              <div className="t">{cur[side.titleKey] || "Chọn dòng"}</div>
              <div className="s">{cur[side.subKey] || ""}</div>
            </div>
            <div className="mod-side-b">
              {side.kvs && (
                <div className="mod-card">
                  <div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div>
                  <div className="mod-card-b">
                    {side.kvs.map((k,i) => (
                      <div key={i} className="mod-kv">
                        <div className="k">{k.lbl}</div>
                        <div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {side.cards && side.cards.map((card, i) => (
                <div key={i} className="mod-card">
                  <div className="mod-card-h">{card.title}{card.count && <span className="n">{card.count}</span>}</div>
                  <div className={"mod-card-b"}>
                    {card.items && card.items.map((it, j) => (
                      <div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}>
                        <span style={{color:"var(--t-1)"}}>{it.l}</span>
                        <span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {side.actions && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>
                  {side.actions.map((a,i) => (
                    <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.PerfMod = PerfMod;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="perf-eval" crumb={["Quản trị","Đánh giá hiệu suất"]}>
    <PerfMod/>
  </HisShell>
);
</script>
</body>
</html>
