<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Bệnh mạn tính — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uChronicMod_s } = React;
const ChronicMod = () => {
  const kpis = [{"lbl":"BN đang quản lý","val":"4,284"},{"lbl":"THA","val":"1,842","sub":"43%"},{"lbl":"ĐTĐ type 2","val":"1,128","sub":"26%"},{"lbl":"Bỏ tái khám 30 ngày","val":"128","tone":"warn"},{"lbl":"HA/HbA1c đạt mục tiêu","val":"68%","delta":"+3% quý","dir":"up","tone":"ok"}];
  const tabs = [{"id":"all","label":"Tất cả"},{"id":"tha","label":"Tăng HA","n":1842},{"id":"dtd","label":"ĐTĐ 2","n":1128},{"id":"hen","label":"Hen/COPD","n":648},{"id":"tim","label":"Suy tim","n":214},{"id":"kid","label":"Bệnh thận mạn","n":188},{"id":"rsk","label":"Nguy cơ cao","n":64}];
  const cols = [{"k":"mrn","label":"MRN","cls":"id"},{"k":"pt","label":"BN · Tuổi","cls":"nm"},{"k":"dx","label":"Chẩn đoán"},{"k":"latest","label":"Chỉ số mới nhất","cls":"mono"},{"k":"tgt","label":"Mục tiêu","kind":"stat"},{"k":"last","label":"Khám gần nhất","cls":"id"},{"k":"next","label":"Tái khám","cls":"id"}];
  const rows = [{"_tab":"tha","mrn":"BN-0812","pt":"Nguyễn T. Mai · 58","dx":"I10 · THA · 3 năm","latest":"HA 142/88","tgt":"CHƯA ĐẠT","tgtTone":"warn","last":"15/10","next":"24/10"},{"_tab":"tha","mrn":"BN-0533","pt":"Hoàng V. Nam · 48","dx":"I10 + RLLM","latest":"HA 128/78","tgt":"ĐẠT","tgtTone":"ok","last":"18/10","next":"18/11"},{"_tab":"dtd","mrn":"BN-0666","pt":"Trần V. Kế · 67","dx":"E11 · ĐTĐ 2","latest":"HbA1c 8.2%","tgt":"CHƯA ĐẠT","tgtTone":"warn","last":"10/10","next":"24/10"},{"_tab":"dtd","mrn":"BN-0412","pt":"Lê T. Mùi · 62","dx":"E11 · 8 năm","latest":"HbA1c 6.8%","tgt":"ĐẠT","tgtTone":"ok","last":"22/10","next":"22/11"},{"_tab":"hen","mrn":"BN-0945","pt":"Vũ M. Tuấn · 28","dx":"J45 · Hen","latest":"FEV1 78%","tgt":"KIỂM SOÁT","tgtTone":"ok","last":"20/10","next":"20/11"},{"_tab":"tim","mrn":"BN-0189","pt":"Đào T. Hà · 72","dx":"I50 · NYHA III","latest":"BNP 812","tgt":"NGUY CƠ","tgtTone":"crit","last":"18/10","next":"25/10"},{"_tab":"kid","mrn":"BN-0724","pt":"Phạm V. Hưng · 64","dx":"N18.3 · CKD3b","latest":"eGFR 38","tgt":"GIÁM SÁT","tgtTone":"warn","last":"12/10","next":"26/10"},{"_tab":"rsk","mrn":"BN-0018","pt":"Đỗ V. Long · 78","dx":"THA + ĐTĐ + CKD","latest":"Đa chỉ số vượt","tgt":"RẤT CAO","tgtTone":"crit","last":"20/10","next":"24/10"}];
  const act  = [{"label":"+ Thêm BN chương trình","cls":"p","toast":"Mở form thêm BN"},{"label":"📊 Phân tích nhóm","toast":"Mở panel phân tích quần thể"},{"label":"📱 Nhắc tái khám","toast":"Nhắc 128 BN bỏ tái khám","tone":"info"}];
  const side = {"titleKey":"pt","subKey":"dx","kvs":[{"lbl":"MRN","k":"mrn","mono":true},{"lbl":"Chỉ số gần nhất","k":"latest","mono":true},{"lbl":"Trạng thái mục tiêu","k":"tgt"},{"lbl":"Khám gần nhất","k":"last","mono":true},{"lbl":"Tái khám","k":"next","mono":true}],"cards":[{"title":"Xu hướng 6 tháng","items":[{"l":"HA tâm thu TB","v":"138 mmHg"},{"l":"HA tâm trương TB","v":"86 mmHg"},{"l":"Tuân thủ thuốc","v":"84%"},{"l":"Lối sống (vận động)","v":"Trung bình"}]},{"title":"Thuốc mạn tính","items":[{"l":"Amlodipine 5mg","v":"1v/s · 12 tháng"},{"l":"Losartan 50mg","v":"1v/s · 8 tháng"},{"l":"Atorvastatin 10mg","v":"1v/t · 12 tháng"}]}],"actions":[{"label":"📈 Biểu đồ","cls":"p","toast":"Mở biểu đồ dài hạn · $NM"},{"label":"📋 Kê đơn BHYT","toast":"Kê đơn mạn tính 30 ngày · $NM"},{"label":"📱 Nhắc nhở","toast":"Nhắc $NM"},{"label":"📝 Ghi chú","toast":"Thêm ghi chú $NM"}]};
  const [tab, setTab] = uChronicMod_s("all");
  const [sel, setSel] = uChronicMod_s(0);
  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>Chương trình bệnh mạn tính · theo dõi dài hạn</h3>
            {tabs.length > 0 && (
              <div className="mod-seg">
                {tabs.map(t => (
                  <button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>
                    {t.label}{t.n != null && <span className="n">{t.n}</span>}
                  </button>
                ))}
              </div>
            )}
            <div className="spacer"/>
            {act.map((a,i) => (
              <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>
            ))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (
                        <td key={j} className={c.cls || c.kind || ""}>
                          {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                          {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                          {c.kind === "bar" && (
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/>
                              </div>
                              <span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span>
                            </div>
                          )}
                          {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu trong tab này.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h">
              <div className="t">{cur[side.titleKey] || side.emptyTitle || "Chọn một dòng"}</div>
              <div className="s">{cur[side.subKey] || side.emptySub || ""}</div>
            </div>
            <div className="mod-side-b">
              {side.kvs && (
                <div className="mod-card">
                  <div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div>
                  <div className="mod-card-b">
                    {side.kvs.map((k,i) => (
                      <div key={i} className="mod-kv">
                        <div className="k">{k.lbl}</div>
                        <div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {side.cards && side.cards.map((card, i) => (
                <div key={i} className="mod-card">
                  <div className="mod-card-h">{card.title}{card.count && <span className="n">{card.count}</span>}</div>
                  <div className={"mod-card-b"}>
                    {card.items && card.items.map((it, j) => (
                      <div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}>
                        <span style={{color:"var(--t-1)"}}>{it.l}</span>
                        <span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {side.actions && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>
                  {side.actions.map((a,i) => (
                    <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.ChronicMod = ChronicMod;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="chronic-disease" crumb={["Lâm sàng","Bệnh mạn tính"]}>
    <ChronicMod/>
  </HisShell>
);
</script>
</body>
</html>
