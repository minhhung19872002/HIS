<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Lưu trữ HSBA — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="his-shell.css"/>
<link rel="stylesheet" href="his-module.css"/>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">

const { useState: uMRAMod_s } = React;
const MRAMod = () => {
  const kpis = [{"lbl":"HSBA trong kho","val":"184,220"},{"lbl":"Chờ nhập kho","val":"42","tone":"warn"},{"lbl":"Mượn đang trả","val":"18","tone":"info"},{"lbl":"Tiêu hủy đến hạn","val":"1,240","sub":"HSBA"},{"lbl":"Dung lượng số","val":"4.2 TB","delta":"88% ổ cứng","dir":"flat"}];
  const tabs = [{"id":"all","label":"Tất cả"},{"id":"in","label":"Nhập kho","n":42},{"id":"loan","label":"Mượn/Trả","n":18},{"id":"seal","label":"Niêm phong","n":6},{"id":"dis","label":"Tiêu huỷ","n":1240}];
  const cols = [{"k":"code","label":"Mã HSBA","cls":"id"},{"k":"pt","label":"Bệnh nhân","cls":"nm"},{"k":"dept","label":"Khoa ra viện"},{"k":"adm","label":"Vào","cls":"id"},{"k":"dis","label":"Ra","cls":"id"},{"k":"loc","label":"Vị trí","cls":"id"},{"k":"st","label":"Trạng thái","kind":"stat"}];
  const rows = [{"_tab":"in","code":"HSBA-2024-18420","pt":"Nguyễn T. Mai · 58t","dept":"Tim mạch","adm":"15/10","dis":"23/10","loc":"-","st":"CHỜ NHẬP","stTone":"warn"},{"_tab":"in","code":"HSBA-2024-18418","pt":"Trần Văn Hùng · 42t","dept":"Ngoại TH","adm":"10/10","dis":"22/10","loc":"-","st":"CHỜ NHẬP","stTone":"warn"},{"_tab":"loan","code":"HSBA-2023-14220","pt":"Lê V. Hòa · 38t","dept":"Nội tiêu hoá","adm":"—","dis":"12/2023","loc":"A3-R14-HH08","st":"BS. Trần Lan mượn","stTone":"info","borrowed":"3 ngày"},{"_tab":"loan","code":"HSBA-2023-12841","pt":"Phạm T. Lan · 34t","dept":"Sản","adm":"—","dis":"08/2023","loc":"B2-R08-HH22","st":"NCKH · PGS. Hoa","stTone":"info","borrowed":"12 ngày"},{"_tab":"seal","code":"HSBA-2022-09811","pt":"Vũ V. Đức · 45t","dept":"Ngoại CT","adm":"—","dis":"05/2022","loc":"C1-R02-HH04","st":"NIÊM PHONG","stTone":"crit","reason":"Phục vụ điều tra · CV-PC45"},{"_tab":"seal","code":"HSBA-2022-06422","pt":"Hoàng T. Tâm · 52t","dept":"Cấp cứu","adm":"—","dis":"11/2022","loc":"C1-R02-HH09","st":"NIÊM PHONG","stTone":"crit","reason":"Khiếu nại y khoa"},{"_tab":"dis","code":"HSBA-2004-00114","pt":"(HSBA quá hạn 20 năm)","dept":"Nội TQ","adm":"—","dis":"2004","loc":"Z1-R01-HH11","st":"ĐỦ ĐIỀU KIỆN HUỶ","stTone":"ghost"}];
  const act  = [{"label":"+ Nhập kho","cls":"p","toast":"Mở form nhập kho HSBA"},{"label":"🔍 Tìm HSBA","toast":"Mở tìm kiếm nâng cao"},{"label":"📋 BB tiêu hủy","toast":"Xuất biên bản tiêu hủy"}];
  const side = {"titleKey":"code","subKey":"pt","kvs":[{"lbl":"Khoa ra viện","k":"dept"},{"lbl":"Thời gian vào","k":"adm","mono":true},{"lbl":"Thời gian ra","k":"dis","mono":true},{"lbl":"Vị trí vật lý","k":"loc","mono":true}],"cards":[{"title":"Lịch sử mượn","items":[{"l":"BS. Trần Lan","v":"21/10/2026 · NCKH"},{"l":"Trả","v":"—"}]},{"title":"File số đính kèm","items":[{"l":"Tóm tắt BA (PDF)","v":"2.1 MB"},{"l":"XQ-001.dcm","v":"18 MB"},{"l":"Ảnh phẫu thuật (7)","v":"42 MB"},{"l":"Chữ ký số","v":"Hợp lệ · CA-MIC"}]}],"actions":[{"label":"👁 Xem số","cls":"p","toast":"Mở bản số của $NM"},{"label":"📤 Cho mượn","toast":"Mở form cho mượn $NM"},{"label":"🔒 Niêm phong","toast":"Niêm phong $NM","tone":"warn"},{"label":"📍 Định vị","toast":"Hiện vị trí vật lý của $NM"}]};
  const extra = null;
  const [tab, setTab] = uMRAMod_s("all");
  const [sel, setSel] = uMRAMod_s(0);

  const filtered = tab === "all" ? rows : rows.filter(r => r._tab === tab);
  const cur = filtered[sel] || filtered[0] || {};

  return (
    <div className="mod-wrap">
      {kpis.length > 0 && (
        <div className="mod-strip">
          {kpis.map((k,i) => (
            <div key={i} className={"mod-strip-cell " + (k.tone || "")}>
              <div className="lbl">{k.lbl}</div>
              <div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div>
              {k.delta && <div className="delta" style={{color: k.dir==="up"?"var(--s-ok)":k.dir==="down"?"var(--s-crit)":"var(--t-2)"}}>{k.dir==="up"?"↗":k.dir==="down"?"↘":"·"} {k.delta}</div>}
            </div>
          ))}
        </div>
      )}
      <div className={"mod-body " + (side ? "cols-2" : "")}>
        <div className="mod-pane">
          <div className="mod-toolbar">
            <h3>Kho lưu trữ HSBA giấy + số</h3>
            {tabs.length > 0 && (
              <div className="mod-seg">
                {tabs.map(t => (
                  <button key={t.id} className={"mod-seg-i " + (tab===t.id?"on":"")} onClick={() => { setTab(t.id); setSel(0); }}>
                    {t.label}{t.n != null && <span className="n">{t.n}</span>}
                  </button>
                ))}
              </div>
            )}
            <div className="spacer"/>
            {act.map((a,i) => (
              <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast(a.toast, {tone: a.tone || "info"})}>{a.label}</button>
            ))}
          </div>
          <div className="mod-tbl-wrap">
            <table className="mod-tbl">
              <thead><tr>{cols.map((c,i) => <th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead>
              <tbody>
                {filtered.map((r,i) => (
                  <tr key={i} className={sel===i?"sel":""} onClick={() => setSel(i)}>
                    {cols.map((c,j) => {
                      const v = r[c.k];
                      return (
                        <td key={j} className={c.cls || c.kind || ""}>
                          {c.kind === "stat" && <span className={"mod-stat " + (r[c.k+"Tone"] || "ghost")}>{v}</span>}
                          {c.kind === "badge" && <span className={"mod-badge " + (r[c.k+"Tone"] || "")}>{v}</span>}
                          {c.kind === "bar" && (
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1,maxWidth:100,height:6,background:"var(--d-3)",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:v+"%",background:v>=90?"var(--s-crit)":v>=75?"var(--s-warn)":"var(--s-ok)"}}/>
                              </div>
                              <span style={{fontFamily:"var(--font-mono)",fontSize:11}}>{v}%</span>
                            </div>
                          )}
                          {!c.kind && (v != null ? v : <span style={{color:"var(--t-3)"}}>—</span>)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={cols.length}><div className="mod-empty">Không có dữ liệu trong tab này.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
        {side && (
          <aside className="mod-side">
            <div className="mod-side-h">
              <div className="t">{cur[side.titleKey] || side.emptyTitle || "Chọn một dòng"}</div>
              <div className="s">{cur[side.subKey] || side.emptySub || ""}</div>
            </div>
            <div className="mod-side-b">
              {side.kvs && (
                <div className="mod-card">
                  <div className="mod-card-h">{side.kvsTitle || "Chi tiết"}</div>
                  <div className="mod-card-b">
                    {side.kvs.map((k,i) => (
                      <div key={i} className="mod-kv">
                        <div className="k">{k.lbl}</div>
                        <div className={"v " + (k.mono ? "mono" : "")}>{cur[k.k] != null ? cur[k.k] : "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {side.cards && side.cards.map((card, i) => (
                <div key={i} className="mod-card">
                  <div className="mod-card-h">{card.title}{card.count && <span className="n">{card.count}</span>}</div>
                  <div className={"mod-card-b"}>
                    {card.items && card.items.map((it, j) => (
                      <div key={j} style={{padding:"7px 0",borderBottom:"1px solid var(--line-hair)",fontSize:12, display:"flex",justifyContent:"space-between",gap:10}}>
                        <span style={{color:"var(--t-1)"}}>{it.l}</span>
                        <span style={{color:"var(--t-0)",fontWeight:500,fontFamily:it.mono?"var(--font-mono)":"inherit",fontSize:it.mono?11:12}}>{it.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {side.actions && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:12}}>
                  {side.actions.map((a,i) => (
                    <button key={i} className={"mod-btn " + (a.cls || "")} onClick={() => HUI.toast((a.toast||"").replace("$NM", cur[side.titleKey]||"—"), {tone:a.tone||"info"})}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
};
window.MRAMod = MRAMod;

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(
  <HisShell route="medical-record-archive" crumb={["Lâm sàng","Lưu trữ HSBA"]}>
    <MRAMod/>
  </HisShell>
);
</script>
</body>
</html>
