<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Phòng mổ · Lịch mổ — HIS Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================
   HIS Terminal — Shared Chrome
   ============================================ */

:root {
  --font-sans: "Inter", "IBM Plex Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", Consolas, monospace;

  --d-0: #ffffff;
  --d-1: #f7f9fc;
  --d-2: #ffffff;
  --d-3: #f1f5f9;
  --d-4: #e5edf7;
  --d-5: #cbd6e3;

  --line: #e4e9f0;
  --line-soft: #edf1f6;
  --line-hair: #f1f4f9;

  --t-0: #0f172a;
  --t-1: #334155;
  --t-2: #64748b;
  --t-3: #94a3b8;
  --t-4: #cbd5e1;

  --a-cy: #2563eb;
  --a-cy-dim: #1d4ed8;
  --a-cy-bg: #eff5ff;
  --a-cy-line: #bfd3fa;

  --s-crit: #dc2626;
  --s-crit-bg: #fef2f2;
  --s-warn: #d97706;
  --s-warn-bg: #fffbeb;
  --s-ok:   #16a34a;
  --s-ok-bg: #f0fdf4;
  --s-info: #0284c7;
  --s-info-bg: #f0f9ff;
  --s-mag:  #7c3aed;
  --s-mag-bg: #f5f3ff;

  --r-1: 3px;
  --r-2: 6px;
  --r-3: 8px;
  --r-4: 12px;

  --row-h: 40px;
  --ctl-h: 32px;
  --fs-xxs: 10px;
  --fs-xs: 11px;
  --fs-sm: 12px;
  --fs-md: 13px;
  --fs-lg: 15px;
  --fs-xl: 20px;
}

* { box-sizing: border-box; }
html, body, #root {
  margin: 0; height: 100%;
  background: var(--d-1);
  color: var(--t-0);
  font-family: var(--font-sans);
  font-size: var(--fs-md);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; padding: 0; }
input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; outline: none; }
a { color: inherit; text-decoration: none; }

.mono { font-family: var(--font-mono); font-feature-settings: "tnum", "zero"; letter-spacing: -0.01em; }
.tab-num { font-variant-numeric: tabular-nums; }
.up { text-transform: uppercase; letter-spacing: 0.06em; }

/* ============== APP SHELL ============== */
.his-app {
  display: grid;
  grid-template-columns: 64px 1fr;
  grid-template-rows: 44px 32px 1fr 26px;
  height: 100vh;
  min-width: 1280px;
  overflow: hidden;
  position: relative;
}
.his-app.has-pinned {
  grid-template-columns: 64px 240px 1fr;
}
.his-app.has-pinned .his-topbar,
.his-app.has-pinned .his-ticker,
.his-app.has-pinned .his-main { grid-column: 3; }
.his-app.has-pinned .his-flyout.pinned {
  position: static;
  grid-column: 2;
  grid-row: 1 / -1;
  box-shadow: none;
  border-right: 1px solid var(--line);
}
html, body { min-width: 1280px; }
.his-rail    { grid-column: 1; grid-row: 1 / -1; }
.his-topbar  { grid-column: 2; grid-row: 1; }
.his-ticker  { grid-column: 2; grid-row: 2; }
.his-main    { grid-column: 2; grid-row: 3; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.his-status  { grid-column: 1 / -1; grid-row: 4; }

/* ============== RAIL ============== */
.his-rail {
  background: #ffffff;
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 0 6px;
  gap: 2px;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
}
.his-rail::-webkit-scrollbar { width: 4px; }
.his-rail::-webkit-scrollbar-thumb { background: var(--d-3); border-radius: 2px; }
.his-rail::-webkit-scrollbar-track { background: transparent; }
.his-rail-mark {
  width: 40px; height: 40px;
  display: grid; place-items: center;
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  background: var(--a-cy);
  border-radius: 10px;
  margin-bottom: 10px;
  letter-spacing: 0;
}
.his-rail-item {
  width: 48px; padding: 6px 0;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  color: var(--t-2);
  border-radius: 6px;
  position: relative;
  cursor: pointer;
  transition: color 0.12s, background 0.12s;
  background: transparent;
  border: 0;
  font: inherit;
  text-align: center;
}
.his-rail-item:hover { color: var(--t-0); background: var(--d-3); }
.his-rail-item.active {
  color: var(--a-cy);
  background: var(--a-cy-bg);
}
.his-rail-item.pinned {
  color: var(--a-cy);
  background: var(--a-cy-bg);
}
.his-rail-item.pinned:not(.active)::before {
  content: "";
  position: absolute; left: -10px; top: 10px; bottom: 10px;
  width: 2px; background: var(--a-cy); border-radius: 1px;
  opacity: 0.5;
}
.his-rail-item.active::before {
  content: "";
  position: absolute; left: -10px; top: 10px; bottom: 10px;
  width: 2px; background: var(--a-cy); border-radius: 1px;
}
.his-rail-item .lbl {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.02em;
  font-weight: 500;
}
.his-rail-item .hot {
  position: absolute; top: 2px; right: 4px;
  min-width: 16px; height: 14px; padding: 0 4px;
  background: var(--s-crit); color: #fff;
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 700;
  border-radius: 7px;
  display: grid; place-items: center;
  pointer-events: none;
}
.his-rail-div {
  width: 28px; height: 1px;
  background: var(--line);
  margin: 8px 0;
}
.his-rail-spacer { flex: 1; }

/* ============== FLYOUT (group submenu) ============== */
.his-flyout {
  position: absolute;
  left: 64px;
  top: 0;
  bottom: 26px;
  width: 240px;
  background: #ffffff;
  border-right: 1px solid var(--line);
  box-shadow: 2px 0 16px rgba(15, 23, 42, 0.08);
  z-index: 40;
  display: flex;
  flex-direction: column;
  animation: flyoutIn 0.12s ease-out;
}
@keyframes flyoutIn {
  from { opacity: 0; transform: translateX(-6px); }
  to { opacity: 1; transform: translateX(0); }
}
.his-flyout-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--line);
  background: var(--d-1, #f8fafc);
}
.his-flyout-title {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--t-0);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.his-flyout-title .count {
  font-size: 10px;
  color: var(--t-3);
  background: var(--d-2, #eef2f7);
  padding: 1px 6px;
  border-radius: 8px;
  font-weight: 500;
}
.his-flyout-actions { display: flex; gap: 2px; }
.his-flyout-pin, .his-flyout-close {
  width: 22px; height: 22px;
  border: 0; background: transparent;
  color: var(--t-3);
  font-size: 14px; line-height: 1;
  cursor: pointer;
  border-radius: 4px;
  display: grid; place-items: center;
}
.his-flyout-pin:hover, .his-flyout-close:hover { background: var(--d-3); color: var(--t-0); }
.his-flyout-pin.on { color: var(--a-cy); }
.his-flyout-body {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
  scrollbar-width: thin;
}
.his-flyout-body::-webkit-scrollbar { width: 4px; }
.his-flyout-body::-webkit-scrollbar-thumb { background: var(--d-3); border-radius: 2px; }
.his-flyout-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 14px;
  color: var(--t-1);
  font-size: 13px;
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
  border-left: 2px solid transparent;
}
.his-flyout-item:hover { background: var(--d-3); color: var(--t-0); }
.his-flyout-item.active {
  color: var(--a-cy);
  background: var(--a-cy-bg);
  border-left-color: var(--a-cy);
  font-weight: 500;
}
.his-flyout-item .lbl { flex: 1; }
.his-flyout-item .hot {
  min-width: 18px; height: 16px; padding: 0 5px;
  background: var(--s-crit); color: #fff;
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 700;
  border-radius: 8px;
  display: grid; place-items: center;
}

/* ============== TOPBAR ============== */
.his-topbar {
  background: #ffffff;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 12px;
}
.his-tb-crumb {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px;
  color: var(--t-2);
  min-width: 0;
}
.his-tb-crumb .here { color: var(--t-0); font-weight: 600; }
.his-tb-crumb .slash { color: var(--t-4); }
.his-tb-crumb .hosp {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--t-0);
  font-weight: 600;
  font-size: 13px;
}
.his-tb-crumb .hosp::after { content: ""; width: 1px; height: 14px; background: var(--line); margin-left: 8px; }

.his-cmd {
  flex: 1; max-width: 480px;
  height: 28px;
  background: var(--d-1);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  display: flex; align-items: center;
  padding: 0 10px;
  gap: 8px;
  color: var(--t-2);
  font-size: 12px;
  cursor: pointer;
  transition: border-color 0.12s, background 0.12s;
}
.his-cmd:hover { border-color: var(--a-cy-line); background: #fff; }
.his-cmd .prompt { color: var(--a-cy); font-family: var(--font-mono); font-weight: 600; }
.his-cmd .hint { flex: 1; color: var(--t-3); }
.his-cmd kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 1px 5px;
  background: #fff;
  border: 1px solid var(--line);
  color: var(--t-2);
  border-radius: 3px;
}

.his-tb-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

.his-chip-shift {
  height: 24px; padding: 0 8px;
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 10px;
  background: var(--s-ok-bg); border: 1px solid #bbf7d0;
  border-radius: 3px;
  color: #15803d;
  font-weight: 600;
}
.his-chip-shift .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--s-ok); }

.his-clock {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--t-1);
  font-weight: 500;
  padding: 0 4px;
}
.his-clock .d { color: var(--t-3); font-size: 10px; }

.his-tb-btn {
  width: 28px; height: 28px;
  display: grid; place-items: center;
  color: var(--t-2);
  border-radius: var(--r-2);
  position: relative;
  cursor: pointer;
  transition: color 0.12s, background 0.12s;
}
.his-tb-btn:hover { color: var(--t-0); background: var(--d-3); }
.his-tb-btn .dot-alert {
  position: absolute; top: 4px; right: 4px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--s-crit);
  border: 1.5px solid #fff;
}

.his-user {
  display: flex; align-items: center; gap: 8px;
  padding: 2px 8px 2px 2px;
  border-radius: var(--r-2);
  cursor: pointer;
  border: 1px solid transparent;
}
.his-user:hover { border-color: var(--line); background: var(--d-3); }
.his-user .avatar {
  width: 26px; height: 26px; border-radius: 4px;
  background: var(--a-cy);
  color: #fff;
  display: grid; place-items: center;
  font-size: 11px; font-weight: 700;
}
.his-user .who { display: flex; flex-direction: column; line-height: 1.15; }
.his-user .who .n { font-size: 12px; color: var(--t-0); font-weight: 600; }
.his-user .who .r { font-size: 10px; color: var(--t-2); font-family: var(--font-mono); }

/* ============== TICKER ============== */
.his-ticker {
  background: #0f172a;
  color: #e2e8f0;
  display: flex;
  align-items: center;
  overflow: hidden;
  font-family: var(--font-mono);
  font-size: 11px;
  position: relative;
}
.his-ticker-head {
  flex-shrink: 0;
  padding: 0 10px;
  height: 100%;
  display: flex; align-items: center; gap: 6px;
  background: #020617;
  color: #f8fafc;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  border-right: 1px solid #1e293b;
}
.his-ticker-head .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--s-ok);
  animation: his-pulse 1.6s ease-in-out infinite;
}
@keyframes his-pulse { 50% { opacity: 0.4; } }
.his-ticker-scroll {
  flex: 1;
  display: flex; align-items: center; gap: 28px;
  animation: his-ticker-run 60s linear infinite;
  white-space: nowrap;
  padding-left: 16px;
}
@keyframes his-ticker-run {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
.his-ticker-item {
  display: inline-flex; align-items: center; gap: 6px;
  color: #94a3b8;
}
.his-ticker-item b {
  color: #f8fafc;
  font-weight: 600;
}
.his-ticker-item.up b    { color: #4ade80; }
.his-ticker-item.down b  { color: #f87171; }
.his-ticker-item.warn b  { color: #fbbf24; }

/* Patient context pill (bolted onto ticker left) */
.his-patient-pill {
  flex-shrink: 0;
  height: 24px;
  margin: 0 8px;
  padding: 0 10px 0 6px;
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 3px;
  display: inline-flex; align-items: center; gap: 8px;
  color: #e2e8f0;
  font-family: var(--font-mono);
  font-size: 10px;
  cursor: pointer;
}
.his-patient-pill:hover { background: #334155; }
.his-patient-pill .tk {
  padding: 1px 5px;
  background: var(--a-cy);
  color: #fff;
  border-radius: 2px;
  font-weight: 600;
}
.his-patient-pill .nm { color: #f8fafc; font-weight: 600; }
.his-patient-pill .id { color: #94a3b8; }
.his-patient-pill .x { color: #64748b; cursor: pointer; }
.his-patient-pill .x:hover { color: #f87171; }

/* ============== STATUS BAR ============== */
.his-status {
  background: #0f172a;
  color: #cbd5e1;
  border-top: 1px solid #1e293b;
  display: flex; align-items: center;
  padding: 0 12px;
  gap: 14px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.02em;
}
.his-status .seg { display: inline-flex; align-items: center; gap: 5px; }
.his-status .seg b { color: #f8fafc; font-weight: 600; }
.his-status .seg.ok b { color: #4ade80; }
.his-status .seg.warn b { color: #fbbf24; }
.his-status .sep { width: 1px; height: 12px; background: #1e293b; }
.his-status .spacer { flex: 1; }
.his-status kbd {
  display: inline-block;
  padding: 1px 5px;
  min-width: 14px;
  text-align: center;
  background: #1e293b;
  border: 1px solid #334155;
  color: #cbd5e1;
  border-radius: 2px;
  font-size: 9px;
  font-family: var(--font-mono);
}

/* ============== CONTENT ============== */
.his-content {
  flex: 1;
  overflow: auto;
  position: relative;
  background: var(--d-1);
}

/* ============== COMMAND PALETTE ============== */
.his-cmdk-backdrop {
  position: fixed; inset: 0;
  background: rgba(15, 23, 42, 0.45);
  backdrop-filter: blur(3px);
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 12vh;
  z-index: 1000;
  animation: his-f 0.12s ease;
}
.his-cmdk {
  width: 560px; max-width: 92vw;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 10px;
  box-shadow: 0 24px 60px rgba(15, 23, 42, 0.25);
  overflow: hidden;
  animation: his-p 0.14s ease;
}
.his-cmdk-in {
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 10px;
}
.his-cmdk-in .prompt {
  color: var(--a-cy);
  font-family: var(--font-mono);
  font-weight: 700;
}
.his-cmdk-in input {
  flex: 1;
  border: 0;
  font-size: 15px;
  background: transparent;
}
.his-cmdk-in kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 6px;
  background: var(--d-1);
  border: 1px solid var(--line);
  color: var(--t-2);
  border-radius: 3px;
}
.his-cmdk-body {
  max-height: 50vh;
  overflow: auto;
  padding: 4px 0;
}
.his-cmdk-sec {
  padding: 10px 16px 4px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--t-3);
}
.his-cmdk-row {
  padding: 8px 16px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer;
  font-size: 13px;
  color: var(--t-1);
}
.his-cmdk-row:hover, .his-cmdk-row.active {
  background: var(--a-cy-bg);
  color: var(--a-cy);
}
.his-cmdk-row .lbl { flex: 1; }
.his-cmdk-row .sub { color: var(--t-3); font-size: 11px; font-family: var(--font-mono); }
.his-cmdk-row .ico { color: var(--t-3); }
.his-cmdk-row:hover .ico, .his-cmdk-row.active .ico { color: var(--a-cy); }
.his-cmdk-ft {
  padding: 8px 16px;
  border-top: 1px solid var(--line);
  background: var(--d-1);
  display: flex; gap: 14px;
  font-size: 10px;
  color: var(--t-3);
  font-family: var(--font-mono);
}
@keyframes his-f { from { opacity: 0; } to { opacity: 1; } }
@keyframes his-p { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }

/* ============== SHARED COMPONENTS (panel, btn, tbl, chip) ============== */
.panel {
  background: #ffffff;
  border: 1px solid var(--line);
  border-radius: var(--r-3);
  display: flex; flex-direction: column;
  min-height: 0;
  overflow: hidden;
  box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
}
.panel-h {
  height: 40px;
  padding: 0 14px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 10px;
  background: #ffffff;
  flex-shrink: 0;
}
.panel-h .title {
  font-size: 12px;
  color: var(--t-0);
  font-weight: 600;
}
.panel-h .title b { color: var(--a-cy); font-weight: 700; }
.panel-h .sub { font-size: 11px; color: var(--t-2); font-family: var(--font-mono); }
.panel-h .actions { margin-left: auto; display: flex; gap: 6px; }
.panel-body { flex: 1; overflow: auto; min-height: 0; }
.panel-body.pad { padding: 14px; }

.btn {
  height: var(--ctl-h);
  padding: 0 12px;
  display: inline-flex; align-items: center; gap: 6px;
  background: #ffffff;
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  color: var(--t-0);
  font-size: 12px;
  font-weight: 500;
  transition: all 0.12s;
  white-space: nowrap;
}
.btn:hover { background: var(--d-3); border-color: var(--d-5); }
.btn.primary { background: var(--a-cy); color: #fff; border-color: var(--a-cy); font-weight: 600; }
.btn.primary:hover { background: var(--a-cy-dim); border-color: var(--a-cy-dim); }
.btn.ghost { background: transparent; border-color: transparent; color: var(--t-1); }
.btn.ghost:hover { background: var(--d-3); color: var(--t-0); }
.btn.danger { color: var(--s-crit); border-color: var(--line); }
.btn.danger:hover { background: var(--s-crit-bg); border-color: #fecaca; }
.btn.icon { padding: 0; width: var(--ctl-h); justify-content: center; }
.btn.sm { height: 24px; font-size: 11px; padding: 0 8px; }

.input, .select {
  height: var(--ctl-h);
  padding: 0 10px;
  background: #ffffff;
  border: 1px solid var(--d-5);
  border-radius: var(--r-2);
  color: var(--t-0);
  font-size: 12px;
  width: 100%;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.input:focus, .select:focus {
  border-color: var(--a-cy);

.hui-hint { font-size: 11px; color: var(--t-2); }
.hui-err { font-size: 11px; color: var(--s-crit); }
.hui-span-2 { grid-column: span 2; }
.hui-span-3 { grid-column: span 3; }
.hui-span-full { grid-column: 1 / -1; }

.hui-row { display: grid; }

.hui-inp-wrap { position: relative; display: flex; align-items: center; }
.hui-inp-wrap .pre, .hui-inp-wrap .suf {

  pointer-events: none;

.hui-inp-wrap .pre { left: 9px; }
.hui-inp-wrap .suf { right: 9px; font-size: 11px; }
.hui-inp-wrap:has(.pre) .hui-inp { padding-left: 30px; }
.hui-inp-wrap:has(.suf) .hui-inp { padding-right: 30px; }

.hui-inp {
  width: 100%;
  height: 34px;
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  padding: 0 10px;
  font: inherit; font-size: 13px;
  color: var(--t-0);
  background: #fff;
  transition: border .1s, box-shadow .1s;
}
.hui-inp:focus {
  outline: none;
  border-color: var(--a-cy);
  box-shadow: 0 0 0 3px var(--a-cy-bg);
}
.hui-ta { min-height: 80px; padding: 8px 10px; resize: vertical; line-height: 1.5; }
.hui-sel { appearance: none; padding-right: 28px; cursor: pointer; }

.hui-chk {
  display: inline-flex; align-items: center; gap: 8px;
  cursor: pointer; font-size: 12.5px; color: var(--t-1);
}
.hui-chk input { display: none; }
.hui-chk .box {
  width: 16px; height: 16px;
  border: 1.5px solid var(--line);
  border-radius: 3px;
  background: #fff;
  display: grid; place-items: center;
  color: transparent;
  transition: all .1s;
}
.hui-chk input:checked + .box { background: var(--a-cy); border-color: var(--a-cy); color: #fff; }

.hui-radio-g { display: flex; flex-direction: column; gap: 6px; }
.hui-radio {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  cursor: pointer;
  transition: all .1s;

.hui-radio:hover { border-color: var(--t-3); background: var(--d-1); }
.hui-radio.on { border-color: var(--a-cy); background: var(--a-cy-bg); }
.hui-radio input { display: none; }
.hui-radio .dot {
  width: 16px; height: 16px; flex: none;
  border-radius: 50%;
  border: 1.5px solid var(--t-3);
  background: #fff;
  margin-top: 1px;
  position: relative;
}
.hui-radio.on .dot { border-color: var(--a-cy); }
.hui-radio.on .dot::after {
  content: ""; position: absolute; inset: 3px;
  background: var(--a-cy); border-radius: 50%;

.hui-radio .t { display: flex; flex-direction: column; gap: 2px; }
.hui-radio .t b { font-size: 12.5px; font-weight: 600; color: var(--t-0); }
.hui-radio .t i { font-size: 11.5px; font-style: normal; color: var(--t-2); }

.hui-toast.hui-tone-warn { background: #b45309; }
.hui-toast.hui-tone-info { background: var(--a-cy-dim); }

.hui-section-t {

.hui-kv .k { color: var(--t-2); font-size: 11.5px; }
.hui-kv .v { color: var(--t-0); font-weight: 500; }

.hui-callout {

.hui-callout.crit { background: var(--s-crit-bg); border-color: #fecaca; color: #991b1b; }
.hui-callout.ok   { background: var(--s-ok-bg); border-color: #bbf7d0; color: #166534; }

const HIS_ROUTES = HIS_GROUPS.flatMap(g => g.items.map(it => ({ ...it, groupId: g.id, icon: g.icon })));

// Helper: find group containing a route id
const groupOf = (routeId) => HIS_GROUPS.find(g => g.items.some(it => it.id === routeId));

// ============== RAIL (group-level) ==============
const Rail = ({ active, onHoverGroup, onLeaveGroup, pinnedGroup }) => {
  const activeGroupId = groupOf(active)?.id;
  return (
    <aside className="his-rail">
      <a href="index.html" className="his-rail-mark" title="HIS Terminal">HIS</a>
      {HIS_GROUPS.map(g => {
        const isActive = g.id === activeGroupId;
        const isPinned = g.id === pinnedGroup;
        return (
          <button
            key={g.id}
            className={"his-rail-item " + (isActive ? "active " : "") + (isPinned ? "pinned" : "")}
            title={g.label}
            onMouseEnter={() => onHoverGroup(g.id)}
            onClick={() => onHoverGroup(g.id, true)}
          >
            <Ico name={g.icon} size={18}/>
            {g.hot && <span className="hot">{g.hot}</span>}
            <span className="lbl">{g.short}</span>
          </button>
        );
      })}
      <div className="his-rail-spacer"/>
    </aside>
  );
};

// ============== FLYOUT (group submenu) ==============
const Flyout = ({ groupId, active, onClose, pinned, onTogglePin }) => {
  const g = HIS_GROUPS.find(x => x.id === groupId);
  if (!g) return null;
  return (
    <div
      className={"his-flyout " + (pinned ? "pinned" : "")}
      onMouseLeave={() => { if (!pinned) onClose(); }}
    >
      <div className="his-flyout-head">
        <div className="his-flyout-title">
          <Ico name={g.icon} size={14}/>
          <span>{g.label}</span>
          <span className="count">{g.items.length}</span>
        </div>
        <div className="his-flyout-actions">
          <button
            className={"his-flyout-pin " + (pinned ? "on" : "")}
            onClick={onTogglePin}
            title={pinned ? "Bỏ ghim" : "Ghim menu"}
          >
            {pinned ? "◉" : "◯"}
          </button>
          {!pinned && <button className="his-flyout-close" onClick={onClose} title="Đóng">×</button>}
        </div>
      </div>
      <div className="his-flyout-body">
        {g.items.map(it => (
          <a
            key={it.id}
            href={it.href}
            className={"his-flyout-item " + (it.id === active ? "active" : "")}
          >
            <span className="lbl">{it.label}</span>
            {it.hot && <span className="hot">{it.hot}</span>}
          </a>
        ))}
      </div>
    </div>
  );
};

  return now;

// ============== CMD-K PALETTE ==============
const CmdK = ({ open, onClose }) => {
  const [q, setQ] = useS("");
  const inputRef = useR(null);
  useE(() => { if (open && inputRef.current) inputRef.current.focus(); }, [open]);
  useE(() => {
    const h = (e) => { if (e.key === "Escape") onClose(); };
    if (open) window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [open, onClose]);
  if (!open) return null;

  const matches = HIS_ROUTES.filter(r => !q || r.label.toLowerCase().includes(q.toLowerCase())).slice(0, 12);
  const patientMatches = q.length >= 2
    ? HIS.patients.filter(p => p.name.toLowerCase().includes(q.toLowerCase()) || p.id.toLowerCase().includes(q.toLowerCase())).slice(0, 4)
    : [];

  return (
    <div className="his-cmdk-backdrop" onClick={onClose}>
      <div className="his-cmdk" onClick={(e) => e.stopPropagation()}>
        <div className="his-cmdk-in">
          <span className="prompt">❯</span>
          <input ref={inputRef} value={q} onChange={e => setQ(e.target.value)} placeholder="Tìm module, bệnh nhân, hành động…"/>
          <kbd>ESC</kbd>
        </div>
        <div className="his-cmdk-body">
          {patientMatches.length > 0 && <>
            <div className="his-cmdk-sec">Bệnh nhân</div>
            {patientMatches.map(p => (
              <a key={p.id} href={`EMR.html?pid=${p.id}`} className="his-cmdk-row">
                <span className="ico"><Ico name="users" size={15}/></span>
                <span className="lbl">{p.name}</span>
                <span className="sub">{p.id} · {p.age}T</span>
              </a>
            ))}
          </>}
          <div className="his-cmdk-sec">Mô-đun ({HIS_ROUTES.length} trang)</div>
          {matches.map(r => (
            <a key={r.id} href={r.href} className="his-cmdk-row">
              <span className="ico"><Ico name={r.icon} size={15}/></span>
              <span className="lbl">{r.label}</span>
              <span className="sub">{r.href}</span>
            </a>
          ))}
        </div>
        <div className="his-cmdk-ft">
          <span>↑↓ chọn</span>
          <span>↵ mở</span>
          <span>ESC đóng</span>
          <span style={{marginLeft:"auto"}}>HIS · {HIS_ROUTES.length} trang</span>
        </div>
      </div>
    </div>
  );
};

// ============== SHELL ==============
const HisShell = ({ route, crumb = [], children }) => {
  const [cmdKOpen, setCmdKOpen] = useS(false);
  const [patient, setPatient] = useS(null);
  const [flyoutGroup, setFlyoutGroup] = useS(null);
  const [pinnedGroup, setPinnedGroup] = useS(() => {
    // Pin no longer persists across pages — keeps the flyout from eating
    // 240px of horizontal space on every load.
    try { localStorage.removeItem("his.pinnedGroup"); } catch {}
    return null;
  });
  const hoverTimer = useR(null);

  useE(() => {
    const stored = localStorage.getItem("his.patient");
    if (stored) {
      const p = HIS.patientById(stored);
      if (p) setPatient(p);
    }
    const params = new URLSearchParams(location.search);
    const pid = params.get("pid");
    if (pid) {
      const p = HIS.patientById(pid);
      if (p) { setPatient(p); localStorage.setItem("his.patient", pid); }
    }
  }, []);

  useE(() => {
    const h = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
        e.preventDefault();
        setCmdKOpen(v => !v);
      }
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  const clearPatient = () => { setPatient(null); localStorage.removeItem("his.patient"); };

  const handleHoverGroup = (gid, isClick = false) => {
    clearTimeout(hoverTimer.current);
    if (isClick) {
      // Click toggles pin
      if (pinnedGroup === gid) {
        setPinnedGroup(null);
        setFlyoutGroup(null);
        try { localStorage.removeItem("his.pinnedGroup"); } catch {}
      } else {
        setPinnedGroup(gid);
        setFlyoutGroup(gid);
        try { localStorage.setItem("his.pinnedGroup", gid); } catch {}
      }
    } else {
      setFlyoutGroup(gid);
    }
  };

  const handleLeaveFlyout = () => {
    hoverTimer.current = setTimeout(() => {
      if (!pinnedGroup) setFlyoutGroup(null);
    }, 120);
  };

  const togglePin = () => {
    if (pinnedGroup === flyoutGroup) {
      setPinnedGroup(null);
      try { localStorage.removeItem("his.pinnedGroup"); } catch {}
    } else {
      setPinnedGroup(flyoutGroup);
      try { localStorage.setItem("his.pinnedGroup", flyoutGroup); } catch {}
    }
  };

  // Show flyout either on hover OR when pinned
  const activeFlyout = flyoutGroup || pinnedGroup;

  return (
    <div className={"his-app " + (pinnedGroup ? "has-pinned" : "")}>
      <Rail
        active={route}
        onHoverGroup={handleHoverGroup}
        onLeaveGroup={handleLeaveFlyout}
        pinnedGroup={pinnedGroup}
      />
      {activeFlyout && (
        <Flyout
          groupId={activeFlyout}
          active={route}
          onClose={handleLeaveFlyout}
          pinned={pinnedGroup === activeFlyout}
          onTogglePin={togglePin}
        />
      )}
      <Topbar crumb={crumb} onCmdK={() => setCmdKOpen(true)} patient={patient} onClearPatient={clearPatient}/>
      <Ticker patient={patient} onClearPatient={clearPatient}/>
      <main className="his-main">{children}</main>
      <StatusBar active={route}/>
      <CmdK open={cmdKOpen} onClose={() => setCmdKOpen(false)}/>
    </div>
  );
};

                </div>
                <span className={"or-surgeon-stat " + s.stat}>{s.stat==="or"?"● "+s.room:s.stat==="break"?"NGHỈ":s.stat==="free"?"RẢNH":"—"}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

window.ORModule = ORModule;

</script>
<script type="text/babel" data-presets="react">
