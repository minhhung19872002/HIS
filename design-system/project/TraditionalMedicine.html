<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"/><title>YHCT — HIS Terminal</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="his-shell.css"/><link rel="stylesheet" href="his-module.css"/></head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">
const { useState: uTraditionalMedicineMod_s } = React;
const TraditionalMedicineMod = () => {
  const kpis=[{"lbl":"BN đang điều trị","val":"48"},{"lbl":"Lịch châm cứu","val":"82"},{"lbl":"Thuốc thang cấp","val":"184"},{"lbl":"Kết hợp YHHĐ","val":"28"}],tabs=[],cols=[{"k":"code","label":"Mã","cls":"id"},{"k":"pt","label":"BN","cls":"nm"},{"k":"dx","label":"Chẩn đoán YHCT"},{"k":"trt","label":"Phương pháp","kind":"badge"},{"k":"ses","label":"Buổi","cls":"id"},{"k":"st","label":"TT","kind":"stat"}],rows=[{"code":"YH-00082","pt":"Đỗ V. Kim · BN-0120","dx":"Yêu thống · thể hàn","trt":"Châm cứu + thuốc","trtTone":"info","ses":"6/10","st":"ĐANG","stTone":"ok"},{"code":"YH-00081","pt":"Lý T. Hoa · BN-0122","dx":"Mất ngủ · tâm huyết hư","trt":"Thuốc thang","trtTone":"mag","ses":"14 thang","st":"ĐANG","stTone":"ok"},{"code":"YH-00078","pt":"Trần V. Kế · BN-0666","dx":"Đột quỵ di chứng","trt":"Điện châm + VLTL","trtTone":"info","ses":"12/20","st":"KẾT HỢP","stTone":"warn"}],act=[];
  const side=null;
  const [tab,setTab]=uTraditionalMedicineMod_s("all");
  const [sel,setSel]=uTraditionalMedicineMod_s(0);
  const filtered = tab==="all"?rows:rows.filter(r=>r._tab===tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (<div className="mod-wrap">
    {kpis.length>0 && (<div className="mod-strip">{kpis.map((k,i)=>(<div key={i} className={"mod-strip-cell "+(k.tone||"")}><div className="lbl">{k.lbl}</div><div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div></div>))}</div>)}
    <div className={"mod-body "+(side?"cols-2":"")}><div className="mod-pane">
      <div className="mod-toolbar"><h3>Khoa Y học cổ truyền — châm cứu, bấm huyệt, thuốc thang</h3>{tabs.length>0 && (<div className="mod-seg">{tabs.map(t=>(<button key={t.id} className={"mod-seg-i "+(tab===t.id?"on":"")} onClick={()=>{setTab(t.id);setSel(0);}}>{t.label}</button>))}</div>)}<div className="spacer"/>{act.map((a,i)=>(<button key={i} className={"mod-btn "+(a.cls||"")} onClick={()=>HUI.toast(a.toast,{tone:a.tone||"info"})}>{a.label}</button>))}</div>
      <div className="mod-tbl-wrap"><table className="mod-tbl"><thead><tr>{cols.map((c,i)=><th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead><tbody>
        {filtered.map((r,i)=>(<tr key={i} className={sel===i?"sel":""} onClick={()=>setSel(i)}>{cols.map((c,j)=>{const v=r[c.k];return(<td key={j} className={c.cls||c.kind||""}>{c.kind==="stat"&&<span className={"mod-stat "+(r[c.k+"Tone"]||"ghost")}>{v}</span>}{c.kind==="badge"&&<span className={"mod-badge "+(r[c.k+"Tone"]||"")}>{v}</span>}{!c.kind&&(v!=null?v:<span style={{color:"var(--t-3)"}}>—</span>)}</td>);})}</tr>))}
      </tbody></table></div>
    </div></div>
  </div>);
};
window.TraditionalMedicineMod=TraditionalMedicineMod;</script>
<script type="text/babel" data-presets="react">ReactDOM.createRoot(document.getElementById("root")).render(<HisShell route="traditional-medicine" crumb={["Hỗ trợ","Y học cổ truyền"]}><TraditionalMedicineMod/></HisShell>);</script>
</body></html>
