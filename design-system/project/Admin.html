<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"/><title>Quản trị HT — HIS Terminal</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="his-shell.css"/><link rel="stylesheet" href="his-module.css"/></head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">
const { useState: uAdminMod_s } = React;
const AdminMod = () => {
  const kpis=[{"lbl":"User","val":"482"},{"lbl":"Đang online","val":"184"},{"lbl":"Vai trò","val":"24"},{"lbl":"Khoá phiên 24h","val":"6","tone":"warn"}],tabs=[{"id":"user","label":"Người dùng"},{"id":"role","label":"Vai trò"},{"id":"audit","label":"Nhật ký"}],cols=[{"k":"code","label":"User","cls":"id"},{"k":"nm","label":"Họ tên","cls":"nm"},{"k":"role","label":"Vai trò","kind":"badge"},{"k":"dept","label":"Khoa"},{"k":"last","label":"Lần cuối","cls":"id"},{"k":"st","label":"TT","kind":"stat"}],rows=[{"_tab":"user","code":"hainguyen","nm":"BS. Phạm Văn Hải","role":"BÁC SĨ","roleTone":"info","dept":"Tim mạch","last":"15:24","st":"ONLINE","stTone":"ok"},{"_tab":"user","code":"admin","nm":"Lê Văn Minh","role":"ADMIN","roleTone":"mag","dept":"KHTH","last":"15:20","st":"ONLINE","stTone":"ok"},{"_tab":"role","code":"R-BS","nm":"Bác sĩ","role":"—","dept":"—","last":"—","st":"184 user","stTone":"info"},{"_tab":"audit","code":"L-284182","nm":"Thay đổi password","role":"admin","dept":"—","last":"14:12","st":"OK","stTone":"ok"}],act=[];
  const [tab,setTab]=uAdminMod_s("user");
  const [sel,setSel]=uAdminMod_s(0);
  const filtered = tab==="all"?rows:rows.filter(r=>r._tab===tab);
  return (<div className="mod-wrap">
    {kpis.length>0 && (<div className="mod-strip">{kpis.map((k,i)=>(<div key={i} className={"mod-strip-cell "+(k.tone||"")}><div className="lbl">{k.lbl}</div><div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div></div>))}</div>)}
    <div className="mod-body"><div className="mod-pane">
      <div className="mod-toolbar"><h3>Quản trị hệ thống · người dùng, vai trò, nhật ký</h3>{tabs.length>0 && (<div className="mod-seg">{tabs.map(t=>(<button key={t.id} className={"mod-seg-i "+(tab===t.id?"on":"")} onClick={()=>{setTab(t.id);setSel(0);}}>{t.label}{t.n!=null && <span className="n">{t.n}</span>}</button>))}</div>)}<div className="spacer"/>{act.map((a,i)=>(<button key={i} className={"mod-btn "+(a.cls||"")} onClick={()=>HUI.toast(a.toast,{tone:a.tone||"info"})}>{a.label}</button>))}</div>
      <div className="mod-tbl-wrap"><table className="mod-tbl"><thead><tr>{cols.map((c,i)=><th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead><tbody>
        {filtered.map((r,i)=>(<tr key={i} className={sel===i?"sel":""} onClick={()=>setSel(i)}>{cols.map((c,j)=>{const v=r[c.k];return(<td key={j} className={c.cls||c.kind||""}>{c.kind==="stat"&&<span className={"mod-stat "+(r[c.k+"Tone"]||"ghost")}>{v}</span>}{c.kind==="badge"&&<span className={"mod-badge "+(r[c.k+"Tone"]||"")}>{v}</span>}{!c.kind&&(v!=null?v:<span style={{color:"var(--t-3)"}}>—</span>)}</td>);})}</tr>))}
      </tbody></table></div>
    </div></div>
  </div>);
};
window.AdminMod = AdminMod;</script>
<script type="text/babel" data-presets="react">ReactDOM.createRoot(document.getElementById("root")).render(<HisShell route="admin" crumb={["Quản trị","Quản trị hệ thống"]}><AdminMod/></HisShell>);</script>
</body></html>
