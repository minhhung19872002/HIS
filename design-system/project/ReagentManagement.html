<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"/><title>Hoá chất XN — HIS Terminal</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="his-shell.css"/><link rel="stylesheet" href="his-module.css"/></head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="his-data.js"></script>
<script type="text/babel" data-presets="react" src="his-chrome.jsx"></script>
<script type="text/babel" data-presets="react">
const { useState: uReagentManagementMod_s } = React;
const ReagentManagementMod = () => {
  const kpis=[{"lbl":"Mã hoá chất","val":"284"},{"lbl":"Tồn thấp","val":"12","tone":"warn"},{"lbl":"Sắp hết HSD","val":"8","tone":"warn"},{"lbl":"Đề xuất chờ","val":"4"}],tabs=[],cols=[{"k":"code","label":"Mã","cls":"id"},{"k":"nm","label":"Tên hoá chất","cls":"nm"},{"k":"lot","label":"Lot","cls":"id"},{"k":"qty","label":"Tồn"},{"k":"exp","label":"HSD","cls":"id"},{"k":"mch","label":"Máy"},{"k":"st","label":"TT","kind":"stat"}],rows=[{"code":"HC-00182","nm":"Glucose HK Gen.3","lot":"4824-HY","qty":"4 hộp","exp":"12/2026","mch":"Cobas 6000","st":"ĐỦ","stTone":"ok"},{"code":"HC-00184","nm":"AST IFCC","lot":"4828-HY","qty":"1 hộp","exp":"03/2027","mch":"Cobas 6000","st":"THẤP","stTone":"warn"},{"code":"HC-00202","nm":"CELLPACK DST","lot":"X284-SY","qty":"2 can","exp":"24/10/2024","mch":"Sysmex XN-550","st":"HẾT HSD","stTone":"crit"}],act=[{"label":"+ Đề xuất","cls":"p","toast":"Đề xuất mua hoá chất"},{"label":"📋 Kiểm kê","toast":"Bắt đầu kiểm kê"}];
  const side=null;
  const [tab,setTab]=uReagentManagementMod_s("all");
  const [sel,setSel]=uReagentManagementMod_s(0);
  const filtered = tab==="all"?rows:rows.filter(r=>r._tab===tab);
  const cur = filtered[sel] || filtered[0] || {};
  return (<div className="mod-wrap">
    {kpis.length>0 && (<div className="mod-strip">{kpis.map((k,i)=>(<div key={i} className={"mod-strip-cell "+(k.tone||"")}><div className="lbl">{k.lbl}</div><div className="val">{k.val}{k.sub && <small>{k.sub}</small>}</div></div>))}</div>)}
    <div className={"mod-body "+(side?"cols-2":"")}><div className="mod-pane">
      <div className="mod-toolbar"><h3>Quản lý hoá chất & sinh phẩm xét nghiệm</h3>{tabs.length>0 && (<div className="mod-seg">{tabs.map(t=>(<button key={t.id} className={"mod-seg-i "+(tab===t.id?"on":"")} onClick={()=>{setTab(t.id);setSel(0);}}>{t.label}</button>))}</div>)}<div className="spacer"/>{act.map((a,i)=>(<button key={i} className={"mod-btn "+(a.cls||"")} onClick={()=>HUI.toast(a.toast,{tone:a.tone||"info"})}>{a.label}</button>))}</div>
      <div className="mod-tbl-wrap"><table className="mod-tbl"><thead><tr>{cols.map((c,i)=><th key={i} className={c.cls||""}>{c.label}</th>)}</tr></thead><tbody>
        {filtered.map((r,i)=>(<tr key={i} className={sel===i?"sel":""} onClick={()=>setSel(i)}>{cols.map((c,j)=>{const v=r[c.k];return(<td key={j} className={c.cls||c.kind||""}>{c.kind==="stat"&&<span className={"mod-stat "+(r[c.k+"Tone"]||"ghost")}>{v}</span>}{c.kind==="badge"&&<span className={"mod-badge "+(r[c.k+"Tone"]||"")}>{v}</span>}{!c.kind&&(v!=null?v:<span style={{color:"var(--t-3)"}}>—</span>)}</td>);})}</tr>))}
      </tbody></table></div>
    </div></div>
  </div>);
};
window.ReagentManagementMod=ReagentManagementMod;</script>
<script type="text/babel" data-presets="react">ReactDOM.createRoot(document.getElementById("root")).render(<HisShell route="reagent-management" crumb={["Cận lâm sàng","Hoá chất XN"]}><ReagentManagementMod/></HisShell>);</script>
</body></html>
