version: "3.8"

services:
  orthanc:
    image: orthancteam/orthanc:24.10.1
    container_name: his-orthanc
    restart: unless-stopped
    environment:
      ORTHANC__NAME: "HIS-PACS"
      ORTHANC__DICOM_AET: "HIS_PACS"
      ORTHANC__DICOM_PORT: "4242"
      ORTHANC__HTTP_PORT: "8042"
      ORTHANC__REGISTERED_USERS: |
        {"admin": "${ORTHANC_ADMIN_PASSWORD}"}
      ORTHANC__REMOTE_ACCESS_ALLOWED: "true"
      ORTHANC__AUTHENTICATION_ENABLED: "true"
      ORTHANC__SSL_ENABLED: "false"
      ORTHANC__DICOM_WEB__ENABLE: "true"
      ORTHANC__DICOM_WEB__ROOT: "/dicom-web/"
      ORTHANC__OHIF__ENABLE_VIEWER: "true"
      ORTHANC__OHIF__DATA_SOURCE: "dicom-web"
      ORTHANC__AWS_S3_STORAGE: |
        {
          "Region": "auto",
          "Endpoint": "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com",
          "AccessKey": "${R2_ACCESS_KEY_ID}",
          "SecretKey": "${R2_SECRET_ACCESS_KEY}",
          "BucketName": "${R2_BUCKET_NAME}",
          "ConnectionTimeout": 30,
          "RequestTimeout": 1200,
          "RootPath": "dicom/",
          "StorageEncryption": false,
          "HybridMode": "WriteToObjectStorage",
          "EnableLegacyUnsuffixedStorage": false,
          "VirtualAddressing": false
        }
      VERBOSE_ENABLED: "true"
      VERBOSE_STARTUP: "true"
    volumes:
      - orthanc-index:/var/lib/orthanc/db
    ports:
      - "4242:4242"
    networks:
      - pacs-net
    healthcheck:
      test: ["CMD", "curl", "-f", "-u", "admin:${ORTHANC_ADMIN_PASSWORD}", "http://localhost:8042/system"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2.8-alpine
    container_name: his-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      PACS_DOMAIN: "${PACS_DOMAIN}"
    networks:
      - pacs-net
    depends_on:
      - orthanc

networks:
  pacs-net:
    driver: bridge

volumes:
  orthanc-index:
  caddy-data:
  caddy-config:
