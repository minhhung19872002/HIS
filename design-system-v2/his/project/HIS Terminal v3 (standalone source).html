<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>HIS Terminal — Bản B</title>
<meta name="viewport" content="width=1440"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
/* ============================================
   HIS — Clinical Blue
   Inter · bg white · primary #2563eb · medical
   ============================================ */

:root {
  --font-sans: "Inter", "IBM Plex Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", Consolas, monospace;
  --font-serif: "Inter", system-ui, sans-serif; /* was serif — now sans for clinical */

  /* Depth — now LIGHT surfaces (kept var names for compat) */
  --d-0: #ffffff;      /* header/card header (was deepest) */
  --d-1: #f7f9fc;      /* page bg */
  --d-2: #ffffff;      /* panel */
  --d-3: #f1f5f9;      /* raised / hover soft */
  --d-4: #e5edf7;      /* hover strong */
  --d-5: #cbd6e3;      /* border strong */

  --line: #e4e9f0;
  --line-soft: #edf1f6;
  --line-hair: #f1f4f9;

  /* Text — dark on light */
  --t-0: #0f172a;       /* primary (slate-900) */
  --t-1: #334155;       /* secondary (slate-700) */
  --t-2: #64748b;       /* tertiary (slate-500) */
  --t-3: #94a3b8;       /* muted (slate-400) */
  --t-4: #cbd5e1;       /* hint (slate-300) */

  /* Accent: Clinical Blue */
  --a-cy: #2563eb;
  --a-cy-dim: #1d4ed8;
  --a-cy-bg: #eff5ff;
  --a-cy-line: #bfd3fa;

  /* Signals — accessible on white */
  --s-crit: #dc2626;
  --s-crit-bg: #fef2f2;
  --s-warn: #d97706;
  --s-warn-bg: #fffbeb;
  --s-ok:   #16a34a;
  --s-ok-bg: #f0fdf4;
  --s-info: #0284c7;
  --s-info-bg: #f0f9ff;
  --s-mag:  #7c3aed;
  --s-mag-bg: #f5f3ff;

  /* Geometry — softer */
  --r-0: 0px;
  --r-1: 3px;
  --r-2: 6px;
  --r-3: 8px;
  --r-4: 12px;

  /* Density — spacious (option "thoáng") */
  --row-h: 40px;
  --ctl-h: 36px;
  --fs-xxs: 10px;
  --fs-xs: 12px;
  --fs-sm: 13px;
  --fs-md: 14px;
  --fs-lg: 16px;
  --fs-xl: 22px;
  --fs-2xl: 32px;
  --fs-3xl: 48px;
}

* { box-sizing: border-box; }
html, body, #root {
  margin: 0; height: 100%;
  background: var(--d-1);
  color: var(--t-0);
  font-family: var(--font-sans);
  font-size: var(--fs-md);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; padding: 0; }
input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; outline: none; }
a { color: inherit; }

.mono { font-family: var(--font-mono); font-feature-settings: "tnum", "zero"; letter-spacing: -0.01em; }
.serif { font-family: var(--font-sans); font-weight: 600; letter-spacing: -0.01em; }
.tab { font-variant-numeric: tabular-nums; }
.up { text-transform: uppercase; letter-spacing: 0.06em; }

/* ============== APP SHELL (3-col: rail + subnav + content) ============== */
.app {
  display: grid;
  grid-template-columns: 64px 232px 1fr;
  grid-template-rows: 1fr 28px;
  height: 100vh;
  overflow: hidden;
}
.rail    { grid-column: 1; grid-row: 1 / -1; }
.subnav  { grid-column: 2; grid-row: 1; overflow: hidden; }
.main    { grid-column: 3; grid-row: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.statusbar { grid-column: 1 / -1; grid-row: 2; }

/* ============== RAIL (72px icon-only left column) ============== */
.rail {
  background: #ffffff;
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column; align-items: center;
  padding: 14px 0 10px;
  gap: 2px;
}
.rail-mark {
  width: 40px; height: 40px;
  display: grid; place-items: center;
  font-family: var(--font-sans);
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  background: var(--a-cy);
  border-radius: 10px;
  margin-bottom: 18px;
}
.rail-item {
  width: 44px; height: 44px;
  display: grid; place-items: center;
  color: var(--t-2);
  border-radius: 10px;
  position: relative;
  transition: color 0.12s, background 0.12s;
  cursor: pointer;
  background: transparent;
  border: none;
  padding: 0;
}
.rail-item:hover { color: var(--t-0); background: var(--d-3); }
.rail-item.active {
  color: var(--a-cy);
  background: var(--a-cy-bg);
}
.rail-item .hot {
  position: absolute; top: 6px; right: 6px;
  min-width: 16px; height: 14px; padding: 0 4px;
  background: var(--s-crit); color: #fff;
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 700;
  border-radius: 7px;
  display: grid; place-items: center;
  pointer-events: none;
}
.rail-item .tip {
  position: absolute; left: calc(100% + 6px); top: 50%;
  transform: translateY(-50%);
  background: var(--t-0); color: #fff;
  font-size: 11px; padding: 4px 8px; border-radius: 4px;
  white-space: nowrap; pointer-events: none;
  opacity: 0; transition: opacity 0.12s;
  z-index: 50;
}
.rail-item:hover .tip { opacity: 1; }
.rail-spacer { flex: 1; }
.rail-group-line {
  width: 28px; height: 1px;
  background: var(--line);
  margin: 10px 0;
}

/* ============== SUBNAV (secondary column, module-specific) ============== */
.subnav {
  background: #ffffff;
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  padding: 22px 18px 16px;
}
.subnav-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--t-3);
  margin-bottom: 6px;
}
.subnav-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--t-0);
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.subnav-sub {
  font-size: 12px;
  color: var(--t-2);
  margin-bottom: 22px;
  font-family: var(--font-mono);
}
.subnav-group {
  padding: 18px 0 6px;
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--t-3);
}
.subnav-item {
  display: flex; align-items: center; gap: 10px;
  height: 36px; padding: 0 10px;
  color: var(--t-1);
  border-radius: var(--r-2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: color 0.12s, background 0.12s;
  position: relative;
  text-align: left;
  background: transparent;
  border: none;
  width: 100%;
}
.subnav-item:hover { color: var(--t-0); background: var(--d-3); }
.subnav-item.active {
  color: var(--a-cy);
  background: var(--a-cy-bg);
  font-weight: 600;
}
.subnav-item .lbl { flex: 1; }
.subnav-item .tag {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--t-3);
  font-weight: 500;
}
.subnav-item.active .tag { color: var(--a-cy); }
.subnav-item .dot-live {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--s-ok);
}
.subnav-spacer { flex: 1; }

/* Tiny card at bottom of subnav */
.subnav-card {
  background: var(--d-1);
  border: 1px solid var(--line);
  border-radius: var(--r-3);
  padding: 12px;
  margin-top: 14px;
}
.subnav-card .lbl {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--t-3);
}
.subnav-card .val {
  font-size: 22px;
  font-weight: 600;
  color: var(--t-0);
  margin-top: 4px;
  line-height: 1;
}
.subnav-card .hint {
  font-size: 11px;
  color: var(--t-2);
  margin-top: 4px;
}

/* legacy sb-* still used by Login side — keep minimal compatibility */
.sb-sec {
  padding: 14px 10px 6px;
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--t-3);
}

/* ============== COMMAND BAR (top) ============== */
.cmdbar {
  height: 56px;
  background: #ffffff;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 14px;
  flex-shrink: 0;
}
.cmdbar-path {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px;
  color: var(--t-2);
}
.cmdbar-path .slash { color: var(--t-4); }
.cmdbar-path .here { color: var(--t-0); font-weight: 600; }

.cmd {
  flex: 1; max-width: 520px;
  height: 36px;
  background: var(--d-1);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  display: flex; align-items: center;
  padding: 0 12px;
  gap: 10px;
  color: var(--t-2);
  font-size: 13px;
  cursor: pointer;
  transition: border-color 0.12s, background 0.12s;
}
.cmd:hover { border-color: var(--a-cy-line); background: #fff; }
.cmd .prompt { color: var(--a-cy); font-family: var(--font-mono); }
.cmd .hint { flex: 1; color: var(--t-3); }
.cmd kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 6px;
  background: #fff;
  border: 1px solid var(--line);
  color: var(--t-2);
  border-radius: 3px;
}

.cmdbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

.topbtn {
  height: 32px; padding: 0 10px;
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px;
  color: var(--t-1);
  border: 1px solid transparent;
  border-radius: var(--r-2);
  font-weight: 500;
}
.topbtn:hover { background: var(--d-3); color: var(--t-0); }
.topbtn.icon { width: 32px; padding: 0; justify-content: center; }
.topbtn.on { background: var(--a-cy-bg); color: var(--a-cy); border-color: var(--a-cy-line); }

.chip-shift {
  height: 30px; padding: 0 10px;
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 11px;
  background: var(--s-ok-bg); border: 1px solid #bbf7d0;
  border-radius: var(--r-2);
  color: #15803d;
  font-weight: 500;
}
.chip-shift .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--s-ok); }

.user {
  display: flex; align-items: center; gap: 8px;
  padding: 2px 10px 2px 2px;
  border-radius: var(--r-2);
  cursor: pointer;
  border: 1px solid transparent;
}
.user:hover { border-color: var(--line); background: var(--d-3); }
.user .avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--a-cy);
  color: #fff;
  display: grid; place-items: center;
  font-family: var(--font-sans);
  font-size: 12px; font-weight: 600;
}
.user .who { display: flex; flex-direction: column; line-height: 1.2; }
.user .who .n { font-size: 13px; color: var(--t-0); font-weight: 600; }
.user .who .r { font-size: 11px; color: var(--t-2); }

/* ============== CONTENT AREA ============== */
.content {
  flex: 1;
  overflow: auto;
  position: relative;
  background: var(--d-1);
}

/* ============== PANEL (card) ============== */
.panel {
  background: #ffffff;
  border: 1px solid var(--line);
  border-radius: var(--r-3);
  display: flex; flex-direction: column;
  min-height: 0;
  overflow: hidden;
  box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
}
.panel-h {
  height: 44px;
  padding: 0 14px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 10px;
  background: #ffffff;
  flex-shrink: 0;
}
.panel-h .title {
  font-size: 13px;
  color: var(--t-0);
  font-weight: 600;
  letter-spacing: 0;
  text-transform: none;
}
.panel-h .title b { color: var(--a-cy); font-weight: 600; }
.panel-h .sub { font-size: 12px; color: var(--t-2); font-weight: 400; }
.panel-h .actions { margin-left: auto; display: flex; gap: 6px; }
.panel-body { flex: 1; overflow: auto; min-height: 0; }
.panel-body.pad { padding: 14px; }
.panel-body.pad-sm { padding: 10px; }

/* ============== DASHCARD (spacious, flat) ============== */
.dashcard {
  background: #ffffff;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 28px 28px 24px;
  display: flex; flex-direction: column;
  min-height: 0;
}
.dashcard.featured {
  border-color: var(--a-cy-line);
  background: linear-gradient(180deg, #f5faff 0%, #ffffff 44%);
}
.dashcard-eyebrow {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  color: var(--t-2);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.dashcard-eyebrow .dot { width: 7px; height: 7px; }
.dashcard-title {
  font-size: 26px;
  font-weight: 600;
  color: var(--t-0);
  letter-spacing: -0.015em;
  line-height: 1.15;
  margin-bottom: 6px;
}
.dashcard-meta {
  font-size: 13px;
  color: var(--t-2);
  line-height: 1.5;
}
.dashcard-cta {
  margin-top: auto;
  padding-top: 18px;
  align-self: flex-start;
  display: inline-flex; align-items: center; gap: 6px;
  background: transparent;
  border: none;
  color: var(--a-cy);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  padding: 18px 0 0;
}
.dashcard-cta.ghost { color: var(--t-1); }
.dashcard-cta:hover { color: var(--a-cy-dim); }

.dashlist {
  display: flex; flex-direction: column;
  border-top: 1px solid var(--line-soft);
}
.dashlist > * {
  border-bottom: 1px solid var(--line-soft);
  padding: 12px 0 !important;
}
.dashlist > *:last-child { border-bottom: none; }

.lab-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-top: 4px;
}
.lab-table th {
  text-align: left;
  padding: 10px 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--t-3);
  border-bottom: 1px solid var(--line);
}
.lab-table td {
  padding: 14px 8px;
  border-bottom: 1px solid var(--line-soft);
}
.lab-table tr:last-child td { border-bottom: none; }
.lab-table tr:hover td { background: var(--d-1); }

/* ============== BUTTONS ============== */
.btn {
  height: var(--ctl-h);
  padding: 0 14px;
  display: inline-flex; align-items: center; gap: 6px;
  background: #ffffff;
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  color: var(--t-0);
  font-size: 13px;
  font-weight: 500;
  transition: all 0.12s;
  white-space: nowrap;
}
.btn:hover { background: var(--d-3); border-color: var(--d-5); }
.btn.primary {
  background: var(--a-cy); color: #ffffff;
  border-color: var(--a-cy);
  font-weight: 600;
}
.btn.primary:hover { background: var(--a-cy-dim); border-color: var(--a-cy-dim); }
.btn.ghost { background: transparent; border-color: transparent; color: var(--t-1); }
.btn.ghost:hover { background: var(--d-3); color: var(--t-0); }
.btn.danger { color: var(--s-crit); border-color: var(--line); background: #fff; }
.btn.danger:hover { background: var(--s-crit-bg); border-color: #fecaca; }
.btn.icon { padding: 0; width: var(--ctl-h); justify-content: center; }
.btn.sm { height: 26px; font-size: 12px; padding: 0 10px; }

/* ============== INPUTS ============== */
.input, .select {
  height: var(--ctl-h);
  padding: 0 12px;
  background: #ffffff;
  border: 1px solid var(--d-5);
  border-radius: var(--r-2);
  color: var(--t-0);
  font-size: 13px;
  width: 100%;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.input:focus, .select:focus {
  border-color: var(--a-cy);
  box-shadow: 0 0 0 3px var(--a-cy-bg);
}
.input::placeholder { color: var(--t-3); }
.select { appearance: none; padding-right: 28px; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 10' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 3.5 5 7l4-3.5' fill='none' stroke='%2364748b' stroke-width='1.5'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 10px center; background-size: 10px; }

.label {
  font-size: 11px;
  color: var(--t-2);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
  margin-bottom: 6px;
  display: block;
}

/* ============== BADGES / CHIPS ============== */
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  height: 22px; padding: 0 8px;
  border-radius: 11px;
  font-size: 11px;
  font-weight: 600;
  background: var(--d-3);
  color: var(--t-1);
  white-space: nowrap;
  letter-spacing: 0;
  text-transform: none;
}
.chip.crit { background: var(--s-crit-bg); color: var(--s-crit); }
.chip.warn { background: var(--s-warn-bg); color: var(--s-warn); }
.chip.ok { background: var(--s-ok-bg); color: #15803d; }
.chip.info { background: var(--s-info-bg); color: var(--s-info); }
.chip.mag { background: var(--s-mag-bg); color: var(--s-mag); }
.chip.cy { background: var(--a-cy-bg); color: var(--a-cy); }
.chip.ghost { background: transparent; border: 1px solid var(--line); color: var(--t-2); }

.dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--t-3);
  vertical-align: middle;
}
.dot.crit { background: var(--s-crit); }
.dot.warn { background: var(--s-warn); }
.dot.ok { background: var(--s-ok); }
.dot.info { background: var(--s-info); }
.dot.cy { background: var(--a-cy); }

/* ============== TABLE ============== */
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th {
  text-align: left;
  font-weight: 600;
  color: var(--t-2);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 10px 14px;
  background: var(--d-1);
  border-bottom: 1px solid var(--line);
  position: sticky; top: 0;
  white-space: nowrap;
  z-index: 1;
}
.tbl th.num { text-align: right; }
.tbl td {
  padding: 0 14px;
  height: var(--row-h);
  border-bottom: 1px solid var(--line-hair);
  color: var(--t-0);
  white-space: nowrap;
}
.tbl td.num { text-align: right; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.tbl td.mono { font-family: var(--font-mono); font-size: 12px; color: var(--t-1); }
.tbl tr { cursor: default; }
.tbl tr:hover td { background: var(--d-1); }
.tbl tr.sel td {
  background: var(--a-cy-bg);
  box-shadow: inset 3px 0 0 var(--a-cy);
}
.tbl tr.sel:hover td { background: var(--a-cy-bg); }
.tbl .muted { color: var(--t-2); }
.tbl .dim { color: var(--t-3); }

/* ============== STATUS BAR ============== */
.statusbar {
  background: #ffffff;
  border-top: 1px solid var(--line);
  display: flex; align-items: center;
  padding: 0 14px;
  gap: 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--t-2);
  text-transform: none;
  letter-spacing: 0;
}
.statusbar .sb-seg { display: inline-flex; align-items: center; gap: 6px; }
.statusbar .sb-seg b { color: var(--t-0); font-weight: 600; }
.statusbar .sb-seg.ok b { color: #15803d; }
.statusbar .sep { width: 1px; height: 14px; background: var(--line); }

/* ============== KBD ============== */
kbd {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 2px 6px;
  min-width: 18px;
  text-align: center;
  background: #fff;
  border: 1px solid var(--line);
  border-bottom-width: 2px;
  border-radius: 4px;
  color: var(--t-1);
  line-height: 1.2;
}

/* ============== MODAL ============== */
.backdrop {
  position: fixed; inset: 0;
  background: rgba(15, 23, 42, 0.35);
  backdrop-filter: blur(3px);
  display: grid; place-items: center;
  z-index: 1000;
  animation: f 0.15s ease;
}
.modal {
  background: #ffffff;
  border: 1px solid var(--line);
  border-radius: var(--r-4);
  box-shadow: 0 24px 60px rgba(15, 23, 42, 0.15);
  max-width: 92vw; max-height: 88vh;
  min-width: 460px;
  display: flex; flex-direction: column;
  animation: p 0.18s ease;
  overflow: hidden;
}
.modal-h {
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 10px;
  background: #ffffff;
}
.modal-h .title {
  font-size: 15px;
  color: var(--t-0);
  font-weight: 600;
  text-transform: none;
  letter-spacing: 0;
}
.modal-h .title b { color: var(--a-cy); font-weight: 600; }
.modal-body { padding: 18px; overflow: auto; flex: 1; }
.modal-f {
  padding: 12px 18px;
  border-top: 1px solid var(--line);
  display: flex; gap: 10px; justify-content: flex-end;
  background: var(--d-1);
}
@keyframes f { from { opacity: 0; } to { opacity: 1; } }
@keyframes p { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ============== UTILITIES ============== */
.row { display: flex; align-items: center; gap: 8px; }
.col { display: flex; flex-direction: column; }
.stack-sm > * + * { margin-top: 8px; }
.stack > * + * { margin-top: 12px; }
.stack-lg > * + * { margin-top: 18px; }
.spacer { flex: 1; }
.hline { height: 1px; background: var(--line); }
.vline { width: 1px; background: var(--line); align-self: stretch; }
.gridcol { display: grid; gap: 12px; }

/* ============== SCROLLBAR ============== */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: #94a3b8; background-clip: padding-box; border: 2px solid transparent; }

/* ============== TWEAKS PANEL ============== */
.tweaks {
  position: fixed;
  bottom: 40px; right: 16px;
  width: 280px;
  background: #ffffff;
  border: 1px solid var(--line);
  border-radius: var(--r-3);
  z-index: 900;
  box-shadow: 0 16px 48px rgba(15, 23, 42, 0.15);
  overflow: hidden;
}
.tweaks-h {
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  background: #ffffff;
  font-size: 12px;
  font-weight: 600;
  color: var(--a-cy);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  display: flex; align-items: center;
}
.tweaks-body { padding: 14px; display: flex; flex-direction: column; gap: 14px; }
.tweak-row { display: flex; flex-direction: column; gap: 6px; }
.swatch-row { display: flex; gap: 8px; }
.swatch {
  width: 28px; height: 28px; border-radius: var(--r-2);
  cursor: pointer; border: 2px solid transparent;
}
.swatch.on { border-color: var(--t-0); box-shadow: 0 0 0 2px #fff; }

/* ============== PLACEHOLDERS ============== */
.ph {
  background:
    repeating-linear-gradient(45deg, transparent 0 10px, rgba(148, 163, 184, 0.08) 10px 11px),
    var(--d-1);
  border: 1px dashed var(--d-5);
  border-radius: var(--r-2);
  display: grid; place-items: center;
  color: var(--t-2);
  font-family: var(--font-mono);
  font-size: 12px;
  text-align: center;
  padding: 14px;
  letter-spacing: 0.02em;
}

/* ============== CHART GRID ============== */
.chart-grid {
  background:
    linear-gradient(var(--line-soft) 1px, transparent 1px) 0 0 / 100% 32px,
    linear-gradient(90deg, var(--line-soft) 1px, transparent 1px) 0 0 / 44px 100%,
    #ffffff;
  position: relative;
}

/* ============== SEGMENTED ============== */
.seg {
  display: inline-flex;
  background: var(--d-1);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  padding: 3px;
  height: var(--ctl-h);
}
.seg button {
  padding: 0 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--t-2);
  border-radius: var(--r-1);
  text-transform: none;
  letter-spacing: 0;
}
.seg button.active {
  background: #ffffff;
  color: var(--t-0);
  box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
  font-weight: 600;
}

/* ============== TABS ============== */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--line);
  background: #ffffff;
  padding: 0 18px;
  height: 44px;
  align-items: flex-end;
  gap: 2px;
  flex-shrink: 0;
}
.tabs .tab {
  padding: 0 14px;
  height: 42px;
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--t-2);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
  text-transform: none;
  letter-spacing: 0;
}
.tabs .tab:hover { color: var(--t-0); }
.tabs .tab.active { color: var(--a-cy); border-bottom-color: var(--a-cy); font-weight: 600; }
.tabs .tab .n {
  color: var(--t-3);
  font-size: 11px;
  background: var(--d-3);
  padding: 1px 6px;
  border-radius: 8px;
  font-family: var(--font-mono);
}
.tabs .tab.active .n { background: var(--a-cy-bg); color: var(--a-cy); }

/* ============== LOGIN ============== */
.login-stage {
  min-height: 100vh;
  background: linear-gradient(135deg, #f7f9fc 0%, #eff5ff 100%);
  display: grid;
  grid-template-columns: 1fr 480px;
  overflow: hidden;
}
@media (max-width: 860px) { .login-stage { grid-template-columns: 1fr; } }

.login-side {
  padding: 56px 64px;
  display: flex; flex-direction: column;
  justify-content: space-between;
  position: relative;
}
.login-card {
  padding: 56px 48px;
  background: #ffffff;
  border-left: 1px solid var(--line);
  display: flex; flex-direction: column;
  justify-content: center;
  box-shadow: -10px 0 40px rgba(15, 23, 42, 0.04);
}

    if (!open) setQ("");
  }, [open]);

    { id: "go-dashboard", label: "Đi tới Dashboard", kind: "NAV", go: "dashboard" },
    { id: "go-reception", label: "Tiếp nhận bệnh nhân mới", kind: "NAV", go: "reception" },

    if (!ql) return actions.slice(0, 10);

  }, [dashLayout]);

  useEffect(() => {
    const r = document.documentElement;
    if (density === "compact") {
      r.style.setProperty("--row-h", "32px");
      r.style.setProperty("--ctl-h", "30px");
      r.style.setProperty("--fs-md", "13px");
    } else {
      r.style.setProperty("--row-h", "42px");
      r.style.setProperty("--ctl-h", "38px");
      r.style.setProperty("--fs-md", "14px");
    }
    localStorage.setItem("his.term.density", density);
  }, [density]);

  useEffect(() => {
    const a = ACCENTS.find(x => x.id === accent) || ACCENTS[0];
    const r = document.documentElement;
    r.style.setProperty("--a-cy", a.cy);
    r.style.setProperty("--a-cy-dim", a.dim);
    const hex = a.cy.replace("#", "");
    const rr = parseInt(hex.slice(0,2),16), gg = parseInt(hex.slice(2,4),16), bb = parseInt(hex.slice(4,6),16);
    r.style.setProperty("--a-cy-bg", `rgba(${rr},${gg},${bb},0.08)`);
    r.style.setProperty("--a-cy-line", `rgba(${rr},${gg},${bb},0.25)`);
    localStorage.setItem("his.term.accent", accent);
  }, [accent]);

  useEffect(() => {
    const r = document.documentElement;
    if (radius === "sharp") {
      r.style.setProperty("--r-1", "2px"); r.style.setProperty("--r-2", "4px");
      r.style.setProperty("--r-3", "6px"); r.style.setProperty("--r-4", "10px");
    } else {
      r.style.setProperty("--r-1", "4px"); r.style.setProperty("--r-2", "8px");
      r.style.setProperty("--r-3", "12px"); r.style.setProperty("--r-4", "16px");
    }
    localStorage.setItem("his.term.radius", radius);
  }, [radius]);

  return (
    <div className="tweaks">
      <div className="tweaks-h">
        <span>TWEAKS</span>
        <span className="spacer" style={{ flex: 1 }}/>
        <button className="topbtn icon" onClick={onClose} style={{ color: "var(--t-2)", height: 20, width: 20 }}>
          <Icon name="x" size={12}/>
        </button>
      </div>
      <div className="tweaks-body">
        <div className="tweak-row">
          <label className="label">Dashboard layout</label>
          <div className="seg">
            <button className={dashLayout === "focus" ? "active" : ""} onClick={() => setDashLayout("focus")}>Focus</button>
            <button className={dashLayout === "dense" ? "active" : ""} onClick={() => setDashLayout("dense")}>Data</button>
            <button className={dashLayout === "brief" ? "active" : ""} onClick={() => setDashLayout("brief")}>Brief</button>
          </div>
        </div>
        <div className="tweak-row">
          <label className="label">Accent</label>
          <div className="swatch-row">
            {ACCENTS.map(a => (
              <div key={a.id}
                className={"swatch " + (accent === a.id ? "on" : "")}
                style={{ background: a.cy }}
                onClick={() => setAccent(a.id)}
              />
            ))}
          </div>
        </div>
        <div className="tweak-row">
          <label className="label">Density</label>
          <div className="seg">
            <button className={density === "compact" ? "active" : ""} onClick={() => setDensity("compact")}>Compact</button>
            <button className={density === "comfy" ? "active" : ""} onClick={() => setDensity("comfy")}>Comfy</button>
          </div>
        </div>
        <div className="tweak-row">
          <label className="label">Radius</label>
          <div className="seg">

            <button className={radius === "soft" ? "active" : ""} onClick={() => setRadius("soft")}>Soft</button>
          </div>
        </div>
      </div>
    </div>
  );
};

const SurgeryModule = () => {
  const HOURS = Array.from({length: 11}, (_, i) => 7 + i); // 7h-17h
  const hrToX = (hm) => { const [h, m] = hm.split(":").map(Number); return ((h - 7) * 60 + m) / (60 * 10) * 100; };

  return (
    <div style={{ padding: 14, height: "100%", overflow: "auto", background: "var(--d-1)" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
        <div>
          <div className="serif" style={{ fontSize: 20 }}>Lịch mổ · Thứ Bảy 18/04/2026</div>
          <div className="mono" style={{ fontSize: 11, color: "var(--t-3)", marginTop: 2 }}>
            9 ca mổ · 4 phòng hoạt động · 2 đang thực hiện
          </div>
        </div>
        <div className="spacer" style={{ flex: 1 }}/>
        <div className="seg"><button className="active">NGÀY</button><button>TUẦN</button><button>THÁNG</button></div>
        <button className="btn"><Icon name="chevron-left" size={12}/></button>
        <button className="btn">Hôm nay</button>
        <button className="btn"><Icon name="chevron-right" size={12}/></button>
        <button className="btn primary"><Icon name="plus" size={12}/> Lên lịch</button>
      </div>

      <div style={{ background: "var(--d-2)", border: "1px solid var(--line)", borderRadius: 6, overflow: "hidden" }}>
        {/* Hour ruler */}
        <div style={{ display: "grid", gridTemplateColumns: "80px 1fr", borderBottom: "1px solid var(--line)" }}>
          <div style={{ padding: "8px 10px", background: "var(--d-0)", borderRight: "1px solid var(--line)" }}>
            <span className="mono up" style={{ fontSize: 9, color: "var(--t-3)" }}>OR</span>
          </div>
          <div style={{ position: "relative", height: 28, background: "var(--d-0)" }}>
            {HOURS.map(h => (
              <div key={h} style={{ position: "absolute", left: `${(h - 7) * 10}%`, top: 0, bottom: 0, borderLeft: "1px solid var(--line)", paddingLeft: 4 }}>
                <span className="mono" style={{ fontSize: 10, color: "var(--t-3)" }}>{String(h).padStart(2,"0")}:00</span>
              </div>
            ))}
          </div>
        </div>

        {HIS_DATA.orRooms.map(or => {
          const cases = HIS_DATA.orSchedule.filter(s => s.or === or);
          return (
            <div key={or} style={{ display: "grid", gridTemplateColumns: "80px 1fr", borderBottom: "1px solid var(--line)", minHeight: 76 }}>
              <div style={{ padding: "10px 12px", borderRight: "1px solid var(--line)", background: "var(--d-0)" }}>
                <div className="mono" style={{ fontSize: 13, color: "var(--a-cy)" }}>{or}</div>
                <div className="mono" style={{ fontSize: 10, color: "var(--t-3)", marginTop: 2 }}>{cases.length} ca</div>
              </div>
              <div style={{ position: "relative", background: "linear-gradient(90deg, var(--line-soft) 1px, transparent 1px) 0 0 / 10% 100%" }}>
                {cases.map((c, i) => {
                  const x1 = hrToX(c.start);
                  const x2 = hrToX(c.end);
                  const w = x2 - x1;
                  const bg = c.status === "done" ? "var(--s-ok-bg)" : c.status === "in-progress" ? "var(--a-cy-bg)" : "var(--s-mag-bg)";
                  const bd = c.status === "done" ? "var(--s-ok)" : c.status === "in-progress" ? "var(--a-cy)" : "var(--s-mag)";
                  return (
                    <div key={i} style={{
                      position: "absolute", left: `${x1}%`, width: `${w}%`,
                      top: 8, bottom: 8, background: bg, border: `1px solid ${bd}`, borderLeft: `3px solid ${bd}`,
                      borderRadius: 3, padding: "4px 8px", overflow: "hidden", cursor: "pointer",
                    }}>
                      <div className="row" style={{ gap: 6, justifyContent: "space-between" }}>
                        <span className="mono" style={{ fontSize: 10, color: "var(--t-0)" }}>{c.start}–{c.end}</span>
                        {c.status === "in-progress" && <span className="chip cy" style={{height:14}}><span className="dot cy"/>LIVE</span>}
                        {c.status === "done" && <span className="chip ok" style={{height:14}}>XONG</span>}
                      </div>
                      <div style={{ fontSize: 11, color: "var(--t-0)", marginTop: 2, fontWeight: 500, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{c.proc}</div>
                      <div className="mono" style={{ fontSize: 10, color: "var(--t-2)", marginTop: 1, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{c.pt} · {c.surgeon}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

          <>
            <div className="label">KẾT QUẢ</div>
            <div className="mono" style={{ fontSize: 16, color: "var(--t-0)", marginTop: 2 }}>{sel.id}</div>
            <div style={{ fontSize: 13, color: "var(--t-1)", marginTop: 6 }}>{sel.pt}</div>
            <div className="mono" style={{ fontSize: 11, color: "var(--t-3)" }}>{sel.pid} · Lấy mẫu {sel.collected}</div>
            <div className="hline" style={{ margin: "14px 0" }}/>
            <div className="label">SINH HOÁ MÁU</div>
            <LabRow name="Glucose" v="7.8" unit="mmol/L" range="3.9 – 6.1" flag="H"/>
            <LabRow name="Ure" v="5.2" unit="mmol/L" range="2.5 – 7.5"/>
            <LabRow name="Creatinine" v="88" unit="µmol/L" range="64 – 104"/>
            <LabRow name="AST (SGOT)" v="42" unit="U/L" range="5 – 34" flag="H"/>
            <LabRow name="ALT (SGPT)" v="28" unit="U/L" range="0 – 55"/>
            <LabRow name="Cholesterol TP" v="5.1" unit="mmol/L" range="< 5.2"/>
            <LabRow name="HDL-C" v="1.2" unit="mmol/L" range="> 1.03"/>
            <LabRow name="LDL-C" v="3.4" unit="mmol/L" range="< 3.34" flag="H"/>
            <LabRow name="Triglyceride" v="2.1" unit="mmol/L" range="< 1.7" flag="H"/>
            <LabRow name="Troponin I" v="< 0.01" unit="ng/mL" range="< 0.04"/>
            <div style={{ marginTop: 14, display: "grid", gap: 6 }}>
              <button className="btn primary">Duyệt kết quả</button>
              <button className="btn"><Icon name="printer" size={12}/> In phiếu KQ</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
};

const LabRow = ({ name, v, unit, range, flag }) => (
  <div style={{ display: "grid", gridTemplateColumns: "1fr 70px 28px 90px", gap: 6, padding: "4px 0", borderBottom: "1px dashed var(--line-soft)", fontSize: 11, alignItems: "center" }}>
    <span style={{ color: "var(--t-1)" }}>{name}</span>
    <span className="mono" style={{ textAlign: "right", color: flag ? (flag === "H" ? "var(--s-warn)" : "var(--s-info)") : "var(--t-0)", fontWeight: flag ? 600 : 400 }}>{v}</span>
    <span className="mono" style={{ color: flag ? (flag === "H" ? "var(--s-warn)" : "var(--s-info)") : "transparent", fontSize: 10 }}>{flag || "·"}</span>
    <span className="mono dim" style={{ fontSize: 10 }}>{unit}  <span style={{color:"var(--t-4)"}}>· {range}</span></span>
  </div>
);

Object.assign(window, { ReceptionModule, IPDModule, SurgeryModule, BillingModule, RISModule, LISModule });

})();
</script>
<script type="text/babel" data-presets="react">
;(function(){

const { useState, useEffect, useCallback } = React;

// ==== LOGIN (Terminal style) ====
const LoginScreen = ({ onLogin }) => {
  const [user, setUser] = useState("nhlinh");
  const [pass, setPass] = useState("••••••••");
  const [role, setRole] = useState("Bác sĩ");
  const [boot, setBoot] = useState([]);
  useEffect(() => {
    const lines = [
      "[ OK ] init his.kernel @ 2.4.1",
      "[ OK ] mount /var/hl7 · ack OK",
      "[ OK ] PACS-01 · 8 studies queued",
      "[ OK ] lis.analyzer · online (A1 A2 A3)",
      "[ OK ] emr.sync · last 30s",
      "[ OK ] auth.ldap · CONNECTED",
      "[ READY ] entering session manager…"
    ];
    lines.forEach((l, i) => setTimeout(() => setBoot(b => [...b, l]), 150 + i * 120));
  }, []);
  return (
    <div style={{display:"grid",gridTemplateColumns:"1.1fr 1fr",height:"100vh",background:"var(--d-1)"}}>
      <div style={{background:"var(--d-0)",borderRight:"1px solid var(--line)",padding:"28px 32px",display:"flex",flexDirection:"column",fontFamily:"var(--font-mono)",fontSize:12,color:"var(--t-2)",overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{width:10,height:10,borderRadius:"50%",background:"var(--s-crit)"}}/>
          <span style={{width:10,height:10,borderRadius:"50%",background:"var(--s-warn)"}}/>
          <span style={{width:10,height:10,borderRadius:"50%",background:"var(--s-ok)"}}/>
          <span style={{marginLeft:10,color:"var(--t-3)"}}>his.terminal · tty0 · 1440×900</span>
        </div>
        <div style={{marginTop:32,fontFamily:"var(--font-serif)",fontSize:40,color:"var(--t-0)",letterSpacing:"-0.02em",lineHeight:1.1}}>
          Hệ thống<br/>thông tin bệnh viện
        </div>
        <div style={{marginTop:10,fontSize:12,color:"var(--t-3)"}}>v2.4.1 · build 20260418.1 · cluster-hn-01</div>

        <div style={{marginTop:40,borderTop:"1px dashed var(--line)",paddingTop:18,lineHeight:1.8,flex:1,overflow:"hidden"}}>
          {boot.map((l,i)=>(
            <div key={i} style={{color:l.startsWith("[ OK ]")?"var(--s-ok)":l.startsWith("[ READY")?"var(--a-cy)":"var(--t-2)"}}>{l}</div>
          ))}
          <div style={{color:"var(--a-cy)"}}>{"> _"}</div>
        </div>

        <div style={{borderTop:"1px dashed var(--line)",paddingTop:14,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,fontSize:10,color:"var(--t-3)"}}>
          <div>DB <span style={{color:"var(--s-ok)"}}>● UP</span> · 2ms</div>
          <div>HL7 <span style={{color:"var(--s-ok)"}}>● ACK</span></div>
          <div>PACS <span style={{color:"var(--s-ok)"}}>● OK</span></div>
          <div>LIS <span style={{color:"var(--s-ok)"}}>● OK</span></div>
        </div>
      </div>

      <div style={{display:"grid",placeItems:"center",padding:32}}>
        <div style={{width:380}}>
          <div className="mono up" style={{fontSize:10,color:"var(--t-3)",letterSpacing:"0.12em"}}>— AUTHENTICATION —</div>
          <div className="serif" style={{fontSize:26,color:"var(--t-0)",marginTop:6}}>Đăng nhập phiên làm việc</div>
          <div className="mono" style={{fontSize:11,color:"var(--t-3)",marginTop:4}}>Ca trực: 07:00 → 15:00 · Thứ Bảy 18/04/2026</div>

          <div style={{marginTop:24,display:"grid",gap:12}}>
            <div><label className="label">TÊN ĐĂNG NHẬP</label><input className="input mono" value={user} onChange={e=>setUser(e.target.value)}/></div>
            <div><label className="label">MẬT KHẨU</label><input className="input mono" type="password" value={pass} onChange={e=>setPass(e.target.value)}/></div>
            <div>
              <label className="label">VAI TRÒ</label>
              <div className="seg" style={{width:"100%"}}>
                {["Bác sĩ","Điều dưỡng","Tiếp nhận","Dược","Thu ngân"].map(r=>(
                  <button key={r} className={role===r?"active":""} onClick={()=>setRole(r)} style={{flex:1,fontSize:10}}>{r}</button>
                ))}
              </div>
            </div>
            <button className="btn primary" style={{height:38,marginTop:6,fontSize:13}} onClick={onLogin}>
              <Icon name="arrow-right" size={14}/>  ĐĂNG NHẬP
            </button>
            <button className="btn" style={{height:34}}>Đăng nhập bằng SSO (AD)</button>
            <div className="row" style={{justifyContent:"space-between",marginTop:6}}>
              <label className="row mono" style={{fontSize:11,color:"var(--t-2)",gap:6}}><input type="checkbox" defaultChecked/> Ghi nhớ phiên</label>
              <a className="mono" href="#" style={{fontSize:11,color:"var(--a-cy)"}}>Quên mật khẩu?</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ==== APP ====
const App = () => {
  const [logged, setLogged] = useState(localStorage.getItem("his.term.logged") === "1");
  const [route, setRoute] = useState(localStorage.getItem("his.term.route") || "dashboard");
  const [subRoute, setSubRoute] = useState(null);
  const [cmdOpen, setCmdOpen] = useState(false);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(()=>{ localStorage.setItem("his.term.route", route); setSubRoute(null); }, [route]);

  // Cmd+K
  useEffect(() => {
    const h = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") { e.preventDefault(); setCmdOpen(o=>!o); }
      if (e.key === "Escape") { setCmdOpen(false); setTweaksOpen(false); }
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  // Tweaks host protocol
  useEffect(() => {
    const h = (e) => {
      if (!e.data || typeof e.data !== "object") return;
      if (e.data.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", h);
    window.parent.postMessage({type: "__edit_mode_available"}, "*");
    return () => window.removeEventListener("message", h);
  }, []);

  const doLogin = useCallback(()=>{ localStorage.setItem("his.term.logged","1"); setLogged(true); }, []);
  const doLogout = useCallback(()=>{ localStorage.removeItem("his.term.logged"); setLogged(false); }, []);

  if (!logged) return <LoginScreen onLogin={doLogin}/>;

  return (
    <div className="app">
      <Rail route={route} setRoute={setRoute}/>
      <SubNav route={route} subRoute={subRoute} setSubRoute={setSubRoute}/>
      <div className="main">
        <CommandBar route={route} onCmdOpen={()=>setCmdOpen(true)} onLogout={doLogout}/>
        <div className="content">
          {route === "dashboard" && <Dashboard goRoute={setRoute}/>}
          {route === "reception" && <ReceptionModule/>}
          {route === "opd" && <OPDModule/>}
          {route === "ipd" && <IPDModule/>}
          {route === "surgery" && <SurgeryModule/>}
          {route === "billing" && <BillingModule/>}
          {route === "ris" && <RISModule/>}
          {route === "lis" && <LISModule/>}
        </div>
        <StatusBar route={route}/>
      </div>
      <CommandPalette open={cmdOpen} onClose={()=>setCmdOpen(false)} onNav={setRoute}/>
      {tweaksOpen && <TweaksPanel onClose={()=>setTweaksOpen(false)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

})();
</script>
</body>
</html>
